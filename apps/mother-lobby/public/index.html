<!DOCTYPE html>
<!--
  ╔══════════════════════════════════════════════════════════════════════════════╗
  ║   index.html — Główny plik klienta gry                                       ║
  ║   Gra multiplayer 3D                                                         ║
  ╚══════════════════════════════════════════════════════════════════════════════╝

  Ten plik robi WSZYSTKO co widzi gracz:
    1. Animowane tło canvas 2d
    2. Lobby: lista serwerów, panel logowania/rejestracji, karuzela skinów
    3. Scena Three.js — cylindryczny tunel 3D z platformami
    4. Sieć:
         WebSocket → Mother Server (lobby, konta, tokeny)
         WebSocket → Game Server  (pozycje, kolizje, punkty, właściwa rozgrywka)
    5. HUD: poziom, ranking, chat, przycisk eventu
    6. Ekran śmierci / odrodzenia i odliczaniem
    7. Sterowanie: mysz, dotyk, klawiatura (strzałki / A-D)
    8. Binarny protokół sieciowy (PacketGet / PacketSet)

  Zależności zewnętrzne (ładowane z dysku serwera):
    js/three.js    — silnik 3D (Three.js r128)
    js/OBJLoader.js — loader modeli OBJ
    js/asd.js      — tekstury ładowanie funkcje
-->
<html>
<head>
  <title>CloudGame</title>

  <!-- Kodowanie UTF-8 — wymagane dla polskich znaków w HTML -->
  <meta http-equiv="content-type" content="text/html; charset=UTF8">

  <!--
    Viewport mobilny:
      minimal-ui            — ukrywa pasek przeglądarki na iOS
      width=device-width    — rozciągnij do pełnej szerokości ekranu
      initial-scale=1.0     — bez domyślnego pomniejszenia
      maximum-scale=1.0     — zakaz powiększania (gra nie obsługuje zoom)
      user-scalable=no      — zakaz "pinch to zoom" (iOS/Android)
    Bez tych ustawień gra na mobile byłaby pomniejszona do 30% rozmiaru.
  -->
  <meta name="viewport" content="minimal-ui, width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <meta property="og:title" content="gra">

  <!-- Favicon — ikona w zakładce przeglądarki -->
  <link rel="icon" href="/img/favico.png">

  <!--
    CZCIONKI GOOGLE FONTS:
      Orbitron   — futurystyczna, "kosmiczna" czcionka do nagłówków i HUD
                   (użycie: tytuły, przyciski, liczniki, rankingi)
      Rajdhani   — czytelna techniczna czcionka do tekstów UI
                   (użycie: chat, inputy, opisy)

    preconnect do fonts.googleapis.com — wcześniejsze nawiązanie połączenia TCP
    zanim przeglądarka trafi na tag <link rel="stylesheet">
    Oszczędza ~100-300ms przy pierwszym ładowaniu.

    display=swap — tekst wyświetlany od razu czcionką zastępczą (nie "miga")
    wght=400;600;800 — ładujemy tylko 3 grubości (nie pełną rodzinę = mniej KB)
  -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
 
  <style>
    /* ══════════════════════════════════════════════════════════════
       ZMIENNE CSS — PALETA KOLORÓW, CZCIONKI, EFEKTY
       Zdefiniowane raz na :root, dostępne wszędzie przez var(--nazwa)
       Zmiana tu = zmiana w całym UI bez szukania po kodzie.
    ══════════════════════════════════════════════════════════════ */
    :root {
      --nb:  #00d4ff;                  /* Neon Blue  — główny akcent; używany na: borderach, podświetleniach, buttonach     */
      --ng:  #39ff14;                  /* Neon Green — sukces, gracze, pasek żywotności serwera, przycisk PLAY             */
      --no:  #ffd700;                  /* Neon Gold  — waluta, punkty, wyniki; kolor "bogactwa"                            */
      --nr:  #ff4455;                  /* Neon Red   — błędy, pełny serwer, przycisk śmierci                               */
      --pbg: rgba(4, 9, 24, 0.92);    /* Panel Background — ciemny szafir z przeźroczystością; tło paneli                 */
      --pbr: rgba(0, 212, 255, 0.26); /* Panel Border — półprzeźroczysty niebieski border                                 */
      --glow: 0 0 40px rgba(0,212,255,0.18), 0 0 80px rgba(0,212,255,0.07); /* Neonowy blask — cień paneli                */
      --fd: 'Orbitron', monospace;     /* Font Display — do nagłówków, HUD, liczników                                      */
      --fb: 'Rajdhani', sans-serif;    /* Font Body    — do inputów, opisów, czatu                                         */
    }

    /* ══════════════════════════════════════════════════════════════
       RESET I GLOBALNE USTAWIENIA
    ══════════════════════════════════════════════════════════════ */

    *, *::before, *::after {
      box-sizing: border-box;
      /*
        border-box: padding i border wliczone w wymiary elementu.
        Bez tego: element 200px + padding 20px = 240px (nieoczekiwane).
        Z tym:    element 200px + padding 20px = 200px (intuicyjne).
        Wymagane dla wszystkich layoutów gry.
      */
    }

    html {
      -webkit-user-select: none;
      -moz-user-select: none;
      user-select: none;
      /*
        Wyłącza zaznaczanie tekstu kliknięciem/przeciąganiem.
        Bez tego: gracz przeciągając myszą podczas gry zaznaczałby tekst UI.
        Wymagane dla płynnego sterowania mysz/dotyk.
      */
    }

    body {
      margin: 0;           /* Usuń domyślny margines przeglądarki (inaczej biały pasek) */
      overflow: hidden;    /* Ukryj scrollbary — gra zajmuje 100% okna bez scrolla     */
      background: #000;    /* Czarne tło gdy canvas jeszcze się ładuje                  */
      font-family: var(--fb);
      font-size: 16px;
      color: #cce8ff;      /* Delikatny niebieskawobiały kolor tekstu                   */
      cursor: crosshair;   /* Celownik zamiast strzałki        */
    }

    /*
      Dwie kanwy tła:
        #stars-canvas — animowane migotające gwiazdy (Canvas 2D)
        #bg-canvas    — retro-futurystyczna siatka perspektywiczna (Canvas 2D)

      Obie: position:fixed = zajmują cały ekran niezależnie od scrolla.
      z-index: 0 = za wszystkimi elementami UI i grą.
      pointer-events: none = nie blokują kliknięć gracza (kliknięcia "przelatują" przez nie).
    */
    #stars-canvas {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
    }
    #bg-canvas {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      z-index: 0;
      opacity: 0.85; /* Lekko przeźroczyste — żeby ciemne tło body trochę przeświecało */
    }

    /*
      EFEKT CRT (LINIE SKANOWANIA):
      body::after tworzy "wirtualny" element nad całą stroną.
      repeating-linear-gradient tworzy paski co 4px:
        3px przeźroczyste + 1px ciemny pasek = subtelne linie skanowania starego monitora.
      Efekt dodaje "techniczną" głębię bez ładowania dodatkowych obrazków.
      pointer-events: none = nie blokuje interakcji.
      z-index: 1000 = NAD wszystkim (nawet nad Three.js canvasem).
    */
    body::after {
      content: '';
      position: fixed;
      inset: 0; /* skrót dla top:0;right:0;bottom:0;left:0 */
      background: repeating-linear-gradient(
        0deg,
        transparent, transparent 3px,
        rgba(0, 0, 0, 0.06) 3px, rgba(0, 0, 0, 0.06) 4px
      );
      pointer-events: none;
      z-index: 1000;
    }

    /* ══════════════════════════════════════════════════════════════
       EKRAN ŁADOWANIA ASSETÓW (Loader 1 — niebieski)
       Wyświetlany jako PIERWSZY — gdy ładują się tekstury, modele OBJ.
       Sterowany przez THREE.LoadingManager.onProgress / onLoad.
    ══════════════════════════════════════════════════════════════ */

    #loader-wrapper {
      position: fixed; inset: 0;
      z-index: 99999;              /* NAD wszystkim — zasłania czarny ekran przy starcie */
      background: rgba(0, 0, 5, 0.95);
      backdrop-filter: blur(10px); /* Rozmycie tła dla efektu "glass" */
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    #loader-text {
      font-family: var(--fd);
      font-size: 14px;
      color: var(--nb);            /* Niebieski — odróżnia od zielonego Loadera 2 */
      letter-spacing: 4px;
      margin-bottom: 20px;
      text-shadow: 0 0 10px rgba(0, 212, 255, 0.5); /* Neonowy blask tekstu */
    }
    #loader-bar-bg {
      width: 300px; height: 6px;
      background: rgba(0, 212, 255, 0.1); /* Ciemne tło paska — widoczne zanim pasek się wypełni */
      border-radius: 3px; overflow: hidden;
      box-shadow: inset 0 0 5px rgba(0, 0, 0, 0.5);
    }
    #loader-bar {
      width: 0%; height: 100%;    /* Zaczyna od 0% — aktualizowany przez JS do 100% */
      background: var(--nb);
      transition: width 0.15s ease-out; /* Płynne animowanie paska (nie skacze co ładowany zasób) */
      box-shadow: 0 0 15px var(--nb);   /* Neonowy blask na krawędzi paska */
    }

    /* ══════════════════════════════════════════════════════════════
       EKRAN GENEROWANIA SCENY (Loader 2 — zielony)
       Wyświetlany DRUGI — gdy Three.js kompiluje shadery GPU.
       Kompilacja shaderów może trwać 2-10s na słabszych kartach.
       Zielony kolor odróżnia go od niebieskiego Loadera 1.
    ══════════════════════════════════════════════════════════════ */

    #scene-loader {
      position: fixed; inset: 0;
      z-index: 99999;
      background: rgba(0, 0, 5, 0.95);
      backdrop-filter: blur(10px);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    #sl-text {
      font-family: var(--fd); font-size: 14px;
      color: var(--ng);            /* Zielony — odróżnia od niebieskiego Loadera 1 */
      letter-spacing: 4px;
      margin-bottom: 20px;
      text-shadow: 0 0 10px rgba(57, 255, 20, 0.5);
    }
    #sl-bar-bg {
      width: 300px; height: 6px;
      background: rgba(57, 255, 20, 0.1);
      border-radius: 3px; overflow: hidden;
      box-shadow: inset 0 0 5px rgba(0, 0, 0, 0.5);
    }
    #sl-bar {
      width: 0%; height: 100%;
      background: var(--ng);
      transition: width 0.15s ease-out;
      box-shadow: 0 0 15px var(--ng);
    }

    /* ══════════════════════════════════════════════════════════════
       LOBBY — KONTENER OWIJAJĄCY
       Wycentrowany na ekranie (top:50%+left:50%+translate = dokładne centrum).
       display:none przy starcie — pokazywany po załadowaniu assetów przez JS.
       Animacja float-panel: delikatne unoszenie co 5s (nieprzerywany efekt).
       flex + gap: dwa panele (logowanie | lista serwerów) obok siebie.
    ══════════════════════════════════════════════════════════════ */

    #lobby-wrapper {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      display: none;              /* Ukryty do czasu zakończenia ładowania assetów */
      gap: 16px;
      align-items: stretch;
      z-index: 3;
      animation: float-panel 5s ease-in-out infinite;
    }

    /* ── Panel logowania / rejestracji (lewa kolumna) ── */
    #login {
      width: 440px;
      background: var(--pbg);
      border: 1px solid var(--pbr);
      border-radius: 22px;
      box-shadow: var(--glow), inset 0 1px 0 rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(18px);         /* Rozmycie tła pod panelem (glass effect) */
      -webkit-backdrop-filter: blur(18px); /* Safari wymaga prefixu -webkit- */
      padding: 30px 28px 26px;
      color: white;
      flex-shrink: 0; /* Nie kurczy się gdy kontener jest za wąski */
    }

    /*
      Nagłówek "POLITECHNIKA RZESZOWSKA" jako pseudo-element ::before.
      Używamy pseudo-elementu zamiast osobnego <div>

      linear-gradient + -webkit-background-clip:text + -webkit-text-fill-color:transparent:
        Technika "gradient text" — tekst wypełniony gradientem zamiast solid kolorem.
        Gradient od neon-blue do fioletu (#bf5fff).
        Wymaga prefixu -webkit- dla zgodności z Safari/Chrome.
        background-clip:text (bez prefiksu) — standardowa wersja dla nowych przeglądarek.

      \A w content — znak nowej linii (line break w CSS content).
      Łamie "POLITECHNIKA\ARZESZOWSKA" na dwie linie.
    */
    #login::before {
      content: 'POLITECHNIKA\ARZESZOWSKA';
      display: block;
      font-family: var(--fd);
      font-size: 22px; font-weight: 800;
      letter-spacing: 8px;
      text-align: center;
      background: linear-gradient(90deg, var(--nb), #bf5fff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 20px;
      filter: drop-shadow(0 0 12px rgba(0, 212, 255, 0.6));
    }

    /*
      Pasek lokalizacji — wyświetla kraj/region gracza i wybrany serwer.
      pointer-events: none — nie można kliknąć, tylko informacyjny.
    */
    #country {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; height: 38px;
      background: rgba(0, 212, 255, 0.06);
      border: 1px solid rgba(0, 212, 255, 0.25);
      border-radius: 9px;
      font-family: var(--fd); font-size: 10px; letter-spacing: 2px;
      color: rgba(0, 212, 255, 0.8);
      margin-bottom: 16px;
      pointer-events: none; user-select: none;
    }
    #country-label { flex: 1; text-align: center; font-size: 14px; }

    /* ── Panel listy serwerów (prawa kolumna lobby) ── */
    #server-list-panel {
      width: 285px;
      background: rgba(3, 7, 20, 0.95);
      border: 1px solid var(--pbr);
      border-radius: 18px;
      box-shadow: var(--glow);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      display: flex; flex-direction: column;
      overflow: hidden;  /* Przycinanie treści do border-radius */
      flex-shrink: 0;
    }

    /* Nagłówek panelu serwerów ("⊙ SERVERS") */
    #sl-header {
      padding: 16px 16px 12px;
      border-bottom: 1px solid rgba(0, 212, 255, 0.13);
      flex-shrink: 0; /* Nie kurczy się gdy lista jest długa */
    }
    #sl-header span {
      font-family: var(--fd); font-size: 13px;
      letter-spacing: 3px; color: var(--nb);
      opacity: 0.75; display: block; margin-bottom: 6px;
    }

    /*
      Przewijalna lista serwerów.
      flex: 1 = zajmuje całą dostępną wysokość panelu.
      overflow-y: auto = scrolla tylko gdy lista jest dłuższa niż panel.
      Niestandardowe scrollbary (webkit + scrollbar-width) dla estetyki.
    */
    #sl-scroll {
      overflow-y: auto; overflow-x: hidden;
      flex: 1;
      padding: 8px 10px 12px;
      scrollbar-width: thin;
      scrollbar-color: rgba(0, 212, 255, 0.28) transparent;
    }
    #sl-scroll::-webkit-scrollbar       { width: 4px; }
    #sl-scroll::-webkit-scrollbar-thumb { background: rgba(0, 212, 255, 0.28); border-radius: 2px; }

    /*
      Pojedynczy wiersz serwera na liście (.sv-row).

      Stany:
        .sv-row         — normalny (szare tło, niebieski border)
        .sv-row:hover   — podświetlony (jaśniejsze tło + blask)
        .sv-selected    — zaznaczony (wybrany serwer, jeszcze jaśniejszy)
        .sv-full        — pełny (szary, kursor not-allowed, nieinteraktywny)
    */
    .sv-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 12px; margin-bottom: 6px;
      background: rgba(0, 212, 255, 0.04);
      border: 1px solid rgba(0, 212, 255, 0.12);
      border-radius: 9px; cursor: pointer;
      transition: all 0.16s;
    }
    .sv-row:hover     { background: rgba(0, 212, 255, 0.12); border-color: rgba(0, 212, 255, 0.4); box-shadow: 0 0 10px rgba(0, 212, 255, 0.2); }
    .sv-row.sv-selected { background: rgba(0, 212, 255, 0.16); border-color: var(--nb); box-shadow: 0 0 12px rgba(0, 212, 255, 0.2); }
    .sv-row.sv-full   { opacity: 0.38; cursor: not-allowed; }
    .sv-row.sv-full:hover { transform: none; background: rgba(0, 212, 255, 0.04); border-color: rgba(0, 212, 255, 0.12); }

    /* Lewa część wiersza: flaga + nazwa + podtytuł */
    .sv-l    { display: flex; align-items: center; gap: 9px; min-width: 0; }
    .sv-flag { font-size: 18px; flex-shrink: 0; }
    .sv-name { font-family: var(--fd); font-size: 10px; letter-spacing: 2px; color: white; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sv-sub  { font-size: 12px; color: rgba(255, 255, 255, 0.45); letter-spacing: 0.5px; margin-top: 1px; }
    .sv-players { font-size: 12px; font-weight: bold; color: var(--ng); letter-spacing: 1px; }

    /* Prawa część wiersza: pasek zapełnienia + checkmark */
    .sv-r   { display: flex; align-items: center; gap: 7px; flex-shrink: 0; }
    .sv-cnt { font-family: var(--fd); font-size: 10px; color: var(--ng); white-space: nowrap; }
    .sv-cnt.full { color: var(--nr); } /* Pełny serwer — czerwony */

    /* Miniaturowy pasek zapełnienia serwera (np. 5/15 = 33% szerokości) */
    .sv-bar-bg  { width: 40px; height: 4px; background: rgba(255, 255, 255, 0.1); border-radius: 2px; overflow: hidden; }
    .sv-bar     { height: 100%; border-radius: 2px; background: var(--ng); transition: width 0.3s; }
    .sv-bar.full { background: var(--nr); } /* Czerwony pasek gdy pełny */

    /* Ikona "✓" — widoczna tylko przy zaznaczonym serwerze (.sv-selected) */
    .sv-tick {
      display: none; width: 18px; height: 18px;
      border-radius: 50%; background: var(--nb);
      color: #000; font-size: 10px; font-weight: bold;
      align-items: center; justify-content: center; flex-shrink: 0;
    }
    .sv-selected .sv-tick { display: flex; } /* Pokaż tylko przy zaznaczonym */

    /* ── Karuzela skinów postaci ── */
    .skin-row {
      display: flex; align-items: center; justify-content: center;
      gap: 14px; margin-bottom: 10px;
    }

    /* Przyciski nawigacji karuzelki (‹ ›) */
    .sk-btn {
      width: 40px; height: 40px; border-radius: 50%;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.14);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 18px; color: var(--nb);
      transition: all 0.16s;
    }
    .sk-btn:hover { background: rgba(0, 212, 255, 0.2); border-color: var(--nb); transform: scale(1.12); }

    /* Podgląd skina — obrazek PNG z efektem drop-shadow */
    #skins {
      width: 110px; height: 110px; object-fit: contain;
      filter: drop-shadow(0 0 14px rgba(0, 212, 255, 0.5));
      transition: filter 0.3s, transform 0.2s;
    }
    #skins:hover { transform: scale(1.06); }

    /*
      Cena skina pod obrazkiem.
      Klikalna — otwiera flow zakupu (obsługiwane w JS: $('#skins_price').onclick).
      Gdy skin jest już posiadany: puste ('' — brak ceny, brak kursora pointer).
    */
    #skins_price {
      text-align: center;
      font-family: var(--fd); font-size: 11px; letter-spacing: 1px;
      color: var(--no); min-height: 20px;
      cursor: pointer; margin-bottom: 14px;
    }
    #skins_price:hover { text-decoration: underline; }

    /* ── Pole nicku gracza ── */
    #nick {
      width: 100%; height: 50px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(0, 212, 255, 0.3);
      border-radius: 11px; color: white;
      font-family: var(--fd); font-size: 14px;
      letter-spacing: 3px; text-align: center;
      padding: 0 12px; outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      margin-bottom: 14px;
    }
    #nick::placeholder { color: rgba(255, 255, 255, 0.2); letter-spacing: 3px; }
    #nick:focus { border-color: var(--nb); box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.13); }

    /*
      Przycisk PLAY.
      display: none — pokazywany przez JS dopiero gdy lista serwerów załadowana.
      Dlaczego? Gracz nie powinien móc kliknąć PLAY przed wyborem serwera.
      Zielony gradient + neon-green border = jasny sygnał "akcja pozytywna".

      ::before — animacja (białe prześwitujące pasmo przesuwa się od lewej do prawej).
      Efekt: przycisk "błyszczy" zachęcając do kliknięcia.
    */
    #play {
      display: none;
      width: 100%; height: 58px;
      background: linear-gradient(135deg, #006600, #00aa00);
      border: none; border-top: 2px solid #39ff14;
      border-radius: 12px; color: white;
      font-family: var(--fd); font-size: 17px; font-weight: 700;
      letter-spacing: 5px; cursor: pointer;
      position: relative; overflow: hidden; /* overflow:hidden = animacja nie wycieka poza button */
      transition: transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 0 24px rgba(57, 255, 20, 0.32);
      margin-bottom: 10px; text-align: center; line-height: 58px;
    }
    #play::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
      transform: translateX(-100%); /* Startuje z lewej strony (poza widokiem) */
      animation: shimmer 2.5s infinite; /* Porusza się co 2.5 sekundy */
    }
    @keyframes shimmer { to { transform: translateX(100%); } } /* Przesuń do prawej strony */
    #play:hover { transform: translateY(-2px); box-shadow: 0 6px 30px rgba(57, 255, 20, 0.52); }

    /* ── Formularz logowania / rejestracji ── */
    #auth-box { margin-bottom: 16px; }

    /* Zakładki "LOGOWANIE | REJESTRACJA" */
    .auth-tabs {
      display: flex; gap: 0;
      margin-bottom: 14px; border-radius: 9px; overflow: hidden;
      border: 1px solid rgba(0, 212, 255, 0.25);
    }
    .auth-tab {
      flex: 1; padding: 8px 0;
      font-family: var(--fd); font-size: 12px; letter-spacing: 2px;
      text-align: center; cursor: pointer;
      color: rgba(0, 212, 255, 0.55);
      background: rgba(0, 0, 0, 0.3);
      transition: all 0.18s; border: none; outline: none;
    }
    .auth-tab.active { background: rgba(0, 212, 255, 0.14); color: var(--nb); font-weight: 700; }

    /* Inputy formularza auth */
    .auth-input {
      width: 100%; height: 40px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(0, 212, 255, 0.25);
      border-radius: 9px; color: white;
      font-family: var(--fb); font-size: 16px;
      padding: 0 12px; outline: none;
      transition: border-color 0.2s;
      margin-bottom: 9px;
    }
    .auth-input::placeholder { color: rgba(255, 255, 255, 0.22); }
    .auth-input:focus { border-color: var(--nb); background: rgba(0, 212, 255, 0.05); }

    /* Przycisk "ZALOGUJ / ZAREJESTRUJ" */
    #auth-submit {
      width: 100%; height: 44px;
      background: linear-gradient(135deg, rgba(0, 212, 255, 0.22), rgba(0, 100, 200, 0.32));
      border: 1px solid rgba(0, 212, 255, 0.45);
      border-radius: 9px; color: white;
      font-family: var(--fd); font-size: 11px; letter-spacing: 3px;
      cursor: pointer; transition: all 0.18s; margin-bottom: 4px;
    }
    #auth-submit:hover { background: rgba(0, 212, 255, 0.3); box-shadow: 0 0 18px rgba(0, 212, 255, 0.28); }

    /* Komunikat błędu / sukcesu autoryzacji */
    #auth-msg {
      font-size: 11px; text-align: center; min-height: 16px;
      color: var(--nr);        /* Domyślnie czerwony — błędy */
      letter-spacing: 0.5px; margin-bottom: 4px;
      /* Zmiana na --ng (zielony) przez JS przy sukcesie logowania */
    }

    /* ── Panel zalogowanego konta ── */
    #account {
      display: none; /* Ukryty dopóki gracz nie jest zalogowany */
      background: rgba(0, 212, 255, 0.06);
      border: 1px solid rgba(0, 212, 255, 0.2);
      border-radius: 11px; padding: 12px 14px;
      font-size: 13px; line-height: 1.8;
      color: rgba(255, 255, 255, 0.72);
      margin-bottom: 14px; position: relative;
    }
    /* Wiersz "imię + ikona edycji" — grubszy font, flexbox */
    #account > div:nth-child(2) { font-family: var(--fd); font-size: 13px; color: white; display: flex; align-items: center; gap: 6px; }
    /* Wiersz punktów — złoty kolor, pogrubiony */
    #account > div:nth-child(4) { color: var(--no); font-family: var(--fd); font-size: 14px; font-weight: 700; }

    /* Ikona ⚙ edycji nazwy — klikalna */
    #r_name_acc { font-size: 15px; cursor: pointer; opacity: 0.7; transition: opacity 0.2s; }
    #r_name_acc:hover { opacity: 1; }

    /* Inline input do edycji nazwy (ukryty, pojawia się po kliknięciu ⚙) */
    #r_name_che { background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(0, 212, 255, 0.4); border-radius: 5px; color: white; padding: 2px 8px; font-size: 13px; outline: none; }

    /* Przycisk Logout — absolutnie pozycjonowany w prawym górnym rogu panelu konta */
    #logout {
      position: absolute; top: 10px; right: 10px;
      padding: 4px 10px; font-size: 12px;
      font-family: var(--fd); letter-spacing: 1px;
      color: rgba(255, 100, 100, 0.8);
      border: 1px solid rgba(255, 100, 100, 0.32);
      border-radius: 6px; cursor: pointer; transition: all 0.18s;
    }
    #logout:hover { background: rgba(255, 0, 0, 0.12); color: #ff6464; border-color: #ff6464; }

    /* ══════════════════════════════════════════════════════════════
       HUD W GRZE — elementy nakładki widoczne podczas rozgrywki
       Wszystkie mają display:none — pokazywane przez JS po wejściu do gry.
    ══════════════════════════════════════════════════════════════ */

    /*
      Licznik poziomów (góra-środek).
      Pokazuje "bieżący_poziom / checkpoint_docelowy" np. "45/90".
      Kolor zmienia się dynamicznie (kolor skina gracza).
      clamp(15px, 2.2vw, 22px) — responsywny rozmiar czcionki:
        min 15px na bardzo małych ekranach,
        2.2% szerokości viewportu dla "normalnych",
        max 22px na bardzo dużych ekranach.
    */
    #level {
      position: fixed; top: 18px; left: 50%; transform: translateX(-50%);
      font-family: var(--fd); font-size: clamp(15px, 2.2vw, 22px); font-weight: 600;
      letter-spacing: 3px; color: white;
      text-shadow: 0 0 12px currentColor; /* currentColor = kolor tekstu (zmienia się z kolorem skina) */
      z-index: 10;
      background: rgba(0, 0, 0, 0.5); padding: 6px 22px;
      border-radius: 30px; border: 1px solid rgba(255, 255, 255, 0.16);
      display: none;
    }

    /* Tablica wyników leaderboard — góra-prawy róg (max 6 miejsc + miejsce gracza) */
    #ranking {
      position: fixed; top: 18px; right: 18px; width: 210px;
      background: var(--pbg); border: 1px solid var(--pbr); border-radius: 15px;
      padding: 13px 15px;
      font-family: var(--fd); font-size: clamp(10px, 1vw, 11px);
      line-height: 2; letter-spacing: 0.5px;
      color: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(12px); z-index: 10; display: none;
    }
    /* Napis "◆ LEADERBOARD" jako pseudo-element (nie zajmuje miejsca w HTML) */
    #ranking::before {
      content: '◆ RANKING';
      display: block; font-size: 9px; letter-spacing: 3px;
      color: var(--nb); margin-bottom: 7px; opacity: 0.72;
    }

    /*
      Przycisk eventu (strzałka + licznik "X/10").
      Animacja arrow-bounce: delikatne podskakiwanie co 1.5s — zwraca uwagę gracza.
      Animacja arrow-glow: pulsujący złoty blask wokół strzałki.
    */
    #eventb {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
      width: clamp(68px, 10vw, 96px); height: clamp(68px, 10vw, 96px);
      cursor: pointer; z-index: 5; display: none;
      animation: arrow-bounce 1.5s ease-in-out infinite;
    }
    @keyframes arrow-bounce { 0%, 100% { bottom: 28px; } 50% { bottom: 42px; } }
    #eventb img { width: 100%; height: 100%; object-fit: contain; animation: arrow-glow 1.5s ease-in-out infinite; }
    #eventb:hover img { filter: drop-shadow(0 0 22px rgba(255, 220, 0, 1)) brightness(1.3) !important; }
    @keyframes arrow-glow { 0%, 100% { filter: drop-shadow(0 0 5px rgba(255, 180, 0, 0.45)); } 50% { filter: drop-shadow(0 0 24px rgba(255, 220, 0, 1)); } }

    /* Licznik "X/10" — wyświetlany pod strzałką */
    #eventb > div {
      position: absolute; bottom: -10px; left: 50%; transform: translateX(-50%);
      font-family: var(--fd); font-size: clamp(9px, 1.1vw, 12px);
      color: white; background: rgba(0, 0, 0, 0.75);
      padding: 2px 9px; border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.18); white-space: nowrap;
    }

    /* Chat — lewy dolny róg */
    #chat {
      position: fixed; left: 16px; bottom: 16px;
      width: clamp(180px, 18vw, 260px);
      display: none; flex-direction: column; z-index: 10;
    }
    #chat-label { font-family: var(--fd); font-size: 9px; letter-spacing: 2px; color: rgba(0, 212, 255, 0.6); margin-bottom: 5px; flex-shrink: 0; }

    /* Okno wiadomości czatu — scrolluje od dołu (justify-content:flex-end) */
    #text {
      background: rgba(0, 0, 0, 0.55);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px 10px 0 0; padding: 8px 10px;
      height: 160px; overflow-y: auto; overflow-x: hidden;
      word-break: break-all; /* Łamie długie słowa — zapobiega przepełnieniu */
      font-size: clamp(10px, 0.9vw, 12px); line-height: 1.6;
      color: rgba(255, 255, 255, 0.82);
      scrollbar-width: thin; scrollbar-color: rgba(0, 212, 255, 0.28) transparent;
      display: flex; flex-direction: column; justify-content: flex-end;
      /* flex-direction:column + justify-content:flex-end = nowe wiadomości na dole */
    }
    #text::-webkit-scrollbar       { width: 3px; }
    #text::-webkit-scrollbar-thumb { background: rgba(0, 212, 255, 0.28); border-radius: 2px; }
    .chat-line { flex-shrink: 0; } /* Linie nie kurczą się nawet gdy okno jest małe */

    /* Input wiadomości czatu */
    #sendtext {
      width: 100%; height: 36px;
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(0, 212, 255, 0.28); border-top: none; /* Połączony z oknem #text */
      border-radius: 0 0 10px 10px; color: white;
      font-size: 12px; padding: 0 10px; outline: none; flex-shrink: 0;
    }
    #sendtext:focus { background: rgba(0, 212, 255, 0.07); }

    /* Podpowiedź sterowania (zdjęcie myszki, ukrywana przy pierwszej interakcji) */
    #info_box {
      z-index: 1; position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: clamp(220px, 30vw, 340px); height: auto;
      display: none; opacity: 0.88;
    }

    /* ══════════════════════════════════════════════════════════════
       EKRAN ODRODZENIA (RESPAWN SCREEN)
       Wyświetlany gdy gracz zginie.
       Zawiera: animowany GIF, ilość zarobionych punktów,
               timer 1s, przycisk RESPAWN.
    ══════════════════════════════════════════════════════════════ */

    #restart {
      display: none; /* Ukryty — pokazywany przez showRespawnMenu() */
      position: fixed; inset: 0; z-index: 80;
      align-items: center; justify-content: center;
    }

    /* Ciemne rozmyte tło za kartą odrodzenia */
    #restart-overlay {
      position: absolute; inset: 0;
      background: rgba(0, 0, 8, 0.83);
      backdrop-filter: blur(8px);
    }

    /* Karta odrodzenia — centralna biała karta */
    #restart-card {
      position: relative; z-index: 1;
      background: var(--pbg);
      border: 1px solid rgba(255, 215, 0, 0.26); /* Złoty border — inny niż niebieski lobby */
      border-radius: 22px;
      box-shadow: 0 0 70px rgba(255, 215, 0, 0.1), var(--glow);
      padding: 38px 46px 34px; text-align: center; min-width: 300px;
    }

    /* GIF jako dekoracyjne tło karty (opacity 0.1 = bardzo subtelne) */
    #conf-gif {
      position: absolute; inset: 0; width: 100%; height: 100%;
      object-fit: cover; border-radius: 22px;
      opacity: 0.1; pointer-events: none;
      animation: hue-cycle 6s linear infinite; /* Cyklicznie zmienia kolory */
    }
    @keyframes hue-cycle { to { filter: hue-rotate(360deg); } }

    .cg-label   { font-family: var(--fd); font-size: 12px; letter-spacing: 4px; color: rgba(255, 255, 255, 0.5); margin-bottom: 6px; }

    /* Liczba zarobionych punktów — duży złoty napis */
    #win_points { font-family: var(--fd); font-size: clamp(26px, 5vw, 44px); font-weight: 800; color: var(--no); text-shadow: 0 0 22px rgba(255, 215, 0, 0.6); margin: 8px 0 14px; }
    #bonus      { font-size: 14px; margin-bottom: 16px; line-height: 1.7; }
    #timer      { font-family: var(--fd); font-size: clamp(17px, 2.8vw, 26px); color: rgba(255, 255, 255, 0.7); letter-spacing: 2px; margin-bottom: 16px; }

    /* Przycisk odrodzenia — czerwony (kontrast z zielonym PLAY w lobby) */
    #rebut {
      display: none; /* Ukryty podczas 1-sekundowego odliczania, pokazywany przez JS */
      width: 100%; height: 56px;
      background: linear-gradient(135deg, #880000, #cc0000);
      border: none; border-top: 2px solid #ff4455;
      border-radius: 12px; color: white;
      font-family: var(--fd); font-size: 14px; font-weight: 700;
      letter-spacing: 2px; cursor: pointer;
      box-shadow: 0 0 22px rgba(255, 50, 50, 0.32);
      transition: transform 0.15s, box-shadow 0.2s;
      position: relative; z-index: 2; /* NAD GIF */
    }
    #rebut:hover { transform: translateY(-2px); box-shadow: 0 6px 30px rgba(255, 50, 50, 0.52); }

    /* Logo w prawym dolnym rogu (widoczne w lobby i na ekranie śmierci) */
    #game-logo { position: fixed; bottom: 16px; right: 16px; z-index: 1; }
    #game-logo img { width: clamp(88px, 12vw, 150px); border-radius: 12%; border: 1px solid rgba(0, 149, 255, 0.4); opacity: 0.86; cursor: pointer; transition: opacity 0.2s; }
    #game-logo img:hover { opacity: 1; }

    /* ── Animacje globalne ── */
    @keyframes pulse-neon {
      /*
        Pulsujący neonowy blask na panelu logowania.
        0%/100% = przyciemniany blask, 50% = intensywny blask.
        Tworzy efekt "żywego" panelu — jakby przez niego przepływał prąd.
      */
      0%, 100% { box-shadow: 0 0 10px rgba(0,212,255,0.35), 0 0 22px rgba(0,212,255,0.1); }
      50%       { box-shadow: 0 0 20px rgba(0,212,255,0.65), 0 0 48px rgba(0,212,255,0.25); }
    }
    @keyframes float-panel {
      /*
        Delikatne unoszenie panelu lobby w górę i w dół.
        translate(-50%, -50%) musi być zachowane w każdym keyframe
        bo zastępuje bazową transformację centrowania.
        Bez tego panel "skacze" do lewego górnego rogu na chwilę.
      */
      0%, 100% { transform: translate(-50%, -50%) translateY(0); }
      50%       { transform: translate(-50%, -50%) translateY(-6px); }
    }

    /* Panel logowania pulsuje neonowym blaskiem (3-sekundowy cykl) */
    #login { animation: pulse-neon 3s ease-in-out infinite; }

    /* ── Skalowanie UI — obsługiwane przez JS updateScale() ── */

    /* ── Layout mobilny ── */
    @media (max-width: 768px) {
      body { zoom: 1; }
      .ui-scale { zoom: 1; }

      #lobby-wrapper {
        flex-direction: column;
        top: 0; left: 0;
        transform: none;
        width: 100%;
        height: 100%;
        overflow-y: auto;
        padding: 16px;
        box-sizing: border-box;
        gap: 12px;
        animation: none;
      }

      #login {
        width: 100%;
        box-sizing: border-box;
        padding: 20px 16px;
      }

      #server-list-panel {
        width: 100%;
        box-sizing: border-box;
        max-height: 300px;
      }

      #sl-scroll {
        zoom: 1;
      }

      /* Ukryj ranking i chat podczas gry na mobilnym */
      #ranking { display: none !important; }
      #chat    { display: none !important; }
    }

  </style>
</head>
<body>

  <!-- ══════════════════════════════════════════════════════════════
       EKRANY ŁADOWANIA
       Loader 1: niebieski — tekstury, modele OBJ (THREE.LoadingManager)
       Loader 2: zielony  — generowanie sceny 3D, kompilacja shaderów GPU
  ══════════════════════════════════════════════════════════════ -->

  <!-- Loader 1 (niebieski) — widoczny od razu przy starcie -->
  <div id="loader-wrapper">
    <div id="loader-text">LOADING ASSETS... 0%</div>
    <div id="loader-bar-bg"><div id="loader-bar"></div></div>
  </div>

  <!-- Loader 2 (zielony) — ukryty, pokazywany przez JS gdy zaczyna się initGame() -->
  <div id="scene-loader" style="display:none;">
    <div id="sl-text">GENEROWANIE ŚWIATA... 0%</div>
    <div id="sl-bar-bg"><div id="sl-bar"></div></div>
  </div>

  <!-- Kontener reklamy pre-roll ale TODO (bedzie wypelniany przez zewn. skrypt) -->
  <div id="preroll"></div>

  <!-- Kanwy tła (wypełniane przez skrypt w sekcji niżej) -->
  <canvas id="bg-canvas"></canvas>       <!-- Retro-futurystyczna siatka perspektywiczna -->
  <canvas id="stars-canvas"></canvas>    <!-- Migotające gwiazdy -->

  <!-- ══════════════════════════════════════════════════════════════
       HUD — nakładka widoczna PODCZAS GRY
       Wszystkie elementy: display:none — pokazywane przez JS po wejściu do gry.
  ══════════════════════════════════════════════════════════════ -->

  <!-- Licznik poziomów (góra-środek): "45/90" — bieżący/checkpoint -->
  <div id="level" style="display:none;">Play</div>

  <!-- Panel czatu (lewy dolny róg) -->
  <div id="chat" style="display:none; flex-direction:column;">
    <div id="chat-label">CHAT · ENTER ABY WYSŁAĆ</div>
    <div id="text"></div><!-- Wiadomości wypełniane przez appendChat() -->
    <input id="sendtext" placeholder="Napisz wiadomość…"/>
  </div>

  <!-- TODO: Placeholder na reklamę sieciową (banner 300x250 — standardowy format) -->
  <div id="io_300x250" style="position:fixed;top:25%;left:18%;width:20%;height:40%;"></div>

  <!-- Podpowiedź sterowania — znika przy pierwszej interakcji (onmousedown/ontouchmove) -->
  <img
    src="/img/mouse.png"
    onmousedown="this.style.display='none'"
    ontouchmove="this.style.display='none'"
    id="info_box"
    draggable="false"
  />

  <!--
    Przycisk eventu — strzałka + licznik "X/10".
    Kliknięcie wysyła pakiet [2] do serwera gry (case 2: użycie eventu).
    onclick jest przypisywany dynamicznie przez JS (po otwarciu socketa gry).
    onhover — klasa CSS dla efektów hover.
  -->
  <div id="eventb" class="onhover" style="display:none;">
    <img src="/img/arrow.png" draggable="false"/>
    <div>1/10</div><!-- Aktualizowany przez pakiet case 11 z serwera -->
  </div>

  <!--
    Tablica wyników — 6 miejsc (TOP 6).
    Struktura: <font>1.</font><br> × 6 — <font> wypełniane przez hgm() case 9.
    children[0] = "1.", children[1] = <br>, children[2] = "2." itd.
    Indeks: ix*2 = 0,2,4,6,8,10 — co drugi element to tekst (bo co drugi to <br>).
    children[12] = 13. element — dodatkowy wiersz dla gracza poza TOP 6 (case 10).
  -->
  <div id="ranking" style="display:none;">
    <font>1.</font><br><font>2.</font><br><font>3.</font><br>
    <font>4.</font><br><font>5.</font><br><font>6.</font><br>
    <div style="border-top:1px solid rgba(0,212,255,0.22);display:none;margin-top:4px;padding-top:4px;"></div><br>
  </div>

  <!-- ══════════════════════════════════════════════════════════════
       LOBBY — panel logowania + lista serwerów
  ══════════════════════════════════════════════════════════════ -->
  <div id="lobby-wrapper">

    <!-- Panel logowania / rejestracji / wyboru skina -->
    <div id="login" style="color:white;">

      <!-- Formularz autoryzacji (logowanie lub rejestracja) -->
      <div id="auth-box">
        <!-- Zakładki: kliknięcie wywołuje switchTab('login') lub switchTab('register') -->
        <div class="auth-tabs">
          <button class="auth-tab active" id="tab-login"    onclick="switchTab('login')">LOGOWANIE</button>
          <button class="auth-tab"        id="tab-register" onclick="switchTab('register')">REJESTRACJA</button>
        </div>
        <!-- autocomplete="off" — wyłącz autouzupełnianie przeglądarki (niepotrzebne w grze) -->
        <input class="auth-input" id="auth-email" type="email"    placeholder="Nazwa użytkownika" autocomplete="off"/>
        <input class="auth-input" id="auth-pass"  type="password" placeholder="Hasło"             autocomplete="off"/>
        <div id="auth-msg"></div><!-- Komunikaty błędów / sukcesu -->
        <button id="auth-submit" onclick="doAuth()">ZALOGUJ SIĘ</button>
      </div>

      <!--
        Panel konta zalogowanego gracza.
        display:none — pokazywany przez JS (case 1 w handleMotherMessage).
        Struktura children[]:
          [0] = "Ranking name:"  (label)
          [1] = div z imieniem + ikoną ⚙  (dynamiczny)
          [2] = email (wypełniany przez JS: " gracz@email.com")
          [3] = punkty (wypełniany przez JS: " 15000 Gold")
          [4] = total_points (wypełniany przez JS: "Total: 45000")
          [5] = #logout (przycisk wylogowania — absolutny)
      -->
      <div id="account" style="display:none;">
        <div>NAZWA GRACZA:</div>
        <div>
          <span id="r_name" style="letter-spacing: 2px;"></span><!-- Imię gracza (aktualizowane przez JS) -->
          <input id="r_name_che" maxlength="19" style="display:none;" type="text"/><!-- Pole edycji imienia -->
          <span id="r_name_acc" style="font-family:var(--fb);font-size:14px;opacity:0.5;">⌨</span><!-- klikalność obsługiwana przez JS -->
        </div>
        <div>email</div>       <!-- Placeholder — nadpisywany przez JS (" user@x.com") -->
        <div style="letter-spacing: 1px;">points</div>      <!-- Placeholder — nadpisywany przez JS (" 15000 Gold")   -->
        <div>totalpoints</div> <!-- Placeholder — nadpisywany przez JS ("ŁĄCZNIE: 45000 🪙") -->
        <div id="logout">WYLOGUJ</div>
      </div>

      <!-- Pasek lokalizacji / wybranego serwera — aktualizowany przez setSelectedServer() -->
      <div id="country"><span id="country-label">Connecting…</span></div>

      <!-- Karuzela skinów: ‹ [obrazek] › -->
      <div class="skin-row">
        <div class="sk-btn left">&#8249;</div>   <!-- ‹ (U+2039 Single Left Angle Quotation) -->
        <img src="/img/skins/1.png" id="skins" draggable="false"/>
        <div class="sk-btn right">&#8250;</div>  <!-- › (U+203A Single Right Angle Quotation) -->
      </div>
      <div id="skins_price"></div><!-- Cena skina — pusta gdy posiadany, "Buy X" gdy nie -->

      <!-- Nick gracza (max 9 znaków — ograniczenie serwera) + przycisk PLAY -->
      <input type="text" maxlength="9" id="nick" placeholder="NICKNAME" autocomplete="off">
      <div onclick="init_run()" id="play">▶ &nbsp; DOLACZ DO GRY</div>
      <!--
        onclick="init_run()" — init_run() to alias przypisany
        w connectToMother() do właściwego handlera PLAY.

      -->

  <!-- ══════════════════════════════════════════════════════════════
       TŁO: GWIAZDY + SIATKA PERSPEKTYWICZNA
        
       Żadna zmienna z tego bloku nie wycieka do globalnego window.
       Działa całkowicie niezależnie od reszty gry — tylko animacja CSS canvas.
  ══════════════════════════════════════════════════════════════ -->
  <script>
  // ── Skalowanie UI ────────────────────────────────────────────────────────────
  // Zoom zmniejsza się tylko gdy okno jest węższe lub niższe niż sam UI.
  // Przy przeciągnięciu na pół monitora 2560x1440 (→ 1280x1440):
  //   szerokość 1280 > UI_W 760 → brak zmniejszania z powodu szerokości
  //   wysokość 1440  > UI_H 680 → brak zmniejszania z powodu wysokości
  //   wynik: zoom = MAX = 1.04 (bez zmian)
  (function () {
    const UI_W = 760;  // naturalna szerokość lobby (#login 440 + gap 16 + #server-list 285 + margines)
    const UI_H = 680;  // naturalna wysokość lobby
    const MAX  = 1.04; // maksymalny zoom

    function updateScale() {
      if (window.innerWidth <= 768) return; // mobile ma osobny layout
      const scaleX = window.innerWidth  >= UI_W ? MAX : window.innerWidth  / UI_W;
      const scaleY = window.innerHeight >= UI_H ? MAX : window.innerHeight / UI_H;
      document.body.style.zoom = Math.min(scaleX, scaleY, MAX);
    }

    updateScale();
    window.addEventListener('resize', updateScale);
  })();
  // ─────────────────────────────────────────────────────────────────────────────

  (function () {

    // ── CZĘŚĆ 1: MIGOTAJĄCE GWIAZDY ─────────────────────────────────────────

    const sc   = document.getElementById('stars-canvas');
    const sctx = sc.getContext('2d');
    /*
      getContext('2d') — pobiera kontekst Canvas 2D API.
      Umożliwia rysowanie kół, linii, gradientów na kanwie.
      WebGL 3D — tu nie potrzebujemy.
    */

    let W, H;       // szerokość i wysokość kanwy (aktualizowane przy resize)
    let stars = []; // tablica obiektów gwiazd { x, y, r, a, da }

    /**
     * Inicjalizuje rozmiar kanwy i tworzy 200 losowych gwiazd.
     * Wywoływana przy starcie i przy każdej zmianie rozmiaru okna (window resize).
     *
     * Każda gwiazda to obiekt:
     *   x  — pozycja X (0 do W)
     *   y  — pozycja Y (0 do H)
     *   r  — promień (0.2–1.8 px) — różne rozmiary = głębia (dalsze gwiazdy = mniejsze)
     *   a  — aktualna alfa (0–1) — jasność gwiazdy
     *   da — delta alfy (–0.003 do +0.003) — szybkość migotania (+ = jaśnieje, – = ciemnieje)
     */
    function initStars() {
      W = sc.width  = window.innerWidth;
      H = sc.height = window.innerHeight;
      stars = Array.from({ length: 200 }, () => ({
        x:  Math.random() * W,
        y:  Math.random() * H,
        r:  Math.random() * 1.6 + 0.2,    // promień: min 0.2px (pyłek), max 1.8px (jasna gwiazda)
        a:  Math.random(),                  // losowa startowa jasność (gwiazdy nie startują jednocześnie)
        da: (Math.random() - 0.5) * 0.006  // delta: -0.003 (ciemnieje) do +0.003 (jaśnieje)
      }));
    }

    /**
     * Rysuje jedną klatkę gwiazd — czyści kanwę i rysuje każdą gwiazdę z aktualizowaną alfą.
     *
     * Algorytm migotania:
     *   1. a += da (zmień jasność)
     *   2. Clamp a do zakresu 0.04–1.0
     *   3. Jeśli a na granicy → odwróć kierunek da (odbicie od ściany)
     * Efekt: gwiazda płynnie jaśnieje, osiąga maksimum, potem ciemnieje, znów jaśnieje.
     */
    function drawStars() {
      sctx.clearRect(0, 0, W, H); // Wyczyść całą kanwę (bez tego poprzednie klatki zostają)
      stars.forEach(p => {
        p.a = Math.max(0.04, Math.min(1, p.a + p.da));
        // Math.max(0.04, ...) — gwiazda nigdy nie znika całkowicie (min jasność 4%)
        // Math.min(1, ...)    — gwiazda nigdy nie przekracza pełnej jasności
        if (p.a <= 0.04 || p.a >= 1) p.da *= -1;
        // Odbicie: gdy gwiazda osiągnie limit → odwróć kierunek migotania

        sctx.beginPath();
        sctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); // Koło: startAngle=0, endAngle=2π = pełne koło
        sctx.fillStyle = `rgba(175, 215, 255, ${p.a})`; // Lekko niebieskawa biel (kolor gwiazdy)
        sctx.fill();
      });
    }

    // ── CZĘŚĆ 2: RETRO-FUTURYSTYCZNA SIATKA PERSPEKTYWICZNA ────────────────────
    // Efekt "synthwave" / "outrun" — siatka biegnąca w punkt ucieczkowy.
    // Całkowicie proceduralna — rysowana co klatkę bez żadnych obrazków.

    const bc  = document.getElementById('bg-canvas');
    const ctx = bc.getContext('2d');
    let t = 0; // globalny licznik klatek (inkrementowany w loop())

    function initBg() {
      bc.width  = window.innerWidth;
      bc.height = window.innerHeight;
    }

    /**
     * Rysuje jedną klatkę retro siatki perspektywicznej.
     *
     * Algorytm warstwy po warstwie:
     *   1. Gradient radialny jako tło (ciemnoszafirowe centrum → czarne krawędzie)
     *   2. Horyzont — świecący pasek w punkcie ucieczkowym
     *   3. Linie poziome — LINES linii biegnących od horyzontu w dół/górę
     *      (animowane przez 'speed' — płynna iluzja ruchu w głąb tunelu)
     *   4. Linie pionowe — COLS linii zbiegających się do punktu ucieczkowego
     *   5. "Słońce" — pulsujący gradientowy krąg na horyzoncie
     *   6. Paski zachodu słońca — 7 kolorowych poziomych pasków tuż nad horyzontem
     *   7. Mgła dolna i górna — ukrywa krawędzie siatki (realistyczny "zanik")
     *
     * Wszystkie kolory oparte na zmiennej hue (cykl 360° przez czas 't')
     * → cała siatka płynnie zmienia kolory od niebieskiego przez fioletowy do różowego.
     */
    function drawGrid() {
      const w  = bc.width, h = bc.height;
      const cx = w / 2;    // centrum X (punkt ucieczkowy = środek poziomy)
      const cy = h * 0.48; // centrum Y — lekko powyżej połowy ekranu (naturalny horyzont)
      const hue = (t * 0.012) % 360;
      // hue: zmienia się o 0.012 stopnia na klatkę.
      // Co 360/0.012 = 30000 klatek = ~500 sekund jeden pełny cykl kolorów (8 minut).
      // % 360 — zawijanie żeby nigdy nie przekroczyć 360°.

      ctx.clearRect(0, 0, w, h); // Wyczyść poprzednią klatkę

      // ── Warstwa 1: Gradient radialny tła ──
      const bg = ctx.createRadialGradient(cx, cy, 0, cx, cy, Math.max(w, h) * 0.8);
      bg.addColorStop(0,   `hsla(${(hue + 200) % 360}, 70%, 8%, 1)`);  // ciemno-niebieskie centrum
      bg.addColorStop(0.5, `hsla(${(hue + 220) % 360}, 80%, 4%, 1)`);  // jeszcze ciemniej
      bg.addColorStop(1,   'hsla(0, 0%, 0%, 1)');                       // czarne krawędzie
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, w, h);

      // ── Warstwa 2: Świecący horyzont ──
      const hg = ctx.createLinearGradient(0, cy - 120, 0, cy + 120);
      hg.addColorStop(0,    'rgba(0,0,0,0)');
      hg.addColorStop(0.45, `hsla(${hue}, 100%, 55%, 0.07)`);
      hg.addColorStop(0.5,  `hsla(${hue}, 100%, 65%, 0.18)`); // najjaśniejszy punkt = linia horyzontu
      hg.addColorStop(0.55, `hsla(${hue}, 100%, 55%, 0.07)`);
      hg.addColorStop(1,    'rgba(0,0,0,0)');
      ctx.fillStyle = hg;
      ctx.fillRect(0, cy - 120, w, 240);

      const LINES = 28;  // liczba linii poziomych
      const COLS  = 24;  // liczba linii pionowych
      const depth = 1200;
      const speed = (t * 1.1) % (depth / LINES);
      // speed: przesuwa linie poziome o 1.1 jednostki na klatkę.
      // % (depth/LINES) = zawijanie — gdy linia dotrze do horyzontu, teleportuje się z powrotem.
      // Efekt: płynna iluzja jazdy w głąb tunelu (jak w Geometry Dash lub synthwave).

      // ── Warstwa 3: Linie poziome (siatka podłogi/sufitu) ──
      for (let i = 0; i <= LINES; i++) {
        const z     = (i / LINES) * depth + speed; // Z = głębokość tej linii
        const scale = depth / z;                    // scale: bliżej = większy, dalej = mniejszy
        const y     = cy + (h * 0.5) * scale * 0.28; // dolna linia (pod horyzontem)
        const yt    = cy - (h * 0.5) * scale * 0.28; // górna linia (lustrzane odbicie nad horyzontem)
        if (y > h && yt < 0) continue; // poza ekranem — pomiń (optymalizacja)

        const alpha = Math.pow(Math.max(0, 1 - z / depth), 1.4) * 0.55;
        // alpha: odległe linie są niemal niewidoczne (zanikają przy horyzoncie).
        // Math.max(0, ...) — zapobiega ujemnym wartościom (dla z > depth).
        // Math.pow(..., 1.4) — nieliniowe ściemnianie (szybciej na początku, wolniej na końcu).
        // * 0.55 — maksymalna alfa = 55% (nie za intensywne).
        if (alpha <= 0) continue; // całkowicie niewidoczna — pomiń

        // Gradient poziomy dla płynnego zanikania linii na krawędziach ekranu
        const glow = ctx.createLinearGradient(0, 0, w, 0);
        glow.addColorStop(0,   'rgba(0,0,0,0)');                                      // lewa krawędź: przezroczysta
        glow.addColorStop(0.2, `hsla(${hue}, 100%, 60%, ${alpha})`);
        glow.addColorStop(0.5, `hsla(${(hue + 30) % 360}, 100%, 70%, ${alpha * 1.3})`); // środek: jaśniejszy (+30° odcień)
        glow.addColorStop(0.8, `hsla(${hue}, 100%, 60%, ${alpha})`);
        glow.addColorStop(1,   'rgba(0,0,0,0)');                                      // prawa krawędź: przezroczysta

        // Dolna linia (grubsza, bardziej widoczna)
        ctx.beginPath(); ctx.moveTo(0, y);  ctx.lineTo(w, y);
        ctx.strokeStyle = glow; ctx.lineWidth = alpha * 2.5; ctx.stroke();

        // Górna linia — lustrzane odbicie, cieńsza i słabsza
        ctx.beginPath(); ctx.moveTo(0, yt); ctx.lineTo(w, yt);
        ctx.strokeStyle = glow; ctx.lineWidth = alpha * 1.8; ctx.stroke();
      }

      // ── Warstwa 4: Linie pionowe (zbiegają się do punktu ucieczkowego) ──
      for (let i = 0; i <= COLS; i++) {
        const fx    = (i / COLS - 0.5) * w * 2.8; // odległość od centrum X (fan-out do krawędzi)
        const nx    = (i / COLS) * w;               // pozycja X na dole ekranu
        const alpha = (1 - Math.abs(i / COLS - 0.5) * 1.6) * 0.42;
        // alpha: linie na skraju ekranu są ciemniejsze (krawędziowe = mniej ważne wizualnie).
        // 1 - |i/COLS - 0.5| * 1.6: centrum = jasne, krawędzie = niewidoczne.
        if (alpha <= 0) continue;

        const hueV = (hue + i * 5) % 360; // każda linia ma lekko inny odcień (+5° na linię)

        // Dolna siatka: od punktu ucieczkowego (cx + fx*0.001 ≈ cx) do dołu ekranu
        ctx.beginPath();
        ctx.moveTo(cx + fx * 0.001, cy); // prawie dokładnie cx (fx*0.001 = minimalne przesunięcie)
        ctx.lineTo(nx, h);
        ctx.strokeStyle = `hsla(${hueV}, 100%, 62%, ${alpha})`;
        ctx.lineWidth = 0.7; ctx.stroke();

        // Górna siatka: ta sama logika ale do góry (jaśniejsza — 60% * 0.6)
        ctx.beginPath();
        ctx.moveTo(cx + fx * 0.001, cy);
        ctx.lineTo(nx, 0);
        ctx.strokeStyle = `hsla(${hueV}, 100%, 62%, ${alpha * 0.6})`;
        ctx.lineWidth = 0.5; ctx.stroke();
      }

      // ── Warstwa 5: Centralny blask "słońca" (pulsujący) ──
      const sunR = 140 + 18 * Math.sin(t * 0.022);
      // Promień: 122–158px, pulsuje co ~286 klatek (4.7s przy 60fps).
      const sun  = ctx.createRadialGradient(cx, cy, 0, cx, cy, sunR);
      sun.addColorStop(0,   `hsla(${(hue + 30) % 360}, 100%, 90%, 0.22)`); // jasne centrum
      sun.addColorStop(0.3, `hsla(${hue}, 100%, 65%, 0.14)`);
      sun.addColorStop(0.7, `hsla(${(hue + 15) % 360}, 100%, 50%, 0.06)`);
      sun.addColorStop(1,   'rgba(0,0,0,0)');                               // przezroczysta krawędź
      ctx.fillStyle = sun;
      ctx.beginPath(); ctx.arc(cx, cy, sunR, 0, Math.PI * 2); ctx.fill();

      // ── Warstwa 6: Paski zachodu słońca (tuż nad horyzontem) ──
      const stripes = 7;
      for (let i = 0; i < stripes; i++) {
        const sy = cy + 2 + i * (2.8 + i * 0.6); // Y: kolejne paski przesunięte co raz bardziej
        const sw = w * (1 - i * 0.07);             // szerokość: dalsze paski węższe (trapez)
        const sx = (w - sw) / 2;                   // X: centrum (wyśrodkowane)
        const sa = (1 - i / stripes) * 0.28;       // alfa: górny pasek najjaśniejszy
        ctx.fillStyle = `hsla(${(hue - i * 8 + 360) % 360}, 100%, 65%, ${sa})`;
        // Każdy pasek ma inny odcień (od hue do hue-56°) — gradient kolorów zachodu słońca.
        ctx.fillRect(sx, sy, sw, 1.5 - i * 0.1); // coraz cieńsze paski
      }

      // ── Warstwa 7a: Mgła dolna (ukrywa krawędź siatki na dole) ──
      const fog = ctx.createLinearGradient(0, h * 0.7, 0, h);
      fog.addColorStop(0, 'rgba(0,0,0,0)');
      fog.addColorStop(1, `hsla(${(hue + 200) % 360}, 60%, 3%, 0.92)`); // ciemno-niebieska mgła
      ctx.fillStyle = fog;
      ctx.fillRect(0, h * 0.7, w, h * 0.3);

      // ── Warstwa 7b: Mgła górna (ukrywa krawędź siatki na górze) ──
      const fogT = ctx.createLinearGradient(0, 0, 0, h * 0.3);
      fogT.addColorStop(0, `hsla(${(hue + 200) % 360}, 60%, 2%, 0.85)`);
      fogT.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = fogT;
      ctx.fillRect(0, 0, w, h * 0.3);
    }

    /**
     * Główna pętla animacji tła.
     * Inkrementuje t (timer) i rysuje obie kanwy.
     * requestAnimationFrame zapewnia:
     *   - synchronizację z odświeżaniem monitora (60/120Hz)
     *   - automatyczne pauzowanie gdy karta jest ukryta (oszczędność CPU)
     *   - brak "rozerwania" klatek (vsync)
     */
    function loop() {
      t++;              // globalny timer — podstawa wszystkich animacji siatki
      drawGrid();       // rysuj siatkę perspektywiczną
      drawStars();      // rysuj gwiazdy
      requestAnimationFrame(loop); // zaplanuj następną klatkę
    }

    // Przy zmianie rozmiaru okna: ponowna inicjalizacja obydwu kanw.
    // Bez tego kanwy byłyby "rozciągnięte" CSS'em przy innym rozmiarze.
    window.addEventListener('resize', () => {
      initBg();
      initStars();
    });

    initStars(); // Utwórz gwiazdy przed pierwszą klatką
    initBg();    // Ustaw rozmiary kanwy tła
    loop();      // Uruchom pętlę animacji tła
  })();
  </script>

  <!-- ══════════════════════════════════════════════════════════════
       SILNIK 3D — Three.js + OBJLoader + logika gry
       Ładowane synchronicznie (nie async) — muszą być gotowe zanim
       kod w następnym bloku <script> je użyje.
  ══════════════════════════════════════════════════════════════ -->
  <script src="js/three.js"></script>     <!-- Silnik Three.js (WebGL abstraction) -->
  <script src="js/OBJLoader.js"></script> <!-- Loader plików OBJ (modele 3D) -->
  <script src="js/asd.js"></script>       <!-- tekstury -->

  <script>
  // ══════════════════════════════════════════════════════════════════
  //  PRELOADER ASSETÓW (THREE.LoadingManager)
  //
  //  LoadingManager śledzi postęp ładowania WSZYSTKICH zasobów Three.js:
  //  tekstur (TextureLoader), modeli (OBJLoader), obrazków (ImageLoader).
  //  Po załadowaniu wszystkich: onLoad() → ukryj loader → pokaż lobby.
  // ══════════════════════════════════════════════════════════════════

  const loadingManager = new THREE.LoadingManager();
  /*
    THREE.LoadingManager — centralny menedżer dla wszystkich loaderów.
    Wszystkie loadery (textureLoader, objLoader, imageLoader) są do niego "podpięte".
    Śledzi: ile zasobów już załadowano / ile łącznie.
    Callbacki:
      onProgress(url, loaded, total) — wywoływany po każdym załadowanym zasobie
      onLoad()                       — wywoływany gdy WSZYSTKIE zasoby gotowe
      onError(url)                   — wywoływany gdy zasób nie mógł się załadować
  */

  const textureLoader = new THREE.TextureLoader(loadingManager);
  const objLoader     = new THREE.OBJLoader(loadingManager);
  const imageLoader   = new THREE.ImageLoader(loadingManager);
  /*
    Trzy typy loaderów — każdy dla innego formatu:
      TextureLoader — obrazki PNG/JPG → obiekty THREE.Texture (używane na materiałach)
      OBJLoader     — pliki .obj (Wavefront) → obiekty THREE.Group z siatkami mesh
      ImageLoader   — obrazki do cache przeglądarki (nie używane bezpośrednio w Three.js)
                      Preładujemy je żeby były gotowe gdy HTML potrzebuje src= lub CSS background.
  */

  // Cache wstępnie załadowanych zasobów
  const preloaded = {
    tl:    {},   // tekstury: { t_sky, t_def, t_l1, t_sto } — THREE.Texture objects
    ltc:   [],   // tekstury poziomów: [0.png, 1.png, 2.png, ...] — dla cylindra gry
    col1:  null, // model kolumny cylindra — THREE.Group (klonowany 128× na ring)
    skins: {}    // preładowane modele skinów: { 1: THREE.Group, 2: ..., 3: ..., 4: ... }
  };

  /**
   * Callback wywoływany po każdym załadowanym zasobie przez LoadingManager.
   * Aktualizuje pasek postępu i tekst loaderów.
   * @param {string} url         - URL właśnie załadowanego zasobu
   * @param {number} itemsLoaded - ile zasobów załadowanych do tej pory
   * @param {number} itemsTotal  - łączna liczba zasobów do załadowania
   */
  loadingManager.onProgress = function (url, itemsLoaded, itemsTotal) {
    const pct = Math.round((itemsLoaded / itemsTotal) * 100);
    document.getElementById('loader-bar').style.width = pct + '%';
    document.getElementById('loader-text').innerText  = 'LOADING ASSETS... ' + pct + '%';
  };

  /**
   * Callback wywoływany gdy WSZYSTKIE assety zostały załadowane.
   * Sekwencja:
   *   1. Ukryj Loader 1 (niebieski)
   *   2. Jeśli brak tokenu gry (jesteśmy w lobby) — pokaż panel lobby
   *   3. Połącz z Mother Serverem (lobby WebSocket)
   *

  loadingManager.onLoad = function () {

  preloaded.tl.t_l1  = textureLoader.load('img/wood.jpg');

  preloaded.tl.t_sto = textureLoader.load('img/c2.jpg');
  // Tekstura kamiennych kolumn cylindra (te same co t_def).

  preloaded.ltc[0] = textureLoader.load('img/lvl/0.png');

  }

  // ══════════════════════════════════════════════════════════════════
  //  CACHE MODELI (lazy load — ładowane przy pierwszym użyciu w grze)
  // ══════════════════════════════════════════════════════════════════

  const skinModelCache   = [];
  // Cache załadowanych modeli skinów: skinModelCache[skin_id] = THREE.Group
  // Dlaczego cache? Każdy gracz ze skinem X potrzebuje klona tego samego modelu.
  // Bez cache: ładowalibyśmy ten sam plik .obj wielokrotnie.
  // Z cache:   ładujemy raz, potem clone() → O(1) zamiast O(n).

  const weaponModelCache = [];
  // Cache modeli broni (analogiczny do skinModelCache).

  /**
   * Ładuje model 3D skina gracza i dodaje go do jego obiektu THREE.Group.
   * Używa dwupoziomowego cache:
   *   1. preloaded.skins — modele preładowane przez LoadingManager przy starcie
   *   2. skinModelCache  — modele załadowane lazy podczas gry
   *
   * @param {string|number} name    - ID skina (1–22)
   * @param {object}        player  - obiekt Player (player.obj = THREE.Group)
   * @param {object|null}   pl      - efekt świetlny / płomień (opcjonalny)
   * @param {object|null}   ns      - TextSprite nicku nad modelem (opcjonalny)
   */
  function loadPlayerModel(name, player, pl, ns) {
    if (!skinModelCache[name]) {
      // Model nie w cache — załaduj (lub użyj preloaded)
      const tex = textureLoader.load('obj/' + name + '.png');
      // Tekstura dla tego skina — ładujemy za każdym razem (cache przeglądarki zadziała)

      if (preloaded.skins[name]) {
        // Model był preładowany przy starcie (skiny 1–4) — użyj od razu
        const o = preloaded.skins[name].clone();
        o.children[0].material = new THREE.MeshBasicMaterial({ map: tex });
        // MeshBasicMaterial — nie reaguje na oświetlenie (szybsze, stałe kolory)
        o.scale.set(14, 14, 14); // skalowanie modelu do rozmiaru gracza w cylindrze
        player.obj.add(o.clone()); // klonujemy bo jeden model może być u wielu graczy
        if (pl) player.obj.add(pl); // efekt świetlny (np. płomień)
        if (ns) player.obj.add(ns); // sprite nicku
        skinModelCache[name] = o;   // zapisz do cache
      } else {
        // Model nie był preładowany — asynchroniczny load (skiny 5–22)
        objLoader.load('obj/' + name + '.obj', function (o) {
          o.children[0].material = new THREE.MeshBasicMaterial({ map: tex });
          o.scale.set(14, 14, 14);
          player.obj.add(o.clone());
          if (pl) player.obj.add(pl);
          if (ns) player.obj.add(ns);
          skinModelCache[name] = o;
          // Po załadowaniu: model pojawia się u gracza z minimalnym opóźnieniem sieci
        });
      }
    } else {
      // Model w cache — klonuj bezpośrednio (natychmiastowe)
      player.obj.add(skinModelCache[name].clone());
      if (pl) player.obj.add(pl);
      if (ns) player.obj.add(ns);
    }
  }

  /**
   * Ładuje model 3D broni i podpina do obiektu gracza.
   * Analogiczny do loadPlayerModel ale dla broni.
   * @param {object}        player - obiekt Player
   * @param {string|number} name   - ID/nazwa modelu broni
   */
  function loadWeaponModel(player, name) {
    if (!weaponModelCache[name]) {
      objLoader.load('obj/w/' + name + '.obj', function (o) {
        weaponModelCache[name] = o;
        player.obj.add(o.clone());
      });
    } else {
      player.obj.add(weaponModelCache[name].clone());
    }
  }

  // ── Sprawdzenie obsługi WebGL ──
  /**
   * Sprawdza czy przeglądarka obsługuje WebGL.
   * Bez WebGL Three.js nie może renderować sceny 3D.
   * Fallback: przekierowanie na google.com 
   */
  function checkWebGLSupport() {
    const cv = document.createElement('canvas');
    const gl = cv.getContext('webgl') || cv.getContext('experimental-webgl');
    // experimental-webgl — stara nazwa WebGL w pierwszych implementacjach (Chrome <15, Firefox <10)
    if (!(gl instanceof WebGLRenderingContext)) {
      alert("Sorry, your browser doesn't support WebGL. Try google.com");
      location = 'http://google.com';
    }
  }
  checkWebGLSupport(); // Wywołaj natychmiast — bez WebGL nie ma sensu ładować reszty

  // ══════════════════════════════════════════════════════════════════
  //  NARZĘDZIA POMOCNICZE
  // ══════════════════════════════════════════════════════════════════

  /**
   * Rozszerzenie Array.prototype — usuwa pierwsze wystąpienie wartości z tablicy.
   * Używane w: lastVisiblePlayers, destructor gracza.
   * @param {*} v - wartość do usunięcia
   */
  Array.prototype.rm_val = function (v) {
    const i = this.indexOf(v);
    if (i !== -1) this.splice(i, 1);
    // indexOf: O(n) — znajdź indeks
    // splice(i, 1): O(n) — usuń 1 element na pozycji i, przesuń pozostałe
  };

  /**
   * Memoizowany selektor DOM — lekki odpowiednik jQuery $().
   *
   * Dlaczego memoizacja?
   *   document.querySelector('.class') przy każdym wywołaniu przeszukuje cały DOM.
   *   Przy 60 fps × wiele wywołań = setki zapytań DOM na sekundę.
   *   Cache: pierwsze wywołanie → querySelector → zapisz wynik.
   *           kolejne → zwróć z cache (natychmiastowe, bez przeszukiwania DOM).
   *
   * UWAGA: cache nigdy nie jest invalidowany.
   *   Elementy nie są tworzone/usuwane dynamicznie — bezpieczne.
   *   Gdyby były usuwane: cache zawierałby stare referencje (wyciek pamięci).
   *
   * @param {string} selector - selektor CSS (np. '#login', '.sv-row')
   * @returns {Element} znaleziony element DOM
   */
  const $ = (function () {
    const cache = {}; // obiekt jako słownik: { '#login': element, ... }
    return function (selector) {
      if (!cache[selector]) cache[selector] = document.querySelector(selector);
      return cache[selector];
    };
  })();
  // tworzy prywatną zmienną cache, niewidoczną z zewnątrz.
  // $ jest publiczne, cache jest prywatne.

  /**
   * Konwertuje skompresowaną wartość punktów (byte 0–255) na czytelny string.
   *
   * Ten sam algorytm co to_bignum_byte() w child.js ale odwrotny kierunek:
   *   byte → string (np. 150 → "600 K")
   *
   * Zakresy (odwrócone z kompresji):
   *   255       → "6,6+ M"    
   *   190–255   → "X.X M"       (miliony, co 100K)
   *   101–189   → "X00 K"       (setki tysięcy, co 10K)
   *   1–100     → "X K"         (tysiące, co 1K)
   *   0         → "0+"          (poniżej 1000 punktów)
   *
   * @param {number} v - skompresowana wartość 0–255
   * @returns {string} czytelny string punktów
   */
  function formatPointsByte(v) {
    if (v === 255) return '6,6+ M';                         // 
    if (v > 189)  return ((v - 189) / 10) + ' M';          // 1M–6.6M
    if (v > 100)  return ((v - 100) * 10 + 100) + ' K';    // 100K–1M
    if (v)        return v + ' K';                          // 1K–100K
    return '0+';                                             // 0–999 (poniżej 1K)
  }

  // ══════════════════════════════════════════════════════════════════
  //  STAŁE I ZMIENNE GLOBALNE LOBBY
  // ══════════════════════════════════════════════════════════════════

  const MOTHER_PORT = 3001;
  // Port serwera lobby (mother.js) — WebSocket na tym porcie obsługuje:
  //   listę gier, konta, tokeny, skiny, czat lobby.

  // Kody krajów do automatycznego wyboru serwera regionalnego.
  const EU_C = ['AT','BE','BG','CY','CZ','DE','DK','EE','EL','ES','FI','FR','HR','HU','IE','IT','LT','LU','LV','MT','NL','PL','PT','RO','SE','SI','SK','UK','RU'];
  // Kraje UE + UK + RU — dla tych krajów preferujemy serwer EU.
  const US_C = ['US','CA','AR','PE','CO','PA','EC','BR','CL','CW'];
  // Kraje Ameryk — dla tych krajów preferujemy serwer US.
  // Reszta świata (ASIA itp.) fallbackuje do EU jako bliższy.

  // Mapowania kodów regionów na czytelne etykiety i flagi emoji
  const SRV_LABELS = { US: 'Server America', EU: 'Server Europe', XX: 'No Server' };
  const SRV_FLAGS  = { US: '🇺🇸', EU: '🌍', XX: '❓' };
  // XX = nieznany region (gdy serwer gry ma nieustawiony g_location)

  // ── Stan lobby ──

  let selectedGame    = null;
  // Aktualnie wybrany serwer gry { g_id, g_players_len, g_players_lim, g_location, g_name }.
  // null = brak wyboru (gracz jeszcze nie wybrał serwera).

  let games           = [];
  // Lista dostępnych serwerów gier — aktualizowana przez pakiet case 2 od Mother Servera.
  // Każdy element: { g_id, g_players_len, g_players_lim, g_location, g_name }

  let gameToken       = null;
  // Token sesji gry — uint32 przydzielany przez Mother Server po kliknięciu PLAY.
  // null = gracz w lobby, liczba = gracz w grze (lub oczekuje na wejście).
  // Używany do reconnect i jako flaga "czy jesteśmy w grze".

  let skinId          = 1;
  // ID aktualnie wybranego skina (1–22, domyślnie 1 = darmowy startowy skin).
  // Zmieniany przez cycleSkin(), zapisywany do localStorage('skin_id').

  let skins           = null;
  // Tablica cen skinów od Mother Servera (typ case 3): skins[0..22] = cena w punktach.
  // null = nie załadowano jeszcze (Mother Server nie odpowiedział).

  let accountSkins    = null;
  // Lista skinów posiadanych przez zalogowanego gracza: [3, 7, 12, ...].
  // null = gracz niezalogowany lub brak danych.

  let lightSkins      = null;
  // Tablica kolorów neonowych skinów od Mother Servera (typ case 3).
  // lightSkins[skin_id] = hex color (np. 0x00d4ff dla skina 1).

  let selectedCountry = 'EU';
  // Kod regionu aktualnie wybranego serwera.
  // Aktualizowany przez setSelectedServer().

  let siteLocation    = null;
  // Wykryty kraj gracza przez endpoint /lang (Cloudflare header).
  // null = nie wykryto (fetchLocation() jeszcze nie zakończył).

  let waitingForAuth  = false;
  // Flaga: czy trwa oczekiwanie na wysłanie pakietu auth do Mother Servera.
  // Zapobiega wielokrotnemu uruchomieniu pollForAuth().

  let isConnected     = false;
  // Czy WebSocket z Mother Serverem jest aktualnie otwarty.
  // Sprawdzane przed każdym wysyłaniem pakietu.

  let motherSocket    = null;
  // Referencja do WebSocket połączenia z Mother Serverem.
  // null gdy rozłączony.

  // ---------------------
  // TODO:
  let showAd          = true;
  // Flaga "pokaż reklamę przy następnym respawnie".
  // Przełączana naprzemiennie: true → false → true ...
  // Nie każdy respawn = reklama — co drugi (oszczędność dla gracza).

  let hasAd           = false;
  // Flaga: czy reklamy są dostępne (ads.txt załadowało się).
  // false = gracz ma AdBlocka — nie możemy wyświetlić reklamy.
  // ---------------------

  let playerLevel     = 0;
  // Bieżący poziom gracza w cylindrze (aktualizowany w Player.set_pos()).
  // Wyświetlany w #level jako "45/90".

  const packetSender = new PacketSet(600);
  // Instancja PacketSet — bufor do budowania pakietów do Mother Servera.
  // 600 bajtów = wystarczający bufor dla wszystkich pakietów lobby.

  // ══════════════════════════════════════════════════════════════════
  //  AUTOMATYCZNE ODŚWIEŻANIE LISTY SERWERÓW
  //
  //  Co 500ms: wysyła pakiet type 6 do Mother Servera.
  //  Mother odpowiada pakietem type 2 z aktualną listą serwerów.
  //
  //  Dlaczego co 500ms zamiast WebSocket push?
  //    Mother też pushuje przez Redis 'lobby_update' → broadcast_games().
  //    To jest dodatkowe "pull" jako backup — gdyby push się spóźnił.
  //    500ms = wystarczająco szybko żeby lista wyglądała na live.
  // ══════════════════════════════════════════════════════════════════

  setInterval(function () {
    if (gameToken || !isConnected || !motherSocket) return;
    // gameToken = gracz jest w grze → nie odświeżaj lobby
    // !isConnected = socket nie otwarty → nie wysyłaj (błąd)
    // !motherSocket = socket null → nie wysyłaj (błąd)

    packetSender.new_type(6);
    // Type 6 = "daj mi aktualną listę gier" — Mother odpowie pakietem type 2.
    motherSocket.send(packetSender.get_buf());
  }, 500);

  // ══════════════════════════════════════════════════════════════════
  //  LISTA SERWERÓW — RENDERING DOM (diff update)
  //
  //  Zamiast container.innerHTML = '' (usuwa wszystko i tworzy od nowa),
  //  używamy podejścia "diff":
  //    - Aktualizuj istniejące wiersze jeśli można
  //    - Dodaj nowe jeśli lista urosła
  //    - Usuń nadmiarowe jeśli lista zmalała
  //
  //  Dlaczego diff?
  //    Pełne odtworzenie DOM co 500ms:
  //      - Usuwa focus/hover od użytkownika (miga przy scrollowaniu)
  //      - Przeprowadza reflow/repaint całego panelu (wolno)
  //    Diff: minimalne zmiany DOM = brak migotania = responsywny UI.
  // ══════════════════════════════════════════════════════════════════

  /**
   * Aktualizuje DOM listy serwerów przy minimalnych zmianach.
   * Wywoływana po każdym odebraniu pakietu type 2 od Mother Servera.
   */
  function rebuildServerList() {
    const container = document.getElementById('sl-rows');

    // Brak serwerów → pokaż komunikat i wyczyść pasek lokalizacji
    if (!games.length) {
      container.innerHTML = '<div style="text-align:center;color:rgba(255,255,255,0.28);font-family:\'Orbitron\',monospace;font-size:10px;letter-spacing:2px;padding:22px 0;">BRAK DOSTĘPNYCH SERWERÓW</div>';
      document.getElementById('country-label').innerHTML = '🌐 &nbsp; Szukanie...';
      return;
    }

    // Jeśli w kontenerze jest "loading div" (bez klasy sv-row) → wyczyść
    if (container.children.length > 0 && !container.children[0].classList.contains('sv-row')) {
      container.innerHTML = '';
      // Wyczyść tylko gdy jest placeholder (LOADING… div) — nie gdy są wiersze
    }

    // Usuń nadmiarowe wiersze (lista serwerów zmalała)
    while (container.children.length > games.length) {
      container.removeChild(container.lastChild);
    }

    // Utwórz lub zaktualizuj wiersze
    games.forEach(function (game, index) {
      const pct    = Math.min(100, Math.round((game.g_players_len / game.g_players_lim) * 100));
      // Procent zapełnienia (0–100) — dla paska .sv-bar
      const isFull  = game.g_players_len >= game.g_players_lim;
      // Pełny serwer → klasa sv-full, kursor not-allowed, brak onclick
      const isSel   = selectedGame && selectedGame.g_id === game.g_id;
      // Zaznaczony → klasa sv-selected + widoczna ikona ✓
      const flag    = SRV_FLAGS[game.g_location] || '🌐';
      // Flaga emoji lub 🌐 jako fallback
      const label   = game.g_name || SRV_LABELS[game.g_location] || game.g_location;
      // Nazwa: własna (np. "EU-Phantom") lub generyczna lub kod lokalizacji

      let row = container.children[index]; // istniejący wiersz (może być undefined)

      // Tworzenie nowego wiersza jeśli jeszcze nie istnieje
      if (!row) {
        row = document.createElement('div');
        row.innerHTML = `
          <div class="sv-l">
            <span class="sv-flag"></span>
            <div>
              <div class="sv-name"></div>
              <div class="sv-sub"></div>
            </div>
          </div>
          <div class="sv-r">
            <div class="sv-bar-bg"><div class="sv-bar"></div></div>
            <div class="sv-tick">✓</div>
          </div>`;
        container.appendChild(row);
      }

      // Aktualizacja zawartości wiersza (niezależnie czy nowy czy istniejący)
      row.className = 'sv-row' + (isSel ? ' sv-selected' : '') + (isFull ? ' sv-full' : '');
      row.querySelector('.sv-flag').textContent = flag;
      row.querySelector('.sv-name').textContent = label;
      row.querySelector('.sv-sub').innerHTML  = '<span class="sv-players">' + game.g_players_len + '/' + game.g_players_lim + '</span> graczy';
      // Podtytuł: "# indeks  3/15"

      const bar = row.querySelector('.sv-bar');
      bar.style.width = pct + '%';                        // szerokość paska zapełnienia
      bar.className   = 'sv-bar' + (isFull ? ' full' : ''); // czerwony pasek gdy pełny

      // Kliknięcie wybiera serwer (tylko gdy nie jest pełny)
      if (!isFull) {
        row.onclick = (function (g, i) {
          return function () { setSelectedServer(g, i); rebuildServerList(); };
          // Domknięcie: (g, i) są "zamrożone" dla tego kliknięcia.
          // Bez domknięcia: game i index zmieniłyby się przez forEach gdy klikniesz.
        })(game, index);
      } else {
        row.onclick = null; // pełny serwer — nie można wybrać
      }
    });
  }

  // ══════════════════════════════════════════════════════════════════
  //  LOKALIZACJA I REKLAMY
  // ══════════════════════════════════════════════════════════════════

  /**
   * Pobiera kod kraju gracza z endpointa /lang (przez TODO: Cloudflare header).
   * Wynik: siteLocation = "PL", "DE", "US" itp.
   * Używany przez findBestServer() do automatycznego wyboru serwera regionalnego.
   */
  function fetchLocation() {
    const xhr = new XMLHttpRequest();
    xhr.open('GET', '/lang', true); // GET /lang → Express odpowiada req.headers['cf-ipcountry']
    xhr.setRequestHeader('Content-type', 'application/x-www-form-urlencoded');
    xhr.send();
    xhr.onload = function () {
      if (xhr.responseText.length) {
        siteLocation = xhr.responseText; // np. "PL"
        if (games) findBestServer(games, xhr.responseText);
        // Jeśli lista gier już załadowana → wybierz serwer od razu
      } else {
        // Brak odpowiedzi (Cloudflare nie jest przed serwerem / lokalny dev)
        if (games) findBestServer(games, 'XX');
        siteLocation = 'XX'; // nieznany kraj
      }
    };
  }

  /**
   * Sprawdza dostępność reklam przez pobranie /ads.txt.
   * Jeśli plik dostępny → hasAd = true (brak AdBlocka).
   * Jeśli niedostępny (AdBlock zablokował) → hasAd pozostaje false.
   */
  function fetchAds() {
    const xhr = new XMLHttpRequest();
    xhr.open('GET', '/ads.txt', true);
    xhr.setRequestHeader('Content-type', 'application/x-www-form-urlencoded');
    xhr.send();
    xhr.onload = function () { hasAd = true; };
    // Jeśli /ads.txt wróci → reklamy dostępne.
    // AdBlock często blokuje /ads.txt → onload się nie wywoła → hasAd = false.
  }
