  // ══════════════════════════════════════════════════════════════════

  /**
   * Wybiera najlepszy dostępny serwer na podstawie kraju gracza.
   *
   * Algorytm (priorytet):
   *   1. Szukaj serwera w preferowanym regionie (EU lub US) z wolnymi miejscami.
   *      Bierze PIERWSZY znaleziony — zakładamy że lista jest posortowana wg jakości.
   *   2. Fallback: jeśli brak serwera regionalnego → bierz serwer z max graczami
   *      (z wolnymi miejscami) z dowolnego regionu.
   *      Logika: serwer z większą liczbą graczy jest "bardziej aktywny" = lepsza gra.
   *
   * @param {Array}  gl  - lista serwerów gier
   * @param {string} geo - kod ISO kraju gracza (np. "PL", "US", "XX")
   */
  function findBestServer(gl, geo) {
    let region;
    if (geo === 'XX') {
      // Nieznany kraj → wykryj przez język przeglądarki
      const lang = window.navigator.userLanguage || window.navigator.language;
      // userLanguage — IE/Edge, language — standard
      region = (lang.indexOf('US') !== -1 || lang.indexOf('us') !== -1) ? 'US' : 'EU';
    } else {
      region = (US_C.indexOf(geo) !== -1) ? 'US' : 'EU';
      // Jeśli kraj w liście US_C → 'US', inaczej → 'EU'
    }

    // Krok 1: Szukaj w preferowanym regionie
    for (let i = 0; i < gl.length; i++) {
      const g = gl[i];
      if (g.g_location.indexOf(region) !== -1 && g.g_players_len < g.g_players_lim) {
        // g_location.indexOf(region): sprawdza czy string lokalizacji zawiera region
        // np. "EU" indexOf "EU" → 0 (znaleziono), "US" indexOf "EU" → -1 (nie znaleziono)
        setSelectedServer(g, i);
        return; // Znaleziono → zakończ szukanie
      }
    }

    // Krok 2: Fallback — serwer z max graczami z dowolnego regionu
    if (gl.length) {
      let bestCount = 0, bestIndex = 0;
      for (let i = 0; i < gl.length; i++) {
        const g = gl[i];
        if (g.g_players_len > bestCount && g.g_players_len < g.g_players_lim) {
          bestCount = g.g_players_len;
          bestIndex = i;
          // Aktualizuj "najlepszy" gdy znajdziemy serwer z więcej graczami (ale nie pełny)
        }
      }
      setSelectedServer(gl[bestIndex], bestIndex);
    }
  }

  /**
   * Ustawia wybrany serwer i aktualizuje pasek lokalizacji w UI.
   * @param {object} game  - obiekt serwera
   * @param {number} index - indeks na liście
   */
  function setSelectedServer(game, index) {
    selectedGame    = game;
    selectedCountry = game.g_location;
    const flag = SRV_FLAGS[game.g_location] || '🌐';
    document.getElementById('country-label').innerHTML =
      flag + ' &nbsp;' + (game.g_name || SRV_LABELS[game.g_location] || game.g_location);
    // Wynik w #country-label: np. "🌍  2. EU-Phantom" lub "🇺🇸  0. Server America"
  }

  // ══════════════════════════════════════════════════════════════════
  //  KARUZELA SKINÓW
  // ══════════════════════════════════════════════════════════════════

  /**
   * Wyświetla podgląd skina w lobby.
   * Jeśli skin posiadany lub darmowy (skins[id] === 0):
   *   → normalne zdjęcie + brak ceny
   * Jeśli skin nieposiadany i płatny:
   *   → rozmyte ciemne zdjęcie + cena "🪙 Buy X"
   *
   * @param {number} id - ID skina (0–22)
   */
  function loadSkinImage(id) {
    $('#skins').src = '/img/skins/' + id + '.png';
    // Zmień źródło obrazka na skin o podanym ID.

    const owned = (accountSkins && accountSkins.indexOf(id) !== -1) || (skins && !skins[id]);
    // owned = true jeśli:
    //   accountSkins zawiera id (gracz kupił skin)
    //   LUB skins[id] === 0 (skin jest darmowy — brak ceny)
    //   (skins[id] jest falsy gdy 0, stąd !skins[id])

    if (owned) {
      $('#skins_price').innerText = '';            // brak ceny — gracz ma skin
      $('#skins').style.filter   = 'drop-shadow(0 0 14px rgba(0,212,255,0.52))'; // normalny podświetlony
    } else {
      $('#skins_price').innerText = '🪙 Buy  ' + skins[id]; // cena w punktach
      $('#skins').style.filter   = 'brightness(30%) blur(1px)'; // ciemne + rozmyte = "zablokowany"
    }
  }

  /**
   * Zmienia wyświetlany skin o ±1 z zawijaniem cyklicznym.
   * @param {number} d - kierunek: +1 (prawo) lub -1 (lewo)
   */
  function cycleSkin(d) {
    if (!skins) return; // Ceny nie załadowane jeszcze → poczekaj

    skinId += d;
    if (skinId >= skins.length) skinId = 0;            // wrap: po ostatnim → pierwszy
    else if (skinId < 0)        skinId = skins.length - 1; // wrap: przed pierwszym → ostatni
    loadSkinImage(skinId);
  }

  // Przypisz kliknięcia do przycisków karuzelki
  $('.left').onclick  = () => cycleSkin(-1); // ‹ = lewo = poprzedni skin
  $('.right').onclick = () => cycleSkin(+1); // › = prawo = następny skin

  const NES = { editing: false };
  // Stan edycji nazwy. Obiekt zamiast prostej zmiennej:
  //   - jasne co przechowuje (nie zgadujemy czym jest `editing`)
  //   - Łatwe rozszerzenie (można dodać np. NES.originalName bez zmiany interfejsu)

  /**
   * Przełącza między trybem podglądu (⚙) a trybem edycji (☑) nazwy gracza.
   *
   * Gdy NES.editing = false (tryb podglądu):
   *   → Kliknięcie ⚙ → zmień ikonę na ☑ → pokaż input → ukryj span → editing=true
   *
   * Gdy NES.editing = true (tryb edycji):
   *   → Kliknięcie ☑ → zmień ikonę na ⚙ → ukryj input → pokaż span → wyślij zmianę → editing=false
   */
  $('#r_name_acc').onclick = function () {
    if (NES.editing) {
      // === Wyjście z trybu edycji: zatwierdź i wyślij nową nazwę ===
      $('#r_name_acc').innerHTML = 'zatwierdź'; // tryb zatwierdzenia
      // Pokaż input, ukryj span z aktualną nazwą
      $('#r_name_che').style.display = 'inline';
      $('#r_name').style.display     = 'none';
      NES.editing = false;
    } else {
      // === Wejście do trybu edycji: wyślij poprzednią nazwę ===
      // (lub zacznij nową edycję — logika wysyła co jest w inpucie)
      $('#r_name_acc').innerHTML     = '⌨'; // tryb podglądu
      // Ukryj input, pokaż span z aktualną nazwą
      $('#r_name_che').style.display = 'none';
      $('#r_name').style.display     = 'inline';
      const id = localStorage.getItem('id');
      packetSender.new_type(3); // Type 3 = zmiana nazwy (handleChangeName w mother.js)
      packetSender.s_string($('#r_name_che').value.length ? id : '');
      // Jeśli pole ma wartość → wyślij ID konta, inaczej pusty string (brak aktualizacji)
      packetSender.s_string16($('#r_name_che').value);
      // Nowa nazwa z pola input
      motherSocket.send(packetSender.get_buf());
      NES.editing = true;
    }
  };

  // ══════════════════════════════════════════════════════════════════
  //  ZAKŁADKI AUTORYZACJI (LOGOWANIE / REJESTRACJA)
  // ══════════════════════════════════════════════════════════════════

  let authMode = 'login'; // aktualny tryb: 'login' lub 'register'

  /**
   * Przełącza aktywną zakładkę formularza autoryzacji.
   * Aktualizuje klasy CSS, tekst przycisku i czyści komunikaty błędów.
   * @param {string} mode - 'login' lub 'register'
   */
  function switchTab(mode) {
    authMode = mode;
    // Ustaw klasę 'active' odpowiedniej zakładce (usuwa z drugiej)
    document.getElementById('tab-login').classList.toggle('active',    mode === 'login');
    document.getElementById('tab-register').classList.toggle('active', mode === 'register');
    // classList.toggle(class, condition) — dodaj klasę gdy condition=true, usuń gdy false
    document.getElementById('auth-submit').innerText = mode === 'login' ? 'ZALOGUJ SIĘ' : 'ZAREJESTRUJ';
    document.getElementById('auth-msg').innerText    = '';
    // Wyczyść poprzedni komunikat błędu przy przełączaniu zakładki
  }

  /**
   * Obsługuje kliknięcie przycisku "ZALOGUJ / ZAREJESTRUJ".
   * Wysyła POST do /auth/login lub /auth/register i reaguje na odpowiedź.
   *
   * Flow sukcesu:
   *   1. Serwer zwraca { id: "ObjectId" }
   *   2. Zapisz id do localStorage (dane zachowane po zamknięciu przeglądarki)
   *   3. Ukryj formularz auth
   *   4. Uruchom pollForAuth() → wyślij pakiet do Mother Servera → odbierz dane konta
   *
   * Flow błędu:
   *   1. Serwer zwraca { error: "komunikat" }
   *   2. Pokaż komunikat czerwony w #auth-msg
   */
  function doAuth() {
    const email    = document.getElementById('auth-email').value.trim();
    const password = document.getElementById('auth-pass').value;
    const msgEl    = document.getElementById('auth-msg');

    if (!email || !password) { msgEl.innerText = 'Wypełnij email i hasło.'; return; }

    const btn = document.getElementById('auth-submit');
    btn.disabled  = true;
    btn.innerText = '...';
    // Wyłącz przycisk podczas requestu — zapobiega podwójnemu wysłaniu

    const url = authMode === 'login' ? '/auth/login' : '/auth/register';

    fetch(url, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ email, password })
      // JSON.stringify: { email: "...", password: "..." } → string JSON
    })
    .then(r => r.json())
    // r.json() parsuje odpowiedź JSON → obiekt JavaScript { id: ... } lub { error: ... }
    .then(data => {
      btn.disabled  = false;
      btn.innerText = authMode === 'login' ? 'ZALOGUJ SIĘ' : 'ZAREJESTRUJ';

      if (data.error) {
        // Błąd: pokaż komunikat (czerwony — --nr jest domyślne dla #auth-msg)
        msgEl.style.color = 'var(--nr)';
        msgEl.innerText   = data.error;
      } else {
        // Sukces: zielony komunikat + zapisz ID + ukryj formularz
        msgEl.style.color = 'var(--ng)';
        msgEl.innerText   = authMode === 'login' ? '✓ Zalogowano!' : '✓ Konto utworzone!';
        localStorage.setItem('id', data.id);
        // localStorage.setItem persystuje przez przeładowania strony i zamknięcie przeglądarki
        document.getElementById('auth-box').style.display = 'none';
        startAuthPolling();
        // Wyślij pakiet z ID do Mother Servera → odbierz pełne dane konta
      }
    })
    .catch(() => {
      btn.disabled  = false;
      btn.innerText = authMode === 'login' ? 'ZALOGUJ SIĘ' : 'ZAREJESTRUJ';
      msgEl.style.color = 'var(--nr)';
      msgEl.innerText   = 'Błąd połączenia.';
      // Błąd sieci (CORS, timeout, brak połączenia)
    });
  }

  // ── Zakup skina przez kliknięcie na cenę ──
  $('#skins_price').onclick = function () {
    const id = localStorage.getItem('id');
    if (!id) {
      // Niezalogowany → pokaż formularz auth z komunikatem
      document.getElementById('auth-box').style.display = 'block';

    } else {
      // Zalogowany → wyślij pakiet zakupu skina do Mother Servera
      packetSender.new_type(2); // Type 2 = handleBuySkin w mother.js
      packetSender.s_string(id);
      packetSender.s_uint8(skinId);
      motherSocket.send(packetSender.get_buf());
      // Mother Server: findOneAndUpdate({ _id: id, skin: {$ne: skinId}, points: {$gt: cena} }, ...)
      // Odpowiedź: pakiet case 1 z zaktualizowanymi danymi konta
    }
  };

  // ── Wylogowanie ──
  $('#logout').onclick = function () {
    localStorage.setItem('id', '');

    document.getElementById('auth-box').style.display = 'block'; // Pokaż formularz logowania
    $('#account').style.display = 'none';                         // Ukryj panel konta
    accountSkins = [];          // Wyczyść listę posiadanych skinów

    switchTab('login');         // Wróć do zakładki logowania

  // ══════════════════════════════════════════════════════════════════
  //  POLLING AUTH — oczekiwanie na gotowość WebSocket
  //
  //  Problem: Gracz loguje się przez HTTP (/auth/login) zanim WebSocket
  //  z Mother Serverem jest gotowy.
  //  Rozwiązanie: Polling co 100ms — gdy WS gotowy → wyślij pakiet auth.
  // ══════════════════════════════════════════════════════════════════

  /** Uruchamia polling auth jeśli jeszcze nie jest aktywny */
  function startAuthPolling() {
    if (!waitingForAuth) {
      waitingForAuth = true;
      pollForAuth();
    }
    // Bez flagi waitingForAuth: wielokrotne wywołanie startAuthPolling()
    // (np. szybkie kliknięcia) tworzyłoby wiele równoległych pollForAuth().
  }

  /**
   * Wysyła pakiet autoryzacji do Mother Servera gdy WebSocket jest gotowy.
   * Jeśli nie gotowy → czeka 100ms i próbuje ponownie.
   *
   * Dwa scenariusze:
   *   1. Gracz w lobby (!gameToken): wyślij pakiet type 1 (fetchAccount)
   *      → Mother odpowie case 1 z danymi konta
   *   2. Gracz w grze (gameToken != null): wyślij pakiet type 5 (reconnect)
   *      → Gracz reconnektuje do trwającej sesji gry
   */
  function pollForAuth() {
    const id = localStorage.getItem('id');
    if (id && id !== '' && isConnected) {
      // WebSocket gotowy i mamy ID → wyślij pakiet
      waitingForAuth = false;
      if (!gameToken) {
        // Tryb lobby — pobierz dane konta
        packetSender.new_type(1); // Type 1 = handleFetchAccount w mother.js
        packetSender.s_string(id);
        motherSocket.send(packetSender.get_buf());
      } else {
        // Tryb reconnect — wróć do trwającej gry
        packetSender.new_type(5); // Type 5 = handleReconnect w mother.js
        packetSender.s_int32(selectedGame.g_id);
        packetSender.s_int32(gameToken);
        packetSender.s_string(id);
        motherSocket.send(packetSender.get_buf());
      }
    } else {
      setTimeout(pollForAuth, 100);
      // WebSocket nie gotowy lub brak ID → czekaj 100ms i spróbuj ponownie.
      // ~100ms = 10 prób na sekundę — minimalny overhead, szybka reakcja.
    }
  }

  // ══════════════════════════════════════════════════════════════════
  //  FUNKCJE WIDOCZNOŚCI LOBBY
  // ══════════════════════════════════════════════════════════════════

  /** Pokazuje panel lobby (flex bo container używa display:flex) */
  function showLobby() { document.getElementById('lobby-wrapper').style.display = 'flex'; }

  /** Ukrywa panel lobby */
  function hideLobby()  { document.getElementById('lobby-wrapper').style.display = 'none'; }

  // ══════════════════════════════════════════════════════════════════
  //  EKRAN ODRODZENIA (RESPAWN)
  //
  //  Wywoływany przez hgm() case 5 (pakiet "gracz zginął").
  //  Sekwencja:
  //    1. Ukryj HUD
  //    2. Wyświetl ekran z animowanym tłem
  //    3. Odliczaj 1 sekundę (10 × 100ms)
  //    4. Po odliczeniu pokaż przycisk RESPAWN
  //    5. Kliknięcie RESPAWN → wyślij pakiet [8, canShowAd, skinId] → przywróć HUD
  // ══════════════════════════════════════════════════════════════════

  /**
   * Wyświetla ekran odrodzenia po śmierci gracza.
   *
   * @param {WebSocket} gameSocket - socket WebSocket do serwera gry
   * @param {Function}  onRespawn  - callback po respawnie (resetuje cylindryczne ringi)
   */
  function showRespawnMenu(gameSocket, onRespawn) {
    const restartEl     = document.getElementById('restart');
    const timerLabel    = $('#timer');
    const respawnButton = $('#rebut');

    // Ukryj wszystkie elementy HUD
    ['#eventb', '#level', '#ranking', '#chat'].forEach(sel => { $(sel).style.display = 'none'; });
    hideLobby(); // Ukryj lobby (na wypadek gdyby był widoczny)
    restartEl.style.display     = 'flex'; // Pokaż cały ekran śmierci
    respawnButton.style.display = 'none'; // Przycisk schowany — czekamy na odliczanie

    // ── TODO: Informacja o reklamie ──
    const canShowAd = showAd && hasAd;
    // canShowAd = true tylko gdy:
    //   showAd = true (ta tura ma reklamę — naprzemiennie)
    //   hasAd  = true (reklamy dostępne, brak AdBlocka)

    if (showAd && !hasAd) {
      // Gracz ma AdBlocka → pokaż czerwony komunikat zachęcający do wyłączenia
      $('#bonus').style.color   = '#ff6464';
      $('#bonus').innerHTML     = '<s>+Bonus 2500!</s>';
      $('#bonus').style.display = 'block';
    } else if (showAd) {
      // Reklama będzie → pokaż zielony komunikat z bonusem
      $('#bonus').style.color   = '#39ff14';
      $('#bonus').innerHTML     = '+Bonus 2500!';
      $('#bonus').style.display = 'block';
    } else {
      // Ta tura bez reklamy → ukryj bonus
      $('#bonus').style.display = 'none';
    }

    // ── Handler przycisku RESPAWN ──
    respawnButton.onclick = function () {
      gameSocket.send(new Uint8Array([8, canShowAd, skinId]).buffer);
      // Pakiet: [8] = typ (respawn), [canShowAd] = 0/1 (bonus reklamowy), [skinId] = wybrany skin
      // Serwer gry (child.js) case 8: odradza gracza z punktami + ewentualnym bonusem

      // Przywróć HUD
      ['#eventb', '#level', '#ranking', '#chat'].forEach(sel => { $(sel).style.display = 'block'; });
      onRespawn();   // Reset cylindra (resetRings() — przewija poziomy na start)
      restartEl.style.display = 'none'; // Ukryj ekran śmierci
    };

    // ── Inicjalizacja reklamy pre-roll (gdy dozwolona) ──
    if (showAd) {
      try {
        if (typeof aiptag !== 'undefined' && aiptag.cmd) {
          aiptag.cmd.player.push(function () { adplayer.startPreRoll(); });
          // aiptag.cmd.player.push: kolejka komend dla playera reklam.
          // adplayer.startPreRoll(): uruchom reklamę przed-grę (15/30 sekundowy spot).
        }
      } catch (e) {
        console.warn('Reklamy zablokowane lub skrypt niedostępny.');
        // AdBlock może zablokować sam skrypt aiptag.js → aiptag undefined → catch.
        // Nie crashujemy — gracze z AdBlockiem po prostu nie zobaczą reklamy.
      }
    }
    showAd = !showAd;
    // Naprzemiennie: true → false → true → false ...
    // Gracz nie widzi reklamy przy każdej śmierci — co drugiej.

    // ── Odliczanie 1 sekundy (10 ticków × 100ms) ──
    let cd = 10;
    timerLabel.style.display = 'block';

    function tick() {
      cd--;
      timerLabel.innerHTML = 'Respawn in<br><strong>' + (cd / 10).toFixed(1) + 's</strong>';
      // (cd/10).toFixed(1): cd=9 → "0.9s", cd=5 → "0.5s", cd=1 → "0.1s"
      if (cd > 0) {
        setTimeout(tick, 100); // Kolejne 100ms → następny tick
      } else {
        timerLabel.style.display    = 'none';
        respawnButton.style.display = 'block'; // Pokaż przycisk po odliczeniu
      }
    }
    tick(); // Uruchom odliczanie (pierwszy tick od razu)
  }

  // ══════════════════════════════════════════════════════════════════
  //  POŁĄCZENIE Z MOTHER SERVEREM (WebSocket lobby)
  //
  //  Mother Server (mother.js) zarządza:
  //    - Listą dostępnych serwerów gier (Redis → lista gier)
  //    - Kontami graczy (MongoDB)
  //    - Tokenami dołączenia do gry (Redis pub/sub)
  //    - Cenami i kolorami skinów
  // ══════════════════════════════════════════════════════════════════

  /**
   * Nawiązuje WebSocket z Mother Serverem na porcie 3001.
   * Konfiguruje handlery wiadomości i błędów.
   */
  function connectToMother() {
    const ws_url = 'ws://' + window.location.hostname + ':3001';
    // window.location.hostname: IP/hostname z URL przeglądarki (działa lokalnie i na serwerze)
    // Przykład: na produkcji "gra.example.com:3001", lokalnie "localhost:3001"

    motherSocket = new WebSocket(ws_url);
    motherSocket.binaryType = 'arraybuffer';
    // arraybuffer: odbierane dane binarne jako ArrayBuffer (wymagane dla PacketGet.set_buffer())
    // Domyślnie WebSocket odbierałby jako Blob (inkompatybilne z DataView)

    motherSocket.onopen = function () {
      isConnected = true;

      // Jeśli mamy ID w localStorage (gracz był zalogowany wcześniej) → ukryj formularz
      if (localStorage.getItem('id')) {
        document.getElementById('auth-box').style.display = 'none';
      }
      startAuthPolling();
      // Wyślij pakiet auth (typ 1 lub 5) żeby pobrać dane konta / zreconnektować

      motherSocket.onmessage = handleMotherMessage.bind(new PacketGet());
      // handleMotherMessage wywoływany z 'this' = nowa instancja PacketGet.
      // PacketGet() trzyma wskaźnik odczytu (this.index).
      // bind() "przywiązuje" PacketGet do handlera — każda wiadomość korzysta z tego samego parsera.

      motherSocket.onerror   = function () { isConnected = false; connectToMother(); };
      // Błąd WS → oznacz jako rozłączony → spróbuj ponownie (rekurencyjne połączenie)

      motherSocket.onclose   = function () { isConnected = false; };
      // Zamknięcie WS → oznacz jako rozłączony (bez auto-reconnect przy normalnym zamknięciu)
    };

    // Kliknięcie PLAY — wysyła żądanie dołączenia do wybranej gry
    $('#play').onclick = function () {
      if (!isConnected || !selectedGame) return;
      // Zabezpieczenie: nie można kliknąć PLAY jeśli WS rozłączony lub brak wybranego serwera

      // Jeśli wybrany skin jest płatny i nie posiadany → użyj losowego startowego skina
      if ((!accountSkins || accountSkins.indexOf(skinId) === -1) && skins[skinId] > 0) {
        skinId = ((Math.random() * 3) | 0) + 1;
        // Losowy skin 1–3 (darmowe, zawsze dostępne dla każdego gracza)
        // | 0 = Math.floor → 0,1,2 → +1 → 1,2,3
      }

      const playerNick = $('#nick').value;
      const userId     = localStorage.getItem('id') || '';
      // userId = '' dla gości (niezalogowanych) — serwer gry nie zapisze punktów do bazy
      localStorage.setItem('skin_id', skinId);
      // Zapamiętaj wybrany skin — wróci po odświeżeniu strony lub reconnekcie

      // Buduj pakiet type 0 (handleJoinGame w mother.js)
      packetSender.new_type(0);
      packetSender.s_uint32(selectedGame.g_id);  // ID wybranego serwera gry
      packetSender.s_string16(playerNick);         // nick gracza (UTF-16, do 9 znaków)
      packetSender.s_uint8(skinId);                // ID wybranego skina
      packetSender.s_string(userId);               // MongoDB ObjectId lub ''
      motherSocket.send(packetSender.get_buf());
      // Mother Server odbierze to → wygeneruje token → wyśle pakiet case 0 z IP:port:token
    };
  }

  // ══════════════════════════════════════════════════════════════════
  //  OBSŁUGA PAKIETÓW OD MOTHER SERVERA
  //
  //  Wywoływana przez motherSocket.onmessage = handleMotherMessage.bind(new PacketGet()).
  //  'this' = instancja PacketGet (parser binarny dla tej wiadomości).
  //
  //  Format pakietu: [count(1B)] [type(1B) dane...] [type(1B) dane...] ...
  //  count = liczba pakietów w tej wiadomości (może być kilka w jednym ArrayBuffer).
  // ══════════════════════════════════════════════════════════════════

  /**
   * Dekoduje binarną wiadomość od Mother Servera.
   * Obsługiwane typy pakietów:
   *   0 → Token + IP + Port serwera gry (połącz → uruchom initGame)
   *   1 → Pełne dane konta (email, punkty, skiny, nazwa)
   *   2 → Lista aktywnych serwerów gier
   *   3 → Ceny skinów + kolory neonowe
   *   4 → Serwer pełny (alert)
   *
   * @param {MessageEvent} packet - zdarzenie WebSocket (packet.data = ArrayBuffer)
   */
  function handleMotherMessage(packet) {
    const p = this.set_buffer(packet.data);
    // 'this' = PacketGet (z bind). set_buffer ustawia DataView i resetuje wskaźnik.

    for (let i = p.g_length8(); i--;) {
      // g_length8() odczytuje 1 bajt = liczba pakietów w tej wiadomości.
      // Pętla wykonuje się tyle razy ile pakietów.
      switch (p.g_uint8()) {
      // g_uint8() odczytuje 1 bajt = typ pakietu.

        // ── Type 0: Dane połączenia z serwerem gry ──
        case 0: {
          const token = p.g_uint32(); // jednorazowy uint32 token sesji
          const port  = p.g_uint16(); // port WebSocket serwera gry (0–65535)
          const ip    = p.g_string(); // IP serwera gry (np. "34.89.123.45")
          gameToken = token;          // Zapamiętaj token (flaga "jesteśmy w grze")
          hideLobby();                // Ukryj lobby przed uruchomieniem gry

          // Ukryj elementy lobby które nie powinny być widoczne w grze
          ['#logout', '#country', '#nick', '#play', '#media'].forEach(s => { $(s).style.display = 'none'; });

          initGame('ws://' + ip + ':' + port + '/' + token);
          // Uruchom asynchroniczną inicjalizację sceny 3D i połączenie z serwerem gry.
          // URL: np. "ws://34.89.123.45:30542/3482901234"
          break;
        }

        // ── Type 1: Dane zalogowanego konta ──
        case 1: {
          const email  = p.g_string16(); // email gracza
          const points = p.g_uint32();   // aktualna waluta
          const tp     = p.g_uint32();   // łącznie zarobione (total_points)
          const name   = p.g_string16(); // nick do rankingu
          const os     = p.g_int8_arr(); // lista ID posiadanych skinów [3, 7, 12, ...]
          p.g_string_arr();              // zarezerwowane dane konta (ignorowane — przyszłe użycie)

          // Ukryj formularz auth, pokaż panel konta
          document.getElementById('auth-box').style.display = 'none';
          $('#account').style.display = 'block';

          // Wypełnij panel konta danymi
          $('#r_name_che').value  = name;      // Pole edycji imienia
          $('#r_name').innerText  = name;      // Wyświetlane imię

          // Aktualizuj elementy przez indeks children[] (HTML ma stałą strukturę)
          $('#account').children[2].style.display = 'none';
          $('#account').children[3].innerText = 'DO WYDANIA: 🪙 ' + points;
          $('#account').children[4].innerText = 'ŁĄCZNIE ZEBRAŁEŚ: ' + tp + ' 🪙';

          accountSkins = os; // Zapisz listę posiadanych skinów
          if (skins) loadSkinImage(skinId);
          // Odśwież podgląd skina (teraz wiemy które są posiadane)
          break;
        }

        // ── Type 2: Lista aktywnych serwerów gier ──
        case 2: {
          const currentSelectedId = selectedGame ? selectedGame.g_id : null;
          // Zapamiętaj ID aktualnie wybranego serwera — przywrócimy po przebudowie listy
          games = [];

          for (let a = p.g_length8(); a--;) {
            games.push({
              g_id:          p.g_uint32(), // unikalny ID gry (game_id z child.js)
              g_players_len: p.g_uint8(),  // aktualna liczba graczy
              g_players_lim: p.g_uint8(),  // limit graczy (np. 15)
              g_location:    p.g_string(), // kod regionu: "EU", "US"
              g_name:        p.g_string()  // czytelna nazwa: "EU-Phantom"
            });
          }

          // Przywróć zaznaczenie lub wybierz nowy serwer
          if (currentSelectedId) {
            const updatedGame = games.find(g => g.g_id === currentSelectedId);
            if (updatedGame) {
              selectedGame = updatedGame;
              // Serwer nadal istnieje → zaktualizuj dane (liczba graczy mogła się zmienić)
            } else if (siteLocation) {
              findBestServer(games, siteLocation);
              // Poprzednio wybrany serwer zniknął (zamknął się) → znajdź nowy
            }
          } else if (siteLocation) {
            findBestServer(games, siteLocation);
            // Pierwsze ładowanie listy → auto-wybierz serwer
          }

          rebuildServerList();
          $('#play').style.display = 'block';
          // Pokaż przycisk PLAY dopiero gdy lista serwerów załadowana
          // (wcześniej był display:none — gracz nie mógłby dołączyć do niczego)
          break;
        }

        // ── Type 3: Ceny skinów + kolory neonowe ──
        case 3: {
          skins      = p.g_int32_arr(); // tablica 23 cen (SKIN_COSTS z mother.js)
          lightSkins = p.g_int32_arr(); // tablica 23 kolorów (SKIN_LIGHTS z mother.js)

          const sv = localStorage.getItem('skin_id') | 0;
          // | 0: parseInt + fallback na 0 jeśli null (localStorage.getItem zwraca null gdy brak)
          skinId = sv ? sv : ((Math.random() * 3) | 0) + 1;
          // Użyj zapisanego skina LUB losowy darmowy 1–3 dla nowych graczy

          loadSkinImage(skinId);
          if (accountSkins) loadSkinImage(skinId);
          // Odśwież podgląd skina (teraz mamy ceny → wiemy co jest posiadane)
          break;
        }

        // ── Type 4: Serwer pełny ──
        case 4: {
          alert('Server is full — try again in a moment.');
          // Prosty alert — w przyszłości można zastąpić UI toast/notification.
          // Gracz musi wybrać inny serwer lub poczekać aż ktoś wyjdzie.
          break;
        }
      }
    }
  }

  // ══════════════════════════════════════════════════════════════════
  //  KLASA PacketGet — PARSER PAKIETÓW BINARNYCH
  //
  //  Używana do odczytu danych z ArrayBuffer (wiadomości od serwerów).
  //  Utrzymuje wewnętrzny wskaźnik (index) — każde wywołanie g_xxx()
  //  odczytuje dane i przesuwa wskaźnik o odpowiednią liczbę bajtów.
  //
  //  DataView — niskopoziomowy widok na ArrayBuffer pozwalający odczytywać
  //  różne typy danych (Int8, Uint16, Float32 itp.) pod dowolnym offsetem.
  // ══════════════════════════════════════════════════════════════════

  /**
   * @constructor
   * Inicjalizuje parser z pustym buforem (ustawiany przez set_buffer()).
   */
  function PacketGet() {
    this.dataView = new DataView(new ArrayBuffer(0), 0);
    this.index    = 0; // wskaźnik bieżącej pozycji odczytu (bajty od początku bufora)

    /**
     * Ustawia nowy bufor do parsowania i resetuje wskaźnik.
     * @param {ArrayBuffer} b - bufor wiadomości WebSocket
     * @returns {PacketGet}   zwraca this dla łańcuchowego wywołania
     */
    this.set_buffer = function (b) {
      this.dataView = new DataView(b, 0);
      this.index    = 0;
      return this; // return this = można pisać: p.set_buffer(buf).g_uint8()
    };

    // ── Metody odczytu podstawowych typów ──

    this.g_int8   = function () { return this.dataView.getInt8(this.index++); };
    // Odczytaj 1 bajt ze znakiem (-128 do 127), przesuń wskaźnik o 1.

    this.g_uint8  = function () { return this.dataView.getUint8(this.index++); };
    // Odczytaj 1 bajt bez znaku (0 do 255), przesuń wskaźnik o 1.

    this.g_int16  = function () { this.index += 2; return this.dataView.getInt16(this.index - 2); };
    // Odczytaj 2 bajty ze znakiem (-32768 do 32767), przesuń o 2.

    this.g_uint16 = function () { this.index += 2; return this.dataView.getUint16(this.index - 2); };
    // Odczytaj 2 bajty bez znaku (0 do 65535), przesuń o 2.

    this.g_int32  = function () { this.index += 4; return this.dataView.getInt32(this.index - 4); };
    // Odczytaj 4 bajty ze znakiem, przesuń o 4.

    this.g_uint32 = function () { this.index += 4; return this.dataView.getUint32(this.index - 4); };
    // Odczytaj 4 bajty bez znaku (0 do 4 294 967 295), przesuń o 4.
    // Używane dla: ID gry, token, punkty (mogą być duże liczby).

    this.g_float  = function () { this.index += 4; return this.dataView.getFloat32(this.index - 4); };
    // Odczytaj float 32-bit (~7 cyfr precyzji), przesuń o 4.
    // Używane dla: pozycje X/Y graczy (wymagają precyzji ułamkowej).

    /**
     * Odczytaj krótki string ASCII (dla prostych identyfikatorów).
     * Format: [długość: 1B uint8] [bajty ASCII]
     * Używany dla: IP serwera, kody regionów, ObjectId (hex string).
     */
    this.g_string = function () {
      let s = '';
      const l = this.dataView.getUint8(this.index++); // odczytaj długość
      for (let i = l; i--;) s += String.fromCharCode(this.dataView.getUint8(this.index++));
      // String.fromCharCode: bajt → znak ASCII (0–255 = Latin-1 range)
      return s;
    };

    /**
     * Odczytaj string UTF-16 (dla nicków i wiadomości obsługujących Unicode).
     * Format: [długość_znaków: 1B uint8] [znaki: każdy 2B uint16]
     * Używany dla: nicki graczy, wiadomości czatu, emaile.
     *
     * Dlaczego UTF-16 a nie UTF-8?
     *   UTF-16 dla każdego znaku = zawsze 2 bajty (prościej niż zmienna długość UTF-8).
     *   Obsługuje pełny BMP Unicode (emotikony, znaki chińskie itp.).
     */
    this.g_string16 = function () {
      let s = '';
      const l = this.dataView.getUint8(this.index++); // odczytaj liczbę znaków
      for (let i = l; i--;) {
        s += String.fromCharCode(this.dataView.getUint16(this.index)); // odczytaj 2 bajty → znak
        this.index += 2;
      }
      return s;
    };

    // ── Metody odczytu tablic (z 2-bajtowym nagłówkiem długości) ──

    this.g_int8_arr  = function () {
      const a = []; const l = this.g_uint16(); // długość tablicy (uint16 = do 65535 elementów)
      for (let i = l; i--;) a[i] = this.g_uint8(); // odczytaj l bajtów
      return a;
    };
    // Używane dla: lista skinów gracza ([3, 7, 12, ...])

    this.g_int16_arr = function () {
      const a = []; const l = this.g_uint16();
      for (let i = l; i--;) a[i] = this.g_uint16();
      return a;
    };

    this.g_int32_arr = function () {
      const a = []; const l = this.g_uint16();
      for (let i = l; i--;) a[i] = this.g_uint32();
      return a;
    };
    // Używane dla: SKIN_COSTS i SKIN_LIGHTS (tablice 23 uint32)

    this.g_string_arr = function () {
      const a = []; const l = this.g_uint16();
      for (let i = l; i--;) a[i] = this.g_string();
      return a;
    };
    // Używane dla: acc_data gracza (dodatkowe dane konta)

    this.g_length8  = this.g_uint8;  // alias: odczytaj 1B = liczba elementów listy
    this.g_length16 = this.g_uint16; // alias: odczytaj 2B = liczba elementów listy
  }

  // ══════════════════════════════════════════════════════════════════
  //  KLASA PacketSet — BUILDER PAKIETÓW BINARNYCH
  //
  //  Używana do budowania i wysyłania wiadomości binarnych do serwerów.
  //  Bufor jest reużywany między wywołaniami (get_buf() resetuje wskaźnik).
  //
  //  Struktura pakietu: [count(1B)] [type(1B) dane...] [type(1B) dane...] ...
  //  Bajt 0 = liczba pakietów w tej wiadomości (inkrementowany przez new_type()).
  // ══════════════════════════════════════════════════════════════════

  /**
   * @constructor
   * @param {number} size - rozmiar wewnętrznego bufora w bajtach
   */
  function PacketSet(size) {
    this.buffer      = new ArrayBuffer(size);
    this.bytes       = new Uint8Array(this.buffer);   // widok bajt-po-bajcie (do zapisu prostych wartości)
    this.dataView    = new DataView(this.buffer, 0);   // widok dla typów wielobajtowych (Int16, Float32 itp.)
    this.index       = 1;   // pozycja zapisu — zaczyna od 1 (bajt 0 = licznik pakietów)
    this.globalIndex = 0;   // zapamiętana pozycja "granicy globalnej" (dla per-player pakietów)
    this.globalCount = 0;   // zapamiętana liczba pakietów globalnych

    /**
     * Rozpoczyna nowy pakiet w buforze.
     * Inkrementuje licznik (bytes[0]) i zapisuje typ w następnym bajcie.
     * @param {number} t - numer typu pakietu (0–255)
     */
    this.new_type = function (t) {
      this.bytes[0]++;           // Zwiększ licznik pakietów (bajt 0)
      this.bytes[this.index++] = t; // Zapisz typ i przesuń wskaźnik
    };

    /**
     * Zwraca wycinek bufora (od początku do bieżącej pozycji) i resetuje wskaźnik.
     * "Wycięty" bufor zawiera kompletny pakiet gotowy do wysłania.
     * Po wywołaniu: bufor jest gotowy na nowy pakiet.
     * @returns {ArrayBuffer}
     */
    this.get_buf = function () {
      const slice = this.buffer.slice(0, this.index); // Skopiuj używaną część bufora
      this.index    = 1;   // Resetuj wskaźnik zapisu (zostaw miejsce na licznik)
      this.bytes[0] = 0;   // Resetuj licznik pakietów
      return slice;
    };

    // ── Metody dla "stanowych" pakietów (używane przez serwer gry, nie lobby) ──
    // Pozwalają zachować "globalną" część i tworzyć unikalne per-player zakończenia.

    this.get_uniq_buf   = function () {
      const s = this.buffer.slice(0, this.index);
      this.index    = this.globalIndex; // Przywróć pozycję do granicy globalnej
      this.bytes[0] = this.globalCount; // Przywróć licznik globalny
      return s;
    };

    this.clear_uniq_buf = function () {
      this.index    = this.globalIndex; // Odrzuć per-player dane, wróć do granicy
      this.bytes[0] = this.globalCount;
    };

    this.end_global     = function () {
      this.globalIndex = this.index;    // Zapamiętaj bieżącą pozycję jako granicę
      this.globalCount = this.bytes[0]; // Zapamiętaj bieżący licznik jako globalny
    };

    this.clear = function () {
      this.index       = 1; // Resetuj wszystko
      this.bytes[0]    = 0;
      this.globalIndex = 1;
      this.globalCount = 0;
    };

    // ── Metody zapisu podstawowych typów ──

    this.s_int8  = function (v) { this.bytes[this.index++] = v; };
    // Zapisz 1 bajt (wartość mod 256 dla ujemnych przez Uint8Array overflow).

    this.s_uint8 = this.s_int8;
    // uint8 i int8 mają tę samą reprezentację binarną — alias.

    this.s_int16 = function (v) {
      this.bytes[this.index]     = v >> 8;    // starszy bajt (high byte)
      this.bytes[this.index + 1] = v & 0xff;  // młodszy bajt (low byte)
      this.index += 2;
    };
    // Big-endian zapis 16-bit (MSB first — standard sieciowy).
    // >> 8: przesuń bity o 8 pozycji w prawo → starszy bajt
    // & 0xff: maska 8 bitów → młodszy bajt

    this.s_uint16 = this.s_int16;

    this.s_int32  = function (v) { this.dataView.setInt32(this.index, v);   this.index += 4; };
    // DataView.setInt32 — big-endian 32-bit (default dla DataView).

    this.s_uint32 = this.s_int32;

    this.s_float  = function (v) { this.dataView.setFloat32(this.index, v); this.index += 4; };
    // IEEE 754 single precision float.

    this.s_length8  = this.s_int8;  // alias — semantycznie "zapisz liczbę elementów (1B)"
    this.s_length16 = this.s_int16; // alias — semantycznie "zapisz liczbę elementów (2B)"

    // ── Zapis tablic z 2-bajtowym nagłówkiem długości ──

    this._wah = function (n) {
      // "Write Array Header" — zapisz uint16 jako liczbę elementów
      this.bytes[this.index]     = n >> 8;
      this.bytes[this.index + 1] = n & 0xff;
      this.index += 2;
    };

    this.s_int8_arr  = function (a, n) {
      if (!n) n = a.length;
      this._wah(n);
      for (let i = n; i--;) this.bytes[this.index++] = a[i];
      // Iteracja wsteczna (i--) — zamiast rosnącej (i++) dla wydajności.
    };

    this.s_int16_arr = function (a, n) {
      if (!n) n = a.length; this._wah(n);
      for (let i = n; i--;) this.s_uint16(a[i]);
    };

    this.s_int32_arr = function (a, n) {
      if (!n) n = a.length; this._wah(n);
      for (let i = n; i--;) this.s_uint32(a[i]);
    };
    // Używane przy wysyłaniu SKIN_COSTS i SKIN_LIGHTS z mother.js

    this.s_string_arr = function (a, n) {
      this._wah(n);
      for (let i = n; i--;) this.s_string(a[i]);
    };

    // ── Zapis stringów ──

    this.s_string = function (v) {
      this.bytes[this.index++] = v.length; // długość jako 1B
      for (let i = 0; i < v.length; i++) {
        this.bytes[this.index++] = v.charCodeAt(i); // każdy znak jako 1B ASCII
      }
    };

    this.s_string16 = function (v) {
      this.bytes[this.index++] = v.length; // liczba znaków jako 1B
      for (let i = 0; i < v.length; i++) {
        this.dataView.setInt16(this.index, v.charCodeAt(i)); // każdy znak jako 2B UTF-16
        this.index += 2;
      }
    };
    // s_string16 pozwala na znaki Unicode (np. emoji w nicku: "🔥Flame").
  }

  // ══════════════════════════════════════════════════════════════════
  //  INICJALIZACJA SCENY 3D (async — nie blokuje UI)
  //
  //  Operacje ciężkie obliczeniowo (klonowanie 640 kolumn, kompilacja
  //  shaderów GPU) są przeplatane przez yieldRender() — co pozwala
  //  loaderom aktualizować pasek postępu bez zamrożenia UI.
  //
  //  yieldRender() = nowa Promise(r => setTimeout(r, 15))
  //  = "ustąp przeglądarce na 15ms żeby odmalowała DOM"
  //  Bez yield: przeglądarka zamroziłaby UI na 1–5 sekund podczas inicjalizacji.
  // ══════════════════════════════════════════════════════════════════

  /** 15ms przerwa — oddaje sterowanie przeglądarce dla odmalowania DOM */
  const yieldRender = () => new Promise(r => setTimeout(r, 15));

  /**
   * Inicjalizuje scenę Three.js, cylindryczny tunel, oświetlenie,
   * cząsteczki i WebSocket z serwerem gry.
   *
   * @param {string} wsUrl - URL WebSocket serwera gry: "ws://ip:port/token"
   */
  async function initGame(wsUrl) {
    document.getElementById('scene-loader').style.display = 'flex'; // Pokaż zielony loader

    // ── Pomocnik aktualizacji paska postępu ──
    const updateProgress = (pct, text) => {
      document.getElementById('sl-bar').style.width = pct + '%';
      document.getElementById('sl-text').innerText  = text + ' ' + pct + '%';
    };

    const levels     = []; // tablice Uint8Array[128] dla każdego poziomu (odbierane z serwera)

    let levelsReceived = 0;   // ile poziomów odebranych z serwera (pakiet type 4, co 10)

    let sky, camera, scene, renderer;

    let cylinderSegment = 0; // aktualny segment wizualny cylindra (indeks tekstury ścian)

        emissive:         new THREE.Color(0x003300),

    };

    const cm = [
      new THREE.MeshStandardMaterial({ map: ltc(0), metalness: 0.25, emissive: new THREE.Color(0x001122), emissiveIntensity: 0.25 }),
      new THREE.MeshStandardMaterial({ map: ltc(1), metalness: 0.25, emissive: new THREE.Color(0x001122), emissiveIntensity: 0.25 })

    // Materiały podłogi (bez metalness — podłoga nie powinna błyszczeć)
    const fm = [
      new THREE.MeshStandardMaterial({ map: ltc(0), metalness: 0, emissive: new THREE.Color(0x002233), emissiveIntensity: 0.35 }),
      new THREE.MeshStandardMaterial({ map: ltc(1), metalness: 0, emissive: new THREE.Color(0x002233), emissiveIntensity: 0.35 })
    ];

    /**
     * Konwertuje ID segmentu na proceduralne kolory RGB.
     * Używane gdy brakuje tekstury PNG dla danego segmentu.
     *
     * Algorytm "kolorowanie ID":
     *   1. Określ dominujący kanał (id % 3 → 0=R, 1=G, 2=B) = zawsze 255 dla tego kanału
     *   2. Rozłóż pozostałą część ID na 2 kanały w bazie 7 (0–6 → 7 poziomów)
     *   3. Skaluj każdy poziom do 0–255: (poziom) × (255/7 ≈ 36)
     *
     * Efekt: każdy ID daje unikalny kolor — sąsiednie segmenty mają podobne kolory.
     * Zwraca: { hex: "rrggbb", num: 0xRRGGBB }
     *
     * @param {number} id - numer segmentu
     * @returns {{ hex: string, num: number }}
     */
    function btc(id) {
      const b = 7;           // baza systemu (7 poziomów na kanał)
      const col = [0, 0, 0]; // [R, G, B]
      const ch = id % 3;     // dominujący kanał: 0=R, 1=G, 2=B

      id = (id / 3) | 0;     // przesuń poza dominujący kanał
      col[ch] = 255;          // ustaw dominujący kanał na max jasność

      for (let c = 3; c--;) {
        if (c !== ch) {
          col[c] = (id % b) * ((255 / b) | 0); // skaluj wartość bajtu z bazy 7 do 0–252
          id = (id / b) | 0;                    // przesuń ID o 1 cyfrę w bazie 7
        }
      }

      const n = col[0] + (col[1] << 8) + (col[2] << 16);
      // Składanie RGB do jednej liczby: R + G*256 + B*65536
      // << 8 = × 256, << 16 = × 65536 (przesunięcia bitowe = szybsze niż mnożenie)
      let h = n.toString(16);
      while (h.length !== 6) h = '0' + h;
      // Uzupełnij wiodącymi zerami żeby zawsze było 6 znaków hex (np. "0000ff")
      return { hex: h, num: n };
    }

    updateProgress(20, 'TWORZENIE KAMERY I TŁA...');
    await yieldRender();

    // ── Scena Three.js ──
    scene = new THREE.Scene();

    // ── Sfera nieba (skybox) ──
    (function () {
      const geo = new THREE.SphereBufferGeometry(1000, 20, 20);
      // Sfera o promieniu 1000 — otacza cały cylinder (R ≈ 163 << 1000).
      // 20×20 segmentów — wystarczające dla sfery widzianej od środka.
      const mat = new THREE.MeshBasicMaterial({ map: tl.t_sky, side: THREE.BackSide });

      // MeshBasicMaterial — nie reaguje na oświetlenie (niebo zawsze jasne).
      sky = new THREE.Mesh(geo, mat);

    })();

    // ── Kamera perspektywiczna ──
    const asp = Math.max(window.innerWidth / window.innerHeight, 0.9);

    camera = new THREE.PerspectiveCamera(
      50,   // FOV (Field of View) w stopniach — 50° to "naturalne" pole widzenia ludzkiego oka
      asp,  // aspect ratio (szerokość / wysokość)
      1,    // near clipping plane — obiekty bliżej niż 1 jednostka = niewidoczne
      10000 // far clipping plane — obiekty dalej niż 10000 jednostek = niewidoczne
    );
    camera.position.z = 500;
    // Startowa pozycja kamery na osi Z — dostosowana w Player.set_pos()
    scene.add(camera);
    // Kamera musi być dodana do sceny żeby oświetlenie (attached to camera) działało.

    // ── Dwa cylindry (nieskończony "scroll") ──
    const tg  = new THREE.CylinderBufferGeometry(R - 20, R - 20, 512, 4);
    // CylinderBufferGeometry(radiusTop, radiusBottom, height, radialSegments)
    // R - 20 = cylinder trochę mniejszy od promienia gracza (gracz wewnątrz cylindra)
    // 512 = wysokość jednego segmentu cylindra
    // 4 segmenty radialne = czworokąt (kwadratowy przekrój — niewidoczne bo teksturowane)
    const cyl = [new THREE.Mesh(tg, cm[0]), new THREE.Mesh(tg, cm[0])];
    cyl[1].position.y = -512; // Drugi cylinder o 512 niżej = bezpośrednio pod pierwszym
    scene.add(cyl[0]);
    scene.add(cyl[1]);
    // Dwa cylindry podążające za graczem (scrollCyl) = iluzja nieskończonego tunelu.

    scene.add(new THREE.AmbientLight(0xffffff, 0.4));
    // Ambient light = równomierne oświetlenie całej sceny bez cieni.
    // Intensywność 0.4 = delikatne — SpotLights i PointLights dodają dramatyczne oświetlenie.

    updateProgress(30, 'SYSTEM CZĄSTECZEK...');
    await yieldRender();

    // ── Dwa obracające się reflektory na ścianach cylindra ──
    const wallScanLight  = new THREE.SpotLight(0x00aaff, 3.5, 900, Math.PI / 10, 0.65);
    // SpotLight(color, intensity, distance, angle, penumbra)

    // penumbra = 0.65 = 65% miękkiej krawędzi (rozmyty kontur wiązki)
    const wallScanTarget = new THREE.Object3D();
    // Target to punkt w przestrzeni na który SpotLight jest skierowany.
    // Object3D bez siatki = niewidoczny "punkt celowania" reflektora.
    scene.add(wallScanLight);
    scene.add(wallScanTarget);
    wallScanLight.target = wallScanTarget;
    // Przypisz target — reflektor skieruje się na target.position w każdej klatce.
    let wslAngle = 0;
    // Kąt obrotu reflektora — inkrementowany w animate() żeby reflektor się obracał.

    const wallScanLight2  = new THREE.SpotLight(0xff44aa, 2.5, 700, Math.PI / 14, 0.7);
    const wallScanTarget2 = new THREE.Object3D();
    scene.add(wallScanLight2);
    scene.add(wallScanTarget2);
    wallScanLight2.target = wallScanTarget2;
    // Drugi reflektor — inny kolor (różowy), inny kąt obrotu (×1.37 + π = przeciwna strona)

    // ── Cząsteczki kurzu unoszące się w cylindrze ──

    for (let i = 0; i < DUST_N; i++) {

      const r = Math.random() * (R - 22);    // losowy promień (0 do R-22, nie poza cylindrem)

      dustBuf[i * 3 + 1] = Math.random() * 1200 - 600; // y = losowa wysokość ±600
      dustBuf[i * 3 + 2] = Math.sin(a) * r;  // z = sin(kąt) × promień
      // Rozmieszczenie w cylindrze: cos/sin × r = punkt na kole o promieniu r
    }
    const dustGeo = new THREE.BufferGeometry();
    if (dustGeo.setAttribute) dustGeo.setAttribute('position', new THREE.BufferAttribute(dustBuf, 3));
    else                       dustGeo.addAttribute('position', new THREE.BufferAttribute(dustBuf, 3));
    // Kompatybilność: setAttribute (Three.js r125+) vs addAttribute (starsze wersje).
    const dustMat  = new THREE.PointsMaterial({ color: 0x99ddff, size: 1.6, transparent: true, opacity: 0.5, depthWrite: false, fog: true });
    // PointsMaterial — rysuje każdą cząsteczkę jako kwadrat (Point = jeden piksel lub sprite).
    // depthWrite: false = cząsteczki nie blokują innych obiektów za nimi (poprawne przenikanie).
    // fog: true = cząsteczki dalej są bardziej przezroczyste (efekt mgły).
    const dustMesh = new THREE.Points(dustGeo, dustMat);
    scene.add(dustMesh);

    // ── Karuzelka świateł wokół platformy gracza (PLT_N świateł) ──
    const PLT_N = 8;
    // 8 świateł równomiernie rozmieszczonych w kółko wokół gracza.
    const platformLights = [];
    for (let i = 0; i < PLT_N; i++) {

      // PointLight(color, intensity, distance)
      // intensity = 0 na start — aktualizowana w animate()
      // distance = 200 = zasięg światła (po 200 jednostkach natężenie = 0)
      scene.add(pl);

    let _prevPY = 0, _velSmooth = 0;

    for (let i = 0; i < MAX_PLAYER_LIGHTS; i++) {

    updateProgress(40, 'GENEROWANIE STRUKTUR...');
    await yieldRender();

    /*

     *  STRUKTURA JEDNEJ KOLUMNY OBJ (col1.obj) — CO JEST W preloaded.col1

     *
     *  preloaded.col1 to THREE.Group załadowany z pliku obj/col1.obj.

     *          material: ml.m_bad (czerwony, emissive)

     *      ├─ children[1]            ← klon kolumny #1  (kąt 2.8°)
     *      │    ├─ children[0]
     *      │    └─ children[1]
     *      ├─ ...                    (128 klonów łącznie)

     *  POZYCJA KOLUMNY W PRZESTRZENI 3D:

     *    - scale.set(R+20, R+20, R+20) rozciąga ją do promienia cylindra
     *    - rotation.y = kąt * i → obrót wokół osi Y = rozmieszczenie po okręgu
     *    - Efekt: każda kolumna "stoi" na ścianie cylindra, prostopadle do środka
     *
     *  DLACZEGO children[1] ZAWSZE ISTNIEJE (nawet dla bezpiecznych platform)?
     *    - Wszystkie 128 klonów to kopie tego samego obiektu z oboma meshami.
     *    - Zamiast tworzyć/niszczyć mesh przy każdej zmianie typu,
     *      po prostu przełączamy visible (tanio: jedno pole boolean na mesh).
     *    - Tworzenie/niszczenie Three.js mesh = drogie (GC, re-upload do GPU).
     * ══════════════════════════════════════════════════════════════════════
     */

    // ── Budowa ringów cylindra z kolumn OBJ ──

    const obj = preloaded.col1.clone();
    // Klonuj preładowany model kolumny — będziemy go dalej klonować.
    obj.children[0].material = ml.m_stone;
