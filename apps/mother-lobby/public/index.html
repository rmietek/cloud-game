    /**
     * Buduje jeden "ring" (pierścień) cylindra z 128 kolumn OBJ.
     *
     * CO TO JEST RING:
     *   Ring to ONE poziom cylindra — poziomy płaski okrąg z 128 kolumnami.
     *   Gracz widzi go z wewnątrz jako "pierścień platform" na ścianie tunelu.
     *   Wizualnie: jak przekrój poprzeczny cylindra w jednym punkcie głębokości.
     *
     * JAK KOLUMNY SĄ ROZMIESZCZONE:
     *   128 klonów obj, każdy obrócony o inny kąt wokół środka (Y=0):
     *     klon #0:   rotation.y = 0          → pozycja na kącie  0.0°
     *     klon #1:   rotation.y = 0.04906rad → pozycja na kącie  2.8°
     *     klon #2:   rotation.y = 0.09812rad → pozycja na kącie  5.6°
     *     ...
     *     klon #127: rotation.y = 6.233rad   → pozycja na kącie 357.2°
     *   Wzajemna odległość kątowa: 360°/128 = 2.8125° = 0.04906 rad
     *   Wzajemna odległość liniowa na okręgu: 2π×(R+20)/128 ≈ 8 jednostek
     *
     * SKĄD KOLUMNA TRAFIA NA ŚCIANĘ CYLINDRA:
     *   Model OBJ jest wymodelowany WZDŁUŻ osi Z (długa oś = Z).
     *   scale(R+20, R+20, R+20) → kolumna "sięga" od środka do ściany.
     *   rotation.y = kąt → obraca kolumnę wokół osi Y jak wskazówkę zegara.
     *   Wynik: 128 kolumn promieniście wychodzi od środka cylindra na ścianę.
     *
     * POZYCJA Y RINGU W SCENIE:
     *   NIE jest ustawiana tutaj — ustawia ją loadRing(group, ri).
     *   Formuła: y = -ri × 128 + 16
     *   Np: ring na poziomie ri=3 → y = -3×128+16 = -368
     *
     * @returns {THREE.Group} - grupa z 128 klonami kolumny (children[0..127])
     */
    function brg() {
      const g = new THREE.Group();
      g.rotation.y = -Math.PI / 2; // Obrót całej grupy o -90° (dopasowanie osi OBJ do osi sceny)

      obj.scale.set(R + 20, R + 20, R + 20);
      // Skala R+20 = kolumna wystaje lekko POZA promień gracza R=162.8
      // → gracz nie "wchodzi" w kolumnę (kolumna jest trochę w ścianie)

      for (let y = 128; y--;) {
        // y iteruje: 127, 126, ..., 1, 0  (pętla idzie od 127 do 0)
        const c = obj.clone();
        c.rotation.y = 0.02453125 * 2 * y;
        // 0.02453125 = π/128 ≈ 0.02454 rad
        // × 2 × y = 2π × (y/128) = kąt dla pozycji y na okręgu
        // Przykład: y=64 → rotation.y = π = 180° (naprzeciwko y=0)
        g.add(c);
        // WAŻNE: g.children[0] = klon y=127, g.children[1] = y=126, ..., g.children[127] = y=0
        // Kolejność odwrócona bo for(y=128; y--;) iteruje od 127 w dół.
        // loadRing() uwzględnia to: levels[ri][127-y] ← odwrócony indeks
      }
      return g;
    }

    /*
     * TWORZENIE 5 RINGÓW (BUFOR SCROLLUJĄCY)
     * ══════════════════════════════════════════════════════════════
     *
     *  Dlaczego 5, a nie więcej?
     *    - 5 ringów pokrywa 5 × 128j = 640 jednostek Y (ok. 4 długości ciała gracza w dół).
     *    - Gracz zawsze widzi max 3–4 ringi jednocześnie (FOV + kąt kamery).
     *    - Mniej = ring "teleportuje się" za szybko (artefakty wizualne).
     *    - Więcej = więcej obiektów w scenie (spadek FPS).
     *
     *  Kolejność inicjalizacji:
     *    ringGroups[0] = brg()  (oryginał, tworzony od zera)
     *    ringGroups[1..4] = bg.clone() (klony — szybsze niż brg() × 5)
     *
     *  Każde await yieldRender() = przeglądarka maluje pasek postępu (loader)
     *    loader: 40% → 50% → 60% → 70% → 80% po każdym klonowaniu
     */
    const bg = brg();
    scene.add(bg);
    ringGroups[0] = bg;

    for (let i = 1; i < 5; i++) {
      updateProgress(40 + (i * 10), `KLONOWANIE SEKTORA ${i}...`);
      await yieldRender(); // Przerwa po każdym ringu — UI loader może się zaktualizować
      const cl = bg.clone(); // Klonuj pierwszy ring (szybsze niż brg() od zera)
      scene.add(cl);
      ringGroups[i] = cl;
    }
    // Każde await yieldRender() tutaj = loader pokazuje 50%, 60%, 70%, 80% → płynny postęp

    /*
     * SYNCHRONIZACJA RINGÓW Z DANYMI POZIOMÓW
     * ══════════════════════════════════════════════════════════════
     * 
     *    - Ringi tworzone są ASYNCHRONICZNIE (await yieldRender() co klon)
     *    - Pakiet type 4 (dane poziomów) może przyjść z serwera w KAŻDEJ chwili
     *
     *  Możliwe scenariusze:
     *    A. Dane przyszły ZANIM ringi gotowe:
     *       → hgm case 4 ustawia ringDataReady = true
     *       → tutaj sprawdzamy: if (ringDataReady) → loadRing od razu
     *
     *    B. Ringi gotowe ZANIM dane przyszły:
     *       → tutaj ustawiamy ringDataReady = true
     *       → hgm case 4 sprawdza: if (ringDataReady) → loadRing od razu
     *
     *  W obu przypadkach loadRing() wywołane dokładnie RAZ na ring.
     */
    if (ringDataReady) {
      for (let i = 0; i < 5; i++) loadRing(ringGroups[i], i);
      ringDataReady = false;
    } else {
      ringDataReady = true;
      // Ringi gotowe ale dane jeszcze nie przyszły → ustaw flagę że ringi czekają
    }

    updateProgress(90, 'KOMPILACJA SHADERÓW (TO MOŻE POTRWAĆ)...');
    await yieldRender();

    // ── Renderer WebGL ──
    renderer = new THREE.WebGLRenderer({ antialias: true });
    // antialias: true = wygładzanie krawędzi (MSAA) — usuwa "schodki" na ostrych krawędziach.
    // Koszt: ~10–20% wydajności. Warto dla ładniejszego obrazu.
    renderer.setSize(1280, 720);
    // Stała rozdzielczość 1280×720 (HD) — niezależna od rozmiaru okna.
    // CSS rozciągnie canvas do pełnego ekranu.
    // Dlaczego stała? Adaptacyjna rozdzielczość mogłaby obciążyć słabe GPU.
    renderer.domElement.style = 'top:0%;left:0%;width:100%;height:100%;position:fixed;';
    // Canvas Three.js zajmuje cały ekran za pomocą CSS (100%×100%).
    document.body.appendChild(renderer.domElement);
    // Dodaj canvas do DOM — teraz gra jest widoczna.

    renderer.compile(scene, camera);
    // Kompilacja shaderów GPU — Two.js przesyła materiały do GPU.
    // Na wolnych kartach trwa 1–5s (dlatego mamy osobny loader).
    // Bez compile(): pierwsza klatka byłaby bardzo wolna (lazy compilation).

    updateProgress(100, 'GOTOWE!');
    await yieldRender();

    // Ukryj loader, pokaż HUD gry
    document.getElementById('scene-loader').style.display = 'none';
    ['#info_box', '#eventb', '#level', '#ranking', '#chat'].forEach(s => { $(s).style.display = 'block'; });

    // ══════════════════════════════════════════════════════════════
    //  POŁĄCZENIE Z SERWEREM GRY (WebSocket)
    // ══════════════════════════════════════════════════════════════

    let lastVisiblePlayers = [];
    // Gracze widoczni w poprzedniej klatce.
    // Używane do ukrywania graczy którzy wyszli z pola widzenia:
    //   lastVisiblePlayers różnica vf (nowi widoczni) = do ukrycia.

    const gs = new WebSocket(wsUrl); // Połącz z serwerem gry
    gs.binaryType = 'arraybuffer';   // Odbieraj dane jako ArrayBuffer

    // Błąd połączenia (przed open) — serwer niedostępny (np. token wygasł)
    gs.onerror = function () {
      document.getElementById('scene-loader').style.display = 'none';
      showLobby();
      ['#logout', '#country', '#nick', '#play', '#media'].forEach(s => { $(s).style.display = 'block'; });
      alert('Nie można połączyć z serwerem gry. Spróbuj ponownie.');
    };

    /*
     * ══════════════════════════════════════════════════════════════
     *  PAKIETY WYSYŁANE DO SERWERA GRY (child.js)
     * ══════════════════════════════════════════════════════════════
     *
     *  [0, v]              — ruch poziomy gracza
     *                         v: Int8 ±127 (ujemna = lewo, dodatnia = prawo)
     *                         Wysyłany: przy każdym ruchu myszy/dotyku/klawiatury
     *                         Handler: smi(v) → gs.send(new Uint8Array([0, v]).buffer)
     *
     *  [1, ...string16]    — wiadomość czatu
     *                         Bajt 1: typ=1, następnie UTF-16 encoded string
     *                         Wysyłany: po naciśnięciu Enter w #sendtext
     *
     *  [2]                 — użycie eventu (przycisk #eventb)
     *                         Brak danych — tylko typ. Serwer wie co zrobić.
     *                         Wysyłany: onClick na przycisku eventu
     *
     *  [8, canShowAd, skinId] — potwierdzenie respawnu
     *                         canShowAd: uint8 1/0 (czy gracz oglądał reklamę)
     *                         skinId: uint8 ID wybranego skina
     *                         Wysyłany: po kliknięciu PLAY na ekranie śmierci
     *                         Handler: showRespawnMenu() → gs.send(new Uint8Array([8, ...]).buffer)
     *
     * ══════════════════════════════════════════════════════════════
     *  PAKIETY WYSYŁANE DO MOTHER SERVERA (mother.js) — PacketSet
     * ══════════════════════════════════════════════════════════════
     *
     *  Type 1 + string(id)             — fetchAccount (pobranie danych konta)
     *                                    Wysyłany: po zalogowaniu przez HTTP
     *
     *  Type 2 + string(id) + uint8(sk) — buySkin (zakup skina)
     *                                    Wysyłany: kliknięcie "Kup" w karuzeli skinów
     *
     *  Type 3 + string(id) + str16(n)  — changeName (zmiana nicku)
     *                                    Wysyłany: potwierdzenie w formularzu nicku
     *
     *  Type 5 + int32(gId) + int32(tok) + string(id) — reconnect
     *                                    Wysyłany: gdy gracz odświeżył stronę w trakcie gry
     *
     *  Type 6 (brak danych)            — pollGames (lista serwerów)
     *                                    Wysyłany: co 500ms przez setInterval (polling)
     *
     * ══════════════════════════════════════════════════════════════
     */

    // Przycisk eventu wysyła pakiet [2] = case 2 w child.js (użycie eventu)
    $('#eventb').onclick = function () { gs.send(new Uint8Array([2]).buffer); };

    gs.onopen = function () {
      gs.onerror  = function () {}; // Po otwarciu: ignoruj błędy połączenia (obsługujemy je inaczej)
      gs.onclose  = function () {}; // Zamknięcie po otwartym połączeniu — obsługiwane przez UI
      gs.onmessage = hgm.bind(new PacketGet());
      // hgm = handleGameMessage (poniżej) — parsuje pakiety serwera gry.
      // bind(new PacketGet()): każda wiadomość korzysta z tego samego parsera (zachowuje stan indeksu).
    };

    // ══════════════════════════════════════════════════════════════
    //  CHAT W GRZE
    // ══════════════════════════════════════════════════════════════

    /**
     * Dodaje linię wiadomości do okna czatu.
     * Czyści najstarsze wiadomości gdy przekroczone 60 linii (zapobiega nieograniczonemu wzrostowi DOM).
     *
     * @param {object} playerObj - obiekt Player (ma .hex_color i .name)
     * @param {string} msg       - treść wiadomości
     */
    function appendChat(playerObj, msg) {
      const textEl = document.getElementById('text');
      const line   = document.createElement('div');
      line.className = 'chat-line';

      // Kolorowy nick gracza (kolor neonowy skina)
      const name = document.createElement('font');
      name.style.color = '#' + playerObj.hex_color;
      name.textContent = playerObj.name + ': ';

      // Treść wiadomości (biały tekst)
      const body = document.createElement('span');
      body.textContent = msg;

      line.appendChild(name);
      line.appendChild(body);
      textEl.appendChild(line);
      textEl.scrollTop = textEl.scrollHeight;
      // scrollTop = scrollHeight: przewiń na sam dół po każdej nowej wiadomości.

      while (textEl.childElementCount > 60) textEl.removeChild(textEl.firstChild);
      // Ogranicz do 60 linii — usuń najstarszą gdy przekroczone.
      // Zapobiega nieograniczonemu wzrostowi DOM i zużycia pamięci.
    }

    // ══════════════════════════════════════════════════════════════
    //  OBSŁUGA PAKIETÓW OD SERWERA GRY
    //
    //  Wywoływana przez gs.onmessage = hgm.bind(new PacketGet()).
    //  Format pakietu: [count(1B)] [type(1B) dane...] × count
    // ══════════════════════════════════════════════════════════════

    /**
     * Dekoduje wiadomości binarne od serwera gry.
     * Obsługiwane typy:
     *   0  → Pozycje widocznych graczy (x, y, event_use) — wysyłane co tick (60Hz)
     *   1  → Nowi gracze dołączyli (id, name, skin)
     *   2  → Gracze wyszli z gry (id)
     *   3  → Inicjalizacja własnego gracza + lista wszystkich graczy
     *   4  → Dane poziomów mapy (10 ringów naraz)
     *   5  → Śmierć gracza (id)
     *   6  → Zarezerwowane (ignorowane)
     *   7  → Ukrycie gracza (teleport/spawn)
     *   8  → Wiadomość czatu (id + tekst)
     *   9  → Leaderboard TOP 6 (id + byte_point)
     *   10 → Własna pozycja poza TOP 6 (rank + byte_point)
     *   11 → Postęp eventu (X/10)
     *   12 → Zarobione złoto po śmierci (uint32)
     *   13 → Zmiana skina gracza podczas gry
     */
    function hgm(packet) {
      const p = this.set_buffer(packet.data);

      for (let i = p.g_length8(); i--;) {
        switch (p.g_uint8()) {

          // ── Type 0: Aktualizacja pozycji widocznych graczy ──
          // Wysyłany przez serwer gry co tick (~60Hz) dla każdego gracza.
          case 0: {
            const vf = []; // lista graczy widocznych w tej klatce

            for (let ix = p.g_length8(); ix--;) {
              const id = p.g_uint8();   // ID gracza
              const pl = players[id];   // pobierz obiekt Player
              lastVisiblePlayers.rm_val(pl);
              // Usuń z "poprzednio widocznych" — ci co zostaną w lastVisiblePlayers
              // po tej pętli = wyszli z pola widzenia → do ukrycia.
              vf.push(pl);

              if (!pl.obj.visible) pl.obj.visible = true; // Pokaż gracza jeśli był ukryty
              pl.set_pos(p.g_float(), p.g_float()); // Zaktualizuj pozycję (x, y) z serwera

              // Aktualizacja materiału przy zmianie stanu event_use
              const ec = p.g_int8();
              if (pl.event !== ec) {
                // Stan się zmienił → zaktualizuj materiał modelu
                if (ec === -1 || ec === -3) {
                  pl.obj.children[0].children[0].material = xm;
                  // NormalMaterial = wizualny sygnał że gracz używa eventu / jest trafiony
                } else if (skinModelCache[pl.skin_id] && pl.obj && pl.obj.children[0]) {
                  pl.obj.children[0].children[0].material = skinModelCache[pl.skin_id].children[0].material;
                  // Przywróć normalny materiał skina
                }
                pl.event = ec;
              }
            }

            // Ukryj graczy którzy wyszli z pola widzenia (zostali w lastVisiblePlayers)
            for (let ix = lastVisiblePlayers.length; ix--;) {
              if (lastVisiblePlayers[ix]) lastVisiblePlayers[ix].obj.visible = false;
            }
            lastVisiblePlayers = vf; // Aktualizuj listę dla następnej klatki
            break;
          }

          // ── Type 1: Nowi gracze dołączyli ──
          case 1: {
            for (let ix = p.g_length8(); ix--;) {
              const id = p.g_uint8(), n = p.g_string16(), sk = p.g_uint8();
              if (!players[id]) players[id] = new Player(id, n, sk);
              // Utwórz nowy obiekt Player jeśli nie istnieje (zabezpieczenie przed duplikatami)
            }
            break;
          }

          // ── Type 2: Gracze wyszli z gry ──
          case 2: {
            for (let ix = p.g_length8(); ix--;) {
              players[p.g_uint8()].destructor();
              // destructor(): usuń obiekt Three.js ze sceny, wyczyść referencje
            }
            break;
          }

          // ── Type 3: Inicjalizacja własnego gracza ──
          // Wysyłany tylko raz przy połączeniu z serwerem gry.
          case 3: {
            myPlayerId = p.g_uint8();
            // Zapamiętaj ID własnego gracza — w Player() użyje go: if (myPlayerId === id) myPlayer = this

            for (let ix = p.g_length8(); ix--;) {
              const id = p.g_uint8(), n = p.g_string16(), sk = p.g_uint8();
              players[id] = new Player(id, n, sk);
              // Utwórz Player dla każdego gracza na serwerze (łącznie z sobą i botami)
            }
            break;
          }

          // ── Type 4: Dane poziomów mapy (chunk 10 ringów) ──
          //
          // Wysyłany przez child.js:
          //   a) przy połączeniu (pierwsze 10 poziomów — poziomy 0–9)
          //   b) proaktywnie gdy gracz zbliża się do końca znanych danych
          //      (child.js śledzi postęp i dosyła kolejne chunki z wyprzedzeniem)
          //
          // Format pakietu type 4:
          //   [count: 1B] × count:
          //     [len: 1B] [128 bajtów kafelków]   — jeden poziom = 128 kafelków (0/1/2)
          //
          // Buforowanie:
          //   levels[levelsReceived + ix] = dane
          //   levelsReceived += 10 po każdym pakiecie
          //   Tablica levels[] rośnie w nieskończoność (nie ma limitu — gracz może grać wiecznie)
          //
          // Synchronizacja z ringami: patrz komentarz przy tworzeniu ringGroups (wyżej)
          case 4: {
            for (let ix = p.g_length8(); ix--;) {
              levels[levelsReceived + ix] = p.g_int8_arr();
              // Zapisz dane poziomu: Uint8Array[128] — 128 kafelków kołowych dla tego poziomu.
            }
            if (!levelsReceived) {
              // Pierwsze dane poziomów — sprawdź czy ringi są gotowe
              if (ringDataReady) {
                for (let k = 0; k < 5; k++) loadRing(ringGroups[k], k);
                // Ringi gotowe → załaduj od razu
                ringDataReady = false;
              } else {
                ringDataReady = true;
                // Ringi nie gotowe → ustaw flagę że dane czekają
              }
            }
            levelsReceived += 10; // Przesuń licznik odebranych poziomów o 10
            break;
          }

          // ── Type 5: Śmierć gracza ──
          case 5: {
            for (let ix = p.g_length8(); ix--;) {
              const id = p.g_uint8();
              if (players[id]) {
                players[id].obj.visible = false; // Ukryj model gracza
                if (players[id] === myPlayer) {
                  showRespawnMenu(gs, resetRings);
                  // Gracz to MY → pokaż ekran śmierci z odliczaniem i przyciskiem RESPAWN
                }
              }
            }
            break;
          }

          case 6: {
            for (let ix = p.g_length8(); ix--;) p.g_uint8(); // Pomiń dane (zarezerwowane)
            break;
          }

          // ── Type 7: Ukryj gracza (teleport / spawn) ──
          case 7: {
            for (let ix = p.g_length8(); ix--;) {
              const id = p.g_uint8();
              if (players[id]) players[id].obj.visible = false;
              // Gracz jest "niewidoczny" — np. właśnie się odrodzono w innym miejscu
            }
            break;
          }

          // ── Type 8: Wiadomość czatu ──
          case 8: {
            for (let ix = p.g_length8(); ix--;) {
              const id  = p.g_uint8();
              const msg = p.g_string16(); // UTF-16 obsługuje emoji i znaki specjalne
              if (players[id]) appendChat(players[id], msg);
            }
            break;
          }

          // ── Type 9: Leaderboard TOP 6 ──
          case 9: {
            const cnt = p.g_length8(); // liczba graczy w rankingu (0–6)

            if (cnt < 6) {
              // Mniej niż 6 graczy — wyczyść nadmiarowe pozycje
              for (let ix = 6; ix--;) $('#ranking').children[ix * 2].innerText = '';
            }

            for (let ix = cnt; ix--;) {
              const id   = p.g_uint8(); // ID gracza
              const pts  = p.g_uint8(); // skompresowane punkty (0–255)
              const cell = $('#ranking').children[ix * 2];
              // children[ix * 2]: co drugi element to tekst (nieparzyste = <br>)
              const isMe = myPlayer.id === id;
              cell.style.fontWeight = isMe ? 'bold' : '';
              cell.innerText = (isMe ? '• ' : '') + (ix + 1) + '. ' + players[id].name + '  ' + formatPointsByte(pts);
              // Przykład: "• 3. GraczXYZ  500 K" (z kropką dla własnego gracza)
              cell.style.color = '#' + players[id].hex_color; // Kolor neonowy skina gracza
            }
            break;
          }

          // ── Type 10: Własna pozycja poza TOP 6 ──
          case 10: {
            const rank = p.g_uint8(); // pozycja gracza w rankingu (0-indexed)
            const pts  = p.g_uint8(); // skompresowane punkty
            const cell = $('#ranking').children[12]; // 13. element = dodatkowy wiersz za TOP6

            if (rank > 5) {
              cell.innerText     = (rank + 1) + '. ' + myPlayer.name + '  ' + formatPointsByte(pts);
              cell.style.display = 'block'; // Pokaż wiersz z pozycją gracza
            } else {
              cell.style.display = 'none'; // Gracz w TOP6 — ten wiersz niepotrzebny
            }
            break;
          }

          // ── Type 11: Postęp eventu (X/10) ──
          case 11: {
            const prog = p.g_uint8(); // aktualna wartość eventu (0–10)
            $('#eventb').children[1].innerText = prog + '/10';
            // Aktualizuj licznik pod przyciskiem eventu: "7/10"
            break;
          }

          // ── Type 12: Zarobione złoto ──
          case 12: {
            const gold = p.g_uint32(); // uint32: może być duże (miliony punktów)
            $('#win_points').innerText = gold + ' Gold!';
            // Wyświetl na ekranie śmierci: "50000 Gold!"
            break;
          }

          // ── Type 13: Gracz zmienił skin podczas gry ──
          case 13: {
            for (let ix = p.g_length8(); ix--;) {
              const id = p.g_uint8(), sk = p.g_uint8();
              if (players[id]) players[id].cheange_skin(sk);
              // cheange_skin(): usuwa stary model, wczytuje nowy, zachowuje sprite nicku
            }
            break;
          }
        }
      }
    }

    // ══════════════════════════════════════════════════════════════
    //  SYSTEM RINGÓW — NIESKOŃCZONY CYLINDER
    //
    //  Cylinder gry składa się z 5 recyclingowanych "ringów" (pierścieni).
    //  Każdy ring = THREE.Group zawierający 128 kolumn rozmieszczonych kołowo.
    //  Gdy gracz opada i mija ring → ring "teleportuje się" niżej z nowymi danymi.
    //
    //  Analogia: jak wstęga bieżni — 5 segmentów w pętli.
    //
    //  KIEDY RING JEST "DORENDEROWYWYANY" (DORENDEROWANY / PRZESUNIĘTY):
    //    Wywołanie: animate() → scrollCyl() → advCyl()
    //    Warunek: og.position.y - 128 - 18 <= myPlayer.obj.position.y
    //    Czyli: gracz dotarł do pozycji o 146j poniżej dolnej krawędzi najstarszego ringu.
    //    Wówczas:
    //      1. ringGroups[ringGroupIndex % 5] = og   — przypisz ring do nowego slotu
    //      2. loadRing(og, ringGroupIndex)           — załaduj dane nowego poziomu
    //      3. ringGroupIndex++                       — przesuń wskaźnik
    //    Nowe dane (levels[ringGroupIndex]) muszą już być dostępne w tablicy levels[].
    //    Jeśli serwer nie zdążył wysłać pakietu type 4 → ring pozostaje z poprzednimi danymi.
    // ══════════════════════════════════════════════════════════════

    
    //  * Typy kafelków (levels[ri][0..127]):
    //  *   0 = brak platformy → tile.visible = false (kolumna niewidoczna)
    //  *   1 = bezpieczna platforma (zielona/teksturowana) → bezpieczne lądowanie
    //  *   2 = niebezpieczna platforma (czerwona) → odbiera event lub zabija

    /**
     * Ładuje dane poziomu do ringu — ustawia widoczność i materiał każdej z 128 kolumn.
     *
     * ── CO ROBI DLA KAŻDEJ KOLUMNY (tile = group.children[y]) ──────────
     *
     *  tile to THREE.Group (klon obj) z dwoma meshami:
     *    tile.children[0] = główny mesh kolumny (zawsze tworzony)
     *    tile.children[1] = hazard mesh — czerwona nakładka (zawsze tworzony, visible przełączany)
     *
     *  PUSTE POLE (tt = 0):
     *    tile.visible = false
     *    → Three.js całkowicie pomija ten obiekt podczas renderowania (nie trafia do GPU)
     *    → Gracz "przeleci" przez tę pozycję kątową bez kolizji (fizyka po stronie serwera)
     *    → Nie ma żadnej geometrii na tej pozycji okręgu
     *
     *  BEZPIECZNA PLATFORMA (tt = 1):
     *    tile.visible = true           → kolumna pojawia się w scenie
     *    tile.children[1].visible = false  → hazard mesh ukryty (brak czerwonej nakładki)
     *    tile.children[0].material =
     *      checkpoint? ml.m_col         → pełny zielony emisyjny pierścień (wszystkie 128 kolumn zielone)
     *                : fm[segment % 2]  → tekstura kamienia dla bieżącego segmentu (ltc[0] lub ltc[1])
     *
     *  NIEBEZPIECZNA PLATFORMA (tt = 2):
     *    tile.visible = true            → kolumna widoczna
     *    tile.children[1].visible = true   → hazard mesh WIDOCZNY nad children[0]
     *    tile.children[0].material = ml.m_bad  → czerwony emisyjny (intensywność pulsuje w animate())
     *    Efekt wizualny: czerwona kolumna ze świecącą nakładką = czytelny sygnał niebezpieczeństwa
     *
     * 
     *   Checkpoint (zielony pierścień):
     *   Warunek: Math.sqrt(ri / 10) % 1 === 0 → ri = 0, 10, 40, 90, 160, ...
     *   Przy tych poziomach WSZYSTKIE kafelki typ 1 → materiał ml.m_col (zielony emisyjny).
     *   Checkpoint = poziom, na którym gracz "zapisuje" postęp.


     * ── SKĄD levels[ri][127 - y] ZAMIAST levels[ri][y] ─────────────────
     *
     *  group.children[y] to ODWRÓCONA kolejność klonów (brg() iteruje od 127 do 0).
     *  group.children[0] = klon obrócony o kąt y=127 (≈ 355°)
     *  group.children[127] = klon obrócony o kąt y=0  (0°)
     *  levels[ri] jest indeksowany normalnie [0..127] od lewej do prawej.
     *  Korekta: levels[ri][127 - y] mapuje dane serwera na właściwą kolumnę kątową.
     *
     * ── CHECKPOINT — KIEDY CAŁY RING JEST ZIELONY ───────────────────────
     *
     *  Math.sqrt(ri / 10) % 1 === 0  ←→  ri/10 jest pełnym kwadratem
     *  Poziomy checkpoint: ri = 0, 10, 40, 90, 160, 250, ...
     *  Wzór: ri = n² × 10, gdzie n = 0, 1, 2, 3, ...
     *  Przy checkpoint: kafelki typ 1 → ml.m_col (zielony) zamiast fm[] (tekstura)
     *  Kafelki typ 2 są nadal czerwone (niebezpieczne nawet na checkpoincie)
     *
     * ── POZYCJA Y RINGU ─────────────────────────────────────────────────
     *
     *  y = -ri × 16 × 8 + 16 = -ri × 128 + 16
     *  Każdy poziom mapy ma wysokość: 8 warstw × TS(16j) = 128 jednostek Y
     *  Offset +16: wyrównanie do siatki kolizji serwera
     *
     *  Przykłady pozycji Y w scenie:
     *    ri= 0 →  y =    16  (start gracza, tuż nad Y=0)
     *    ri= 1 →  y =  -112
     *    ri= 2 →  y =  -240
     *    ri= 3 →  y =  -368
     *    ri= 4 →  y =  -496
     *    ri= 5 →  y =  -624  (pierwszy ring po recycling)
     *    ri=10 →  y = -1264  (pierwszy checkpoint)
     *    ri=40 →  y = -4976  (drugi checkpoint, n=2)
     *
     * @param {THREE.Group} group - ring THREE.Group do załadowania
     * @param {number}      ri    - indeks poziomu (0 = start, 1 = niżej, ...)
     */
    function loadRing(group, ri) {
      group.position.y = -ri * 16 * 8 + 16;
      // Ustaw pozycję Y ringu: -ri × 128 + 16
      // Three.js Y rośnie W GÓRĘ → ujemne Y = głębiej w cylindrze (gracz opada w dół)

      for (let y = 128; y--;) {
        // y: 127 → 0 (odwrócona kolejność, zgodna z kolejnością dodawania w brg())
        const tt   = levels[ri][127 - y]; // typ kafelka z danych serwera (0/1/2)
        const tile = group.children[y];   // klon kolumny na pozycji kątowej y

        switch (tt) {
          case 0:
            // PUSTA PRZESTRZEŃ — kolumna całkowicie ukryta
            // renderer pomija ukryte obiekty (visible=false = zero kosztu GPU)
            tile.visible = false;
            break;
          case 1:
            // BEZPIECZNA PLATFORMA — kolumna widoczna, hazard ukryty
            tile.visible = true;
            tile.children[1].visible = false; // Schowaj czerwoną nakładkę hazard mesh
            tile.children[0].material =
              (Math.sqrt(ri / 10) % 1)   // % 1 !== 0 → NIE checkpoint
                ? fm[cylinderSegment % 2] // Zwykła platforma → tekstura segmentu (fm[0] lub fm[1])
                : ml.m_col;               // Checkpoint (% 1 === 0) → zielony emisyjny materiał
            break;
          case 2:
            // NIEBEZPIECZNA PLATFORMA — kolumna widoczna, hazard mesh widoczny
            tile.visible = true;
            tile.children[1].visible = true;     // Pokaż czerwoną nakładkę hazard
            tile.children[0].material = ml.m_bad; // Czerwony emisyjny (pulsuje w animate())
            break;
        }
      }
    }

    /**
     * Aktualizuje materiał cylindra gdy gracz wchodzi w nowy segment (zmiana tekstury ścian).
     * Wywołuje ltc() żeby załadować teksturę nowego segmentu (lub proceduralny kolor).
     *
     * @param {THREE.Mesh} cylMesh - jeden z dwóch cylindrów (cyl[0] lub cyl[1])
     */
    function updCyl(cylMesh) {
      const seg = (Math.sqrt(ringGroupIndex / 10)) | 0;
      // Oblicz aktualny segment: Math.sqrt(index/10) | 0
      // Analogiczna logika jak respawn_lvl w child.js.

      if (cylinderSegment !== seg) {
        cylinderSegment = seg; // Zaktualizuj bieżący segment

        const tx = ltc(seg); // Pobierz (lub załaduj) teksturę dla tego segmentu
        if (tx) {
          cm[seg % 2].map = tx; // Ustaw nową teksturę na materiale ściany
          fm[seg % 2].map = tx; // Ustaw nową teksturę na materiale podłogi
        } else {
          // Brak tekstury → użyj proceduralnego koloru (btc())
          const col = btc(seg % 255);
          cm[seg % 2].map = tl.t_def; cm[seg % 2].color.setHex(col.num);
          fm[seg % 2].map = tl.t_def; fm[seg % 2].color.setHex(col.num);
        }
      }
      if (cylMesh.material !== cm[seg % 2]) cylMesh.material = cm[seg % 2];
      // Aktualizuj materiał cylindra jeśli się zmienił (unikaj zbędnych setState)
    }

    /**
     * "Przesuwa" najstarszy ring w dół gdy gracz opada poza jego zasięg.
     * Mechanizm recycling — zamiast tworzyć nowe ringi, przewijamy istniejące.

     * Recykling ringów — teleportuje najstarszy ring w dół z nowymi danymi poziomu.
     *
     * ── KIEDY JEST WYWOŁYWANA ────────────────────────────────────────────
     *
     *  Każda klatka: animate() → scrollCyl() → advCyl()
     *  Warunek teleportacji (sprawdzany co klatkę, ~60Hz):
     *    og.position.y - 128 - 18 <= myPlayer.obj.position.y
     *    czyli: gracz dotarł do pozycji o 146j PONIŻEJ górnej krawędzi najstarszego ringu
     *
     *  W ludzkim języku: gracz prawie mija ten ring od dołu →
     *  teleportujemy go niżej zanim gracz go całkowicie opuści wzrokiem.
     *
     * ALGORYTM RECYCLING RINGÓW:
     *   Cykliczny bufor 5 ringów (indeksy 0–4 mod 5):

     *  Margines 128+18=146:
     *    128j = pełna wysokość jednego poziomu (gracz musi „zejść" jeden poziom)
     *    +18j = bufor bezpieczeństwa (ring znika zanim gracz dotrze do samego dołu)
     *
     * 
     * 
     * 
     *   Czas T=0:  ring[0]=poziom0, ring[1]=p1, ring[2]=p2, ring[3]=p3, ring[4]=p4
     *              ringGroupIndex = 5
     *   Gracz opada do poziomu 0:
     *     og = ringGroups[(5-5)%5] = ringGroups[0]  ← najstarszy (był najwyżej)
     *     og.position.y - 128 - 18 <= myPlayer.y ?  ← czy gracz dotarł do granicy?
     *     TAK → ringGroups[5%5=0] = og; loadRing(og, 5); ringGroupIndex=6
     *
     *   Czas T=1:  ring[0]=poziom5, ring[1]=p1, ring[2]=p2, ring[3]=p3, ring[4]=p4
     *              ringGroupIndex = 6
     *   Gracz opada dalej → następny najstarszy = ring[1] (poziom1) → staje się poziomem6
     *   ...i tak w kółko — 5 ringów obsługuje nieskończony cylinder.




     * ── KTÓRY RING JEST „NAJSTARSZY" ────────────────────────────────────
     *
     *  ringGroups[] to cykliczny bufor (slot 0–4, modulo 5).
     *  ringGroupIndex to licznik NASTĘPNEGO do załadowania (startuje na 5).
     *
     *  Najstarszy ring = ten załadowany 5 kroków temu:
     *    og = ringGroups[(ringGroupIndex - 5) % 5]
     *
     *  Przykład z liczbami (ringGroupIndex = 7):
     *    slot 0 → poziom 5 (załadowany gdy index=5)
     *    slot 1 → poziom 6 (załadowany gdy index=6)
     *    slot 2 → poziom 2 (niezmieniony od startu)  ← najstarszy! (7-5=2)
     *    slot 3 → poziom 3
     *    slot 4 → poziom 4
     *    og = ringGroups[(7-5)%5] = ringGroups[2] = poziom 2 ← do recyklingu
     *
     * ── CO SIĘ DZIEJE PRZY TELEPORTACJI ─────────────────────────────────
     *
     *  1. ringGroups[ringGroupIndex % 5] = og
     *     → Zapisz referencję do tego ringu w nowym slocie (nadpisze stary)
     *     → Np: ringGroups[7%5=2] = og (ten sam slot, nowy poziom)
     *
     *  2. loadRing(og, ringGroupIndex)
     *     → Ustaw og.position.y = -ringGroupIndex × 128 + 16  (nowa pozycja na dole)
     *     → Przejdź przez 128 kolumn: ustaw visible + material wg levels[ringGroupIndex]
     *     → levels[ringGroupIndex] MUSI już być w tablicy (serwer dosyła z wyprzedzeniem)
     *
     *  3. ringGroupIndex++
     *     → Następny advCyl() będzie szukał ringu dla kolejnego poziomu
     *
     * ── WIZUALIZACJA STANU (ringGroupIndex = 5, gracz na poziomie 0) ────
     *
     *  Y=+16  [ring slot 0] poziom 0  ← gracz jest tu (start)
     *  Y=-112 [ring slot 1] poziom 1
     *  Y=-240 [ring slot 2] poziom 2
     *  Y=-368 [ring slot 3] poziom 3
     *  Y=-496 [ring slot 4] poziom 4  ← najniższy widoczny ring
     *
     *  Gdy gracz spada do Y ≈ -146 (poziom 1 minus bufor):
     *    og = slot 0 (poziom 0, Y=16), og.y - 146 = -130 <= -146 ?  NIE → czekaj
     *
     *  Gdy gracz spada do Y = -130:
     *    og.y - 128 - 18 = 16 - 146 = -130 <= -130 ?  TAK → teleport!
     *    → slot 0 dostaje poziom 5, przesuwa się na Y = -624
     *
     *  Nowy stan:
     *  Y=-112 [ring slot 1] poziom 1  ← najwyższy widoczny (gracz mija)
     *  Y=-240 [ring slot 2] poziom 2
     *  Y=-368 [ring slot 3] poziom 3
     *  Y=-496 [ring slot 4] poziom 4
     *  Y=-624 [ring slot 0] poziom 5  ← właśnie teleportowany w dół
     */
    function advCyl() {
      const og = ringGroups[(ringGroupIndex - 5) % 5];
      // Najstarszy ring = ten który był 5 poziomów temu (cykliczny bufor 5 ringów)
      // Najstarszy ring w buforze (5 kroków temu)
      if (!og) return;
      if (og.position.y - 128 - 18 <= myPlayer.obj.position.y) return;
      // Warunek TRUE = NIE recykluj jeszcze.
      // Gracz (ujemne Y) jest blizej ringu niz prog 146j — ring moze byc jeszcze widoczny.
      //
      // Kierunek: gracz OPADA = Y gracza staje sie coraz bardziej ujemne.
      // Ring ktory byl na poczatku "nad" graczem (wyzsze Y), po pewnym czasie
      // jest daleko ZA graczem — gracz go minal opadajac, ring jest wyzej (Y wyzsze).
      // Gdy ring jest juz 147j WYZEJ niz gracz (gracz daleko pod ringiem) → recykluj:
      //   og.y - 146 > player.y → warunek powyzej FALSE → wykonujemy recykling ponizej.

      ringGroups[ringGroupIndex % 5] = og;   // Wpisz ring do nowego slotu (cyklicznie)
      loadRing(og, ringGroupIndex);            // Przesuń ring niżej + załaduj nowe dane poziomu
      ringGroupIndex++;                        // Przesuń globalny licznik
    }

    /**
     * Sprawdza i wykonuje scrollowanie cylindrów ścian.
     * Gdy gracz opada poniżej zakresu cylindra → teleportuj go niżej.
     *
     * DWA CYLINDRY — MECHANIZM DOUBLE-BUFFER:
     *   cyl[0] i cyl[1] to dwie "tuby" o wysokości 512j każda.
     *   Startowo: cyl[0].y=0, cyl[1].y=-512 (cyl[1] pod cyl[0]).
     *
     *   Gdy gracz opada poniżej zakresu NIŻSZEGO cylindra:
     *     Teleportuj WYŻSZY cylinder na nową pozycję o 512j niżej od niższego.
     *     updCyl() aktualizuje jego teksturę (nowy segment).
     *
     *   Efekt: gracz zawsze widzi dwie "tuby" ścian − jeden recykling co 512j ruchu.
     *   Wizualnie: nieskończona ściana cylindra bez przerw (jak pętla wideo).
     *
     *   KIEDY WYWOŁYWANA: każda klatka animate() → scrollCyl() → advCyl()
     *   Koszt: O(1) — sprawdzenie warunku + ewentualnie 1 teleportacja.
     */
    function scrollCyl() {
      advCyl(); // Sprawdź czy ring wymaga przewinięcia

      const py = myPlayer.obj.position.y;
      // Sprawdź czy gracz jest jeszcze w zakresie obydwu cylindrów
      if (py >= cyl[0].position.y + 128 + 8 || py >= cyl[1].position.y + 128 + 8) return;
      // Gracz jest wysoko (powyżej obu cylindrów) → poczekaj aż opada

      const li = cyl[0].position.y < cyl[1].position.y ? 1 : 0;
      // li = indeks NIŻSZEGO cylindra (ten który jest bardziej w dół = wyższy indeks Y w "w dół" układzie)
      const ui = 1 - li;
      // ui = indeks wyższego cylindra

      cyl[li].position.y = cyl[ui].position.y - 512;
      // Teleportuj niższy cylinder o 512 niżej od wyższego = recykling
      updCyl(cyl[li]);
      // Zaktualizuj teksturę teleportowanego cylindra (może być nowy segment)
    }

    /**
     * Resetuje wszystkie ringi do pozycji startowej (wywoływane po respawnie gracza).
     *
     * Wywołanie: showRespawnMenu(gs, resetRings) → gracz kliknął RESPAWN.
     * Po respawnie gracz teleportuje się na poziom 0 → ringi muszą być z powrotem na górze.
     *
     * Co się dzieje:
     *   1. playerLevel = -1  → wymuś aktualizację licznika #level przy następnym set_pos()
     *   2. cyl[0].y = 0, cyl[1].y = -512  → cylindry wracają na start
     *   3. loadRing(ringGroups[i], i) dla i=0..4  → pierwsze 5 poziomów do ringów
     *   4. ringGroupIndex = 5  → następny advCyl() załaduje poziom 5
     */
    function resetRings() {
      playerLevel = -1;  // Wymuś aktualizację licznika poziomów przy następnym set_pos()
      cyl[0].position.y = 0;
      cyl[1].position.y = -512;
      for (let i = 0; i < 5; i++) loadRing(ringGroups[i], i);
      ringGroupIndex = 5; // Następny ring do załadowania = poziom 5 (pierwsze 5 już załadowane)
    }

    // ══════════════════════════════════════════════════════════════
    //  KLASA PLAYER — reprezentacja gracza w scenie 3D
    // ══════════════════════════════════════════════════════════════

    /**
     * Tworzy obiekt gracza z modelem 3D, etykietą nicku i metodami aktualizacji.
     *
     * @param {number} id   - ID gracza (z serwera)
     * @param {string} name - nick gracza
     * @param {number} skin - ID skina (0–22)
     */
    function Player(id, name, skin) {
      this.obj      = new THREE.Group();
      // Group = kontener dla wszystkich elementów 3D gracza:
      //   children[0] = model OBJ (mesh postaci)
      //   children[1] = sprite nicku (TextSprite)
      // Przesuwanie Group = przesuwanie wszystkich dzieci razem.

      this.x        = 0;     // pozycja kątowa na cylindrze (0–1023)
      this.y        = 0;     // wysokość Y w cylindrze
      this.name     = name || 'NoName';
      this.id       = id;
      this.skin_id  = skin;
      this.event    = undefined;
      // event = bieżący stan event_use — używany do wykrywania ZMIANY stanu (if pl.event !== ec)

      // ── Kolor neonowy skina ──
      const cn = lightSkins[skin]; // wartość hex jako number (np. 0x00d4ff)
      let ch = cn.toString(16);
      while (ch.length !== 6) ch = '0' + ch; // Uzupełnij do 6 znaków (np. "ff" → "0000ff")
      this.color     = cn; // number dla Three.js: light.color.setHex(p.color)
      this.hex_color = ch; // string dla CSS: "#" + p.hex_color
      this.obj.visible = false; // Niewidoczny do czasu pierwszej aktualizacji pozycji (case 0)

      // ── Etykieta nicku nad głową (TextSprite) ──
      const ns = new THREE.TextSprite({
        material:       { color: this.color, fog: true }, // Kolor nicku = kolor skina
        redrawInterval: 250,  // Odrysowuj etykietę co 250ms (oszczędność GPU)
        textSize:       10,   // Rozmiar tekstu (w jednostkach Three.js)
        texture:        { text: this.name, fontFamily: 'Arial,Helvetica,sans-serif' }
      });
      ns.position.y = 20; // 20 jednostek nad centrum modelu

      loadPlayerModel(skin, this, null, ns); // Załaduj model 3D + dodaj do obj
      scene.add(this.obj);                    // Dodaj grupę do sceny

      if (myPlayerId === id) myPlayer = this;
      // Jeśli to MY (ID naszego gracza) → zapisz referencję do myPlayer.
      // myPlayer używany w animate() do kamera follow i scrollowania cylindra.

      /**
       * Zmienia skin gracza podczas gry.
       * Usuwa wszystkie stare dzieci z obj (model + sprite), zachowuje sprite nicku,
       * wczytuje nowy model skina.
       *
       * @param {number} ns2 - ID nowego skina
       */
      this.cheange_skin = function (ns2) {
        let nsNode = null;
        // Znajdź sprite nicku (TextSprite) wśród dzieci
        for (let i = 0; i < this.obj.children.length; i++) {
          if (this.obj.children[i].type === 'Sprite') nsNode = this.obj.children[i];
        }

        // Usuń wszystkie dzieci (model + sprite)
        while (this.obj.children.length > 0) this.obj.remove(this.obj.children[0]);

        // Aktualizuj kolor na podstawie nowego skina
        const n = lightSkins[ns2];
        let h = n.toString(16);
        while (h.length !== 6) h = '0' + h;
        this.color     = n;
        this.hex_color = h;

        if (nsNode) nsNode.material.color.setHex(this.color); // Zaktualizuj kolor nicku
        this.skin_id = ns2;
        loadPlayerModel(ns2, this, null, nsNode); // Załaduj nowy model skina (i dodaj sprite z powrotem)
      };

      /**
       * Aktualizuje pozycję gracza w przestrzeni 3D.
       *
       * Algorytm (pozycja kątowa → punkt na cylindrze):
       *   x (0–1023) → kąt (0–2π): ang = (x × 2π) / 1023
       *   punkt 3D: (R × sin(ang), y, R × cos(ang))
       *   Gracz "lepi się" do wewnętrznej ściany cylindra na promieniu R.
       *
       * Dla własnego gracza (myPlayer):
       *   Kamera podąża za graczem (po zewnętrznej stronie cylindra, 3.5× dalej).
       *   Kamera patrzy na punkt (0, cameraY-130, 0) — lekko w dół.
       *   Sfera nieba podąża za Y gracza.
       *   Aktualizuje licznik poziomów (#level).
       *   Wywołuje scrollCyl() — przewijanie cylindra.
       *
       * @param {number} x - pozycja kątowa (0–1023, zawijana modulo 1024)
       * @param {number} y - wysokość Y (0 = start, ujemna = wyżej w cylindrze)
       */
      this.set_pos = function (x, y) {
        this.x = x; this.y = y;
        const ang = (x * 2 * Math.PI) / 1023;
        // Konwersja: x (0–1023) → kąt radiany (0–2π)
        // 1023 a nie 1024 bo zakres jest 0–1023 włącznie (10-bitowy int)

        if (this.obj.children[0]) this.obj.children[0].rotation.y += 0.07;
        // Rotacja modelu o 0.07 radianów co wywołanie set_pos = animacja chodu gracza.
        // Nie zależy od rzeczywistego ruchu — zawsze obraca się gdy jest widoczny.

        this.obj.position.set(R * Math.sin(ang), y, R * Math.cos(ang));
        // Pozycja na ścianie cylindra:
        //   X = R × sin(ang)  — oś X
        //   Y = y             — oś pionowa (głębokość cylindra)
        //   Z = R × cos(ang)  — oś Z
        // Punkt na kole o promieniu R w płaszczyźnie XZ.

        if (this === myPlayer) {
          const cd = 3.5; // Kamera jest 3.5× promieniu od środka (poza cylindrem)
          camera.position.set(cd * R * Math.sin(ang), y, cd * R * Math.cos(ang));
          // Kamera na tej samej osi kątowej co gracz ale 3.5× dalej od środka.
          // Efekt: kamera "patrzy z zewnątrz cylindra na wewnętrze" = widok gracza.

          sky.position.y = y; // Sfera nieba podąża za Y gracza — zawsze "otacza"

          // Oblicz aktualny poziom mapy
          const cl = (((Math.abs((y - 8) >> 4)) / 8) | 0);
          // Ta sama formuła co w child.js:
          //   (y - 8) >> 4 = (y-8)/16 = rząd warstwy
          //   Math.abs: Y może być ujemny (wyżej w cylindrze)
          //   / 8 | 0: indeks poziomu (segment = co 8 warstw)

          if (playerLevel < cl) {
            playerLevel = cl; // Aktualizuj tylko gdy rosnie (nie przy cofaniu)
            const ts = Math.pow(1 + ((Math.sqrt(cl / 10)) | 0), 2) * 10;
            // ts = docelowy checkpoint: Math.pow(1 + ranga, 2) × 10
            // Np. ranga=2 → ts = 9×10 = 90 (następny checkpoint na poziomie 90)
            $('#level').innerText = playerLevel + '/' + ts;
            // Wyświetl: "45/90"
          }
          $('#level').style.color = '#' + myPlayer.hex_color;
          // Kolor licznika = kolor skina gracza (dynamicznie pasuje do postaci)

          scrollCyl(); // Sprawdź czy cylindry wymagają przewinięcia

          camera.lookAt(new THREE.Vector3(0, camera.position.y - 130, 0));
          // Kamera patrzy na punkt 130 jednostek PONIŻEJ swojej pozycji Y, na środku cylindra.
          // Efekt: kamera lekko skierowana w dół i do środka = naturalny kąt widoku.
        }
      };

      /**
       * Usuwa gracza ze sceny i zwalnia pamięć.
       * Wywołana przez case 2 (gracz wyszedł z gry).
       */
      this.destructor = function () {
        scene.remove(this.obj); // Usuń grupę Three.js ze sceny (zaprzestaje renderowania)
        this.obj = null;        // Wyczyść referencję (pomaga GC)
        lastVisiblePlayers.rm_val(this); // Usuń z listy widocznych
        players[this.id] = null;
        delete players[this.id]; // Usuń ze słownika graczy
      };
    }

    // ══════════════════════════════════════════════════════════════
    //  STEROWANIE GRACZEM — mysz, dotyk, klawiatura
    // ══════════════════════════════════════════════════════════════

    let isDrag = false; // Czy mysz/palec jest wciśnięty i przesuwa się
    let dsx    = 0;     // Poprzednia pozycja X myszy/dotyku (do obliczenia delta)
    let ibv    = true;  // Czy podpowiedź sterowania (#info_box) jest jeszcze widoczna

    /** Ukrywa podpowiedź sterowania przy pierwszej interakcji gracza */
    function dib() {
      if (ibv) { $('#info_box').style.display = 'none'; ibv = false; }
    }

    // ── Sterowanie myszą ──
    renderer.domElement.onmousedown = function (e) {
      dib();          // Ukryj podpowiedź
      isDrag = true;  // Zacznij śledzenie ruchu
      dsx = e.screenX; // Zapisz startową pozycję
    };
    renderer.domElement.onmousemove = function (e) {
      if (!isDrag) return; // Ruch bez wciśnięcia → ignoruj
      const d = dsx - e.screenX; // Delta: ujemna = ruch w prawo, dodatnia = ruch w lewo
      dsx = e.screenX;           // Aktualizuj poprzednią pozycję
      smi(d);                    // Wyślij ruch do serwera
    };
    renderer.domElement.onmouseup = function () { isDrag = false; }; // Koniec przeciągania

    // ── Sterowanie dotykiem (mobile) ──
    renderer.domElement.ontouchstart = function (e) {
      dib();
      isDrag = true;
      dsx = e.touches[0].screenX; // touches[0] = pierwszy palec
    };
    renderer.domElement.ontouchmove = function (e) {
      if (!isDrag) return;
      const d = dsx - e.touches[0].screenX; // Delta dla dotyku
      dsx = e.touches[0].screenX;
      smi(d);
    };
    renderer.domElement.ontouchend = function () { isDrag = false; };

    let vel = 0; // Bieżąca prędkość klawiatury (akumulowana przy trzymaniu klawisza)
    let ld  = 0; // Ostatni kierunek klawiatury: 0=brak, 1=prawo, 2=lewo

    /** Sprawdza czy focus jest w polu czatu — gdy tak, WASD/strzałki nie sterują graczem */
    function chatFocused() { return document.activeElement === document.getElementById('sendtext'); }

    // ── Sterowanie klawiaturą (strzałki / A-D) ──
    document.addEventListener('keydown', function (e) {
      if (chatFocused()) return; // Gdy piszemy w chacie → ignoruj klawisze gry

      switch (e.which) {
        case 68: case 39: // D lub strzałka prawo
          dib();
          if (vel === 0) vel = 7 + ((Math.random() * 4 - 2) | 0);
          // Startowa prędkość: 7 ± 2 (lekko losowa = "naturalne" przyspieszenie)
          if (ld === 2) { ld = 1; vel = 7; } // Zmiana kierunku → reset prędkości
          if (vel < 30) vel += 1;            // Przyspieszaj (max 30)
          smi(vel);
          break;
        case 65: case 37: // A lub strzałka lewo
          dib();
          if (vel === 0) vel = -7 + ((Math.random() * 4 - 2) | 0);
          if (ld === 1) { ld = 2; vel = -7; }
          if (vel > -30) vel -= 1;
          smi(vel);
          break;
      }
    }, false);

    document.addEventListener('keyup', function (e) {
      if (chatFocused()) return;
      switch (e.which) {
        case 68: case 39: case 65: case 37: // Puszczono klawisz ruchu
          vel = 0; // Zeruj prędkość — zatrzymaj ruch
          ld  = 0; // Zeruj kierunek
          break;
      }
    }, false);

    // ── Czat — wysyłanie po Enter ──
    $('#sendtext').onkeydown = function (e) {
      if (e.keyCode === 13 && this.value.length) {
        // Enter + niepuste pole → wyślij wiadomość
        // Pakiet czatu do child.js: [0x01, len_hi, len_lo, char0_hi, char0_lo, ...]
        //   Bajt 0: typ = 1 (wiadomość czatu) — case 1 w child.js handleClientMessage()
        //   Następnie: s_string16() → uint16 długość + bajty UTF-16 (2B na znak)
        //   child.js rozsyła wiadomość do wszystkich graczy w pokoju jako pakiet type 8
        packetSender.index--;   // Cofnij wskaźnik (usuń poprzedni typ — reużyj bufor)
        packetSender.s_uint8(1); // Typ 1 = wiadomość czatu (case 1 w child.js)
        packetSender.s_string16(this.value); // Tekst wiadomości (UTF-16)
        gs.send(packetSender.get_buf());
        this.value = ''; // Wyczyść pole po wysłaniu
      }
    };
   // Zmiana rozmiaru okna — aktualizacja aspect ratio kamery
    window.addEventListener('resize', function () {
      const a = Math.max(window.innerWidth / window.innerHeight, 0.9);
      camera.aspect = a;
      camera.updateProjectionMatrix();
    }, false);

    /**
     * Wysyła ruch poziomy do serwera gry.
     * Klampuje wartość do zakresu ±127 (Int8).
     *
     * Pakiet: [0x00, v]
     *   Bajt 0: typ = 0 (ruch poziomy) — case 0 w child.js handleClientMessage()
     *   Bajt 1: prędkość Int8 (−127..+127)
     *     < 0 = ruch w lewo (obrót kątowy w tył)
     *     > 0 = ruch w prawo (obrót kątowy w przód)
     *   Łącznie: 2 bajty na pakiet ruchu.
     *
     * Częstotliwość wysyłania:
     *   Mysz/dotyk: przy każdym onmousemove/ontouchmove z drag=true → bardzo wysoka (60+ Hz)
     *   Klawiatura: przy każdym keydown → trzymany klawisz = wiele pakietów na sekundę
     *   Brak ruchu = brak pakietu (0 nie jest wysyłane — if (myPlayer && v))
     *
     * @param {number} v - prędkość / kierunek (ujemna = lewo, dodatnia = prawo)
     */
    function smi(v) {
      if (Math.abs(v) >= 127) v = v < 0 ? -127 : 127;
      if (myPlayer && v) gs.send(new Uint8Array([0, v]).buffer);
    }

    // ═══════════════════════════════════════════════════════════
    //  PĘTLA ANIMACJI (requestAnimationFrame)
    //
    //  Wywoływana ~60 razy na sekundę przez przeglądarkę.
    //  Kolejność operacji w każdej klatce:
    //    1. requestAnimationFrame(animate)  — zaplanuj następną klatkę
    //    2. Oblicz prędkość gracza (EMA z _velSmooth) — do skalowania efektów
    //    3. Obróć reflektory (wallScanLight + wallScanLight2) po ścianach cylindra
    //    4. Przesuń cząsteczki kurzu w dół (teleportuj z powrotem na górę gdy wylecą)
    //    5. Ustaw karuzelkę świateł platform wokół gracza (PLT_N = 8 świateł)
    //    6. Przypisz światła PointLight do 12 najbliższych graczy (pula playerLightPool)
    //    7. Pulsuj kolory materiałów (emissive: platformy, ściany, podłoga)
    //    8. renderer.render(scene, camera)  — narysuj klatkę WebGL
    //
    //  UWAGA: pętla gry (fizyka, kolizje) jest po STRONIE SERWERA (child.js, tick co 16ms).
    //  Klient tylko interpoluje + renderuje pozycje przesyłane przez pakiety type 0.
    // ═══════════════════════════════════════════════════════════

    function animate() {
      requestAnimationFrame(animate);
      const t = Date.now();

      if (myPlayer) {
        const py   = myPlayer.obj.position.y;
        const camY = camera.position.y;

        // Szacowanie prędkości gracza (do skalowania efektów)
        const rawSpeed = Math.abs(py - _prevPY);
        _prevPY    = py;
        _velSmooth = _velSmooth * 0.84 + rawSpeed * 0.16; // wygładzanie EMA
        const si   = Math.min(1, _velSmooth * 0.22);

        // ── Obracające się reflektory na ścianach ──
        wslAngle += 0.014;
        const wslR = R * 2.6;
        wallScanLight.position.set(Math.sin(wslAngle) * wslR, camY - 60, Math.cos(wslAngle) * wslR);
        wallScanTarget.position.set(Math.sin(wslAngle + 0.18) * R * 0.4, camY - 220, Math.cos(wslAngle + 0.18) * R * 0.4);
        wallScanLight.color.setHSL((t * 0.00025) % 1, 1, 0.55);
        wallScanLight.intensity = 3.0 + 1.0 * Math.sin(t * 0.002);

        const wsl2Ang = wslAngle * 1.37 + Math.PI;
        wallScanLight2.position.set(Math.sin(wsl2Ang) * wslR, camY - 40, Math.cos(wsl2Ang) * wslR);
        wallScanTarget2.position.set(Math.sin(wsl2Ang + 0.22) * R * 0.4, camY - 180, Math.cos(wsl2Ang + 0.22) * R * 0.4);
        wallScanLight2.color.setHSL(((t * 0.00025) + 0.5) % 1, 1, 0.5);
        wallScanLight2.intensity = 2.2 + 0.8 * Math.sin(t * 0.0026 + 1.2);

        // ── Animacja cząsteczek kurzu ──
        const dp = dustGeo.attributes.position.array;
        for (let i = 0; i < DUST_N; i++) {
          dp[i * 3 + 1] -= 0.35 + _velSmooth * 0.08; // opadanie (szybsze przy ruchu)
          if (dp[i * 3 + 1] < py - 520) {
            // Teleport cząstki na górę gdy wyleci poza widok
            const a = Math.random() * Math.PI * 2;
            const r = Math.random() * (R - 22);
            dp[i * 3]     = Math.cos(a) * r;
            dp[i * 3 + 1] = py + 250 + Math.random() * 100;
            dp[i * 3 + 2] = Math.sin(a) * r;
          }
        }
        dustGeo.attributes.position.needsUpdate = true;
        dustMat.opacity = 0.42 + 0.12 * Math.sin(t * 0.0015);

        // ── Karuzelka świateł wokół platformy (PLT_N świateł) ──
        for (let i = 0; i < PLT_N; i++) {
          const ang = (i / PLT_N) * Math.PI * 2 + t * 0.0006;
          const h   = ((t * 0.00018) + i * (1 / PLT_N)) % 1;
          platformLights[i].color.setHSL(h, 1, 0.52);
          platformLights[i].intensity  = (1.2 + 0.6 * Math.sin(t * 0.003 + i * 0.9)) * (0.6 + si);
          platformLights[i].position.set(Math.sin(ang) * (R - 38), py - 55 - i * 22, Math.cos(ang) * (R - 38));
        }

        // ── Pula świateł graczy — przypisz najbliższych ──
        const visiblePlayers = [];
        for (const id in players) {
          const p = players[id];
          if (p && p.obj && p.obj.visible) {
            const dist = Math.abs(p.obj.position.x - myPlayer.obj.position.x)
                       + Math.abs(p.obj.position.y - py)
                       + Math.abs(p.obj.position.z - myPlayer.obj.position.z);
            visiblePlayers.push({ player: p, dist });
          }
        }
        visiblePlayers.sort((a, b) => a.dist - b.dist);

        for (let i = 0; i < MAX_PLAYER_LIGHTS; i++) {
          const light = playerLightPool[i];
          if (i < visiblePlayers.length) {
            const p = visiblePlayers[i].player;
            light.position.copy(p.obj.position);
            light.position.y += 15;
            light.color.setHex(p.color);
            light.intensity = 1.3;
          } else {
            light.intensity = 0; // ukryj nieużywane światło
          }
        }

        // ── Animacja emissive materiałów (pulsowanie kolorami) ──
        const hue   = (t * 0.00022) % 1;
        const pulse = 0.5 + 0.4 * Math.sin(t * 0.0028);

        ml.m_col.emissive.setHSL(hue, 1, 0.22 * pulse);
        ml.m_col.emissiveIntensity = 0.6 + 0.35 * pulse;

        const wallHue   = (t * 0.00016) % 1;
        const wallPulse = 0.18 + 0.10 * Math.sin(t * 0.0018);
        cm[0].emissive.setHSL(wallHue, 0.7, wallPulse);
        cm[1].emissive.setHSL((wallHue + 0.05) % 1, 0.7, wallPulse);
        cm[0].emissiveIntensity = 0.3;
        cm[1].emissiveIntensity = 0.3;

        fm[0].emissive.setHSL(hue, 0.9, 0.15 + 0.10 * pulse);
        fm[1].emissive.setHSL((hue + 0.08) % 1, 0.9, 0.15 + 0.10 * pulse);
        fm[0].emissiveIntensity = 0.4 + 0.2 * pulse;
        fm[1].emissiveIntensity = 0.4 + 0.2 * pulse;

        ml.m_bad.emissive.setHSL(0, 1, 0.12 + 0.08 * Math.sin(t * 0.004));
        ml.m_bad.emissiveIntensity = 0.55 + 0.3 * Math.sin(t * 0.004);
      }

      renderer.render(scene, camera);
    }

    animate();
  }
  </script>

</html><!-- ==============================================================================
  PELNA SEKWENCJA: OD KLIKNIECIA "PLAY" DO DZIALAJACEJ GRY
  Komentarz opisuje kazdy krok po kolei — od zaladowania strony do petli animacji.
  ==============================================================================

  FAZA 0 - LADOWANIE STRONY (zanim gracz cokolwiek kliknie)
  ─────────────────────────────────────────────────────────

  [0.1] Przegladarka pobiera index.html i zaczyna parsowac.

  [0.2] Napotyka <script src="js/three.js"> → pobiera i wykonuje Three.js.
        Napotyka <script src="js/OBJLoader.js"> → pobiera OBJLoader.
        Napotyka <script src="js/asd.js"> → pobiera tekstury funkcje
        Wszystkie trzy musza sie zaladowac zanim kolejny <script> sie wykona.

  [0.3] Blok <script> ze gwiazdami i siatka wykonuje sie:
        - Tworzy canvas #stars-canvas, rysuje 150 migoczacych gwiazd.
        - Tworzy canvas #bg-canvas, rysuje retro-futurystyczna siatke.
        - Uruchamia petle loop() przez requestAnimationFrame.
          Animacja tla dziala NIEZALEZNIE od gry przez caly czas pobytu na stronie.

  [0.4] Blok <script> z THREE.LoadingManager wykonuje sie:
        - Tworzy loadingManager sledzi postep ladowania assetow.
        - Uruchamia ladowanie WSZYSTKICH assetow jednoczesnie (nieblokujace):
            img/sky.png           → preloaded.tl.t_sky  (tekstura nieba)
            img/sto.png           → preloaded.tl.t_sto  (tekstura kamienia)
            img/def.png           → preloaded.tl.t_def  (fallback tekstura)
            img/1.png .. img/N.png → preloaded.tl.skins[] (tekstury skinow)
            obj/col1.obj          → preloaded.col1      (model kolumny cylindra)
            obj/1.obj .. obj/4.obj → preloaded.skins[]  (modele graczy)

  [0.5] loadingManager.onProgress aktualizuje niebieski pasek loadera co pobrany asset.
        Pasek: 10% → 20% → ... → 100%.

  [0.6] loadingManager.onLoad (WSZYSTKIE assety gotowe) → wywoluje connectToMother().


  FAZA 1 - POLACZENIE Z MOTHER SERVEREM (lobby)
  ─────────────────────────────────────────────

  [1.1] connectToMother() tworzy WebSocket:
          motherSocket = new WebSocket("ws://IP:3001")
        Przegladarka nawiazuje polaczenie TCP z mother.js (port 3001).

  [1.2] motherSocket.onopen → isConnected = true, startuje pollAuth() co 100ms.

  [1.3] pollAuth() (co 100ms) czeka az:
        - motherSocket.readyState === WebSocket.OPEN
        - localStorage ma zapisane userId (gracz byl wczesniej zalogowany)
        Gdy oba warunki spelnione → wysyla pakiet do mother.js:
          [Type 1, userId_string] → handleFetchAccount (pobierz dane konta)
        Jesli gracz mial aktywny token gry → wysyla:
          [Type 5, g_id, token, userId_string] → handleReconnect

  [1.4] co 500ms setInterval wysyla [Type 6] (pollGames) do mother.js.
        Odpowiedz (Type 2) → odswieza liste serwerow gry w lobby.

  [1.5] Gracz widzi lobby: lista serwerow po prawej, formularz logowania po lewej.


  FAZA 2 - LOGOWANIE (HTTP, niezalezne od WebSocket)
  ───────────────────────────────────────────────────

  [2.1] Gracz wpisuje email + haslo → klika ZALOGUJ.
        JS wysyla: fetch("http://IP:9876/auth/login", { POST, JSON: {email, password} })

  [2.2] mother.js (Express, port 9876) weryfikuje haslo bcrypt.compare().
        Odpowiedz: { success: true, _id, nick }
        JS zapisuje _id do localStorage jako "id".

  [2.3] pollAuth() wykrywa userId → wysyla [Type 1, userId] przez WebSocket.

  [2.4] mother.js odpowiada [Type 3, email, nick, punkty, skiny[]] przez WebSocket.
        handleMotherMessage case 3 → wypelnia panel konta.


  FAZA 3 - WYBOR SERWERA I DOLACZANIE
  ─────────────────────────────────────

  [3.1] Gracz klika serwer → handleJoinGame() wysyla [Type 0, g_id, nick, userId]
        do mother.js przez WebSocket.

  [3.2] mother.js (handleJoinGame):
        a) Generuje jednorazowy token.
        b) Publikuje token przez Redis PUBLISH do child.js (serwer gry).
           child.js subskrybuje kanal i rejestruje token w pamieci.
        c) Czeka 50ms zeby child.js zdazyl zarejestrowac.
        d) Odsyla klientowi [Type 0, token_int32, port_int16, ip_string].

  [3.3] handleMotherMessage case 0:
        - Zapisuje gameToken, serverIP, serverPort.
        - Zamyka lobby.
        - Wywoluje initGame("ws://serverIP:serverPort/" + token).


  FAZA 4 - initGame() - BUDOWANIE SCENY 3D (zielony loader)
  ──────────────────────────────────────────────────────────
  Ta faza jest ASYNC — kazdy krok moze oddac kontrole przegladarce (await yieldRender).
  Dzieki temu zielony loader plynnie sie aktualizuje zamiast wisiec na 100%.

  [4.1] Pokaz zielony loader: "INICJALIZACJA SILNIKA... 10%"
        await yieldRender() → przegladarka maluje loader zanim JS zablokuje watek.

  [4.2] Zainicjuj zmienne lokalne:
          levels = []         → tu trafija dane poziomow z serwera (pakiet type 4)
          ringGroups = []     → tu trafi 5 obiektow THREE.Group (ringi cylindra)
          ringGroupIndex = 5  → nastepny ring do zaladowania = poziom 5
          levelsReceived = 0  → jeszcze nic nie odebrano z serwera
          ringDataReady = false → flaga synchronizacji ringów z danymi

  [4.3] Utworz materialy Three.js:
          ml.m_stone — MeshStandardMaterial z tekstura kamienia (dla kolumn ringu)
          ml.m_bad   — czerwony emisyjny (platformy niebezpieczne typ 2)
          ml.m_col   — zielony emisyjny  (checkpointy — kazdy n^2 * 10 poziom)
          cm[0,1]    — dwa materialy scian cylindra (tekstury segmentow ltc[])
          fm[0,1]    — dwa materialy podlogi ringu (tekstury segmentow ltc[])
          xm         — MeshNormalMaterial (teczowe kolory dla martwego gracza)

  [4.4] Utworz scene: scene = new THREE.Scene()

  [4.5] "TWORZENIE KAMERY I TLA... 20%"

        Dodaj SphereGeometry(promien=1000) jako skybox (niebo):
          Materail: MeshBasicMaterial z tekstura nieba, side = BackSide
          → renderujemy wnetrze sfery (nie zewnetrzna sciane)
          → sky.position.y = gracz.y w kazdej klatce (sfera podaza za graczem)
          → Sfera R=1000 otacza caly cylinder R=163 — gracz zawsze jest w srodku

  [4.7] Dodaj oswietlenie:
          AmbientLight(bialy, 0.4)          → rownomierne tlo bez cieni

              ang = (x * 2 * Math.PI) / 1023

                        x=512  → ang=3.14 rad  (pozycja "6 na zegarze", PI)
                        x=1023 → ang≈6.277 rad (prawie pelny okrag, ~360°)

    Krok 2: Oblicz wspolrzedne 3D na scianie cylindra o promieniu R=162.8:
              obj.position.x = R * Math.sin(ang)
              obj.position.y = y               (wprost z serwera, bez przeliczenia)
              obj.position.z = R * Math.cos(ang)

              Przyklad dla x=256 (kat=PI/2): pos = (162.8, y, 0) — "bok" cylindra
              Przyklad dla x=512 (kat=PI):   pos = (0,   y,-162.8) — "tyl" cylindra

                camera.position.y = y
                camera.position.z = 3.5 * R * Math.cos(ang)  = 569.8 * cos(ang)
              → kamera jest NA ZEWNATRZ cylindra, patrzy do srodka

              sky.position.y = y
              → sfera nieba (skybox) podaza za Y gracza

              Oblicz aktualny poziom: cl = (Math.abs((y-8) >> 4) / 8) | 0
              → jesli wzrosl → zaktualizuj #level "45/90"

  ──────────────────────────────────────────────────

  Celem jest: zapewnic ze gracz zawsze ma sciane cylindra wokol siebie.
  Uzywamy 2 cylindrow bo jeden ma skonczona wysokosc (512j).

  Stan poczatkowy (gracz na y=0, start gry):
    cyl[0].position.y =    0  (gorny cylinder, wys. 512: zakres y: 0 do -512)
    cyl[1].position.y = -512  (dolny cylinder, wys. 512: zakres y: -512 do -1024)
    Lacznie: zakres sciany: 0 do -1024

  Krok 2: Sprawdz czy gracz jest jeszcze w zasiegu:

            if (py >= cyl[1].position.y + 128 + 8) return  → j.w. dla dolnego
            (py jest ujemne i rosnie w dol — sprawdzamy oba warunki)

  Krok 3: Ktory cylinder jest nizej?
            li = (cyl[0].position.y < cyl[1].position.y) ? 1 : 0
            Cylinder z MNIEJSZA wartoscia Y jest fizycznie NIZEJ (Y ujemne = dol).
            li = indeks nizszego, ui = indeks wyzszego.

  Krok 4: Czy gracz jest ponizej zasiegu nizszego cylindra?
            Warunek: py < cyl[li].position.y + 128 + 8

            Jesli TAK: gracz zaraz wyleci poza dol → teleportuj WYZSZY cylinder nizej.

            cyl[ui].position.y = cyl[li].position.y - 512
            → wyzszy cylinder laduje 512j ponizej nizszego

            seg = (Math.sqrt(ringGroupIndex / 10)) | 0

                                         ^^^^^^^
                                         najnizszy widoczny ring

  Gracz widzi poziomy 0-4 (Y od +16 do -496).
  levels[5..9] sa w pamieci (odebrane z pakietu type 4) ale ZADNEGO ringu nie ma na tych danych.

  KIEDY WYWOLYWANE: co pakiet type 0, co ~16ms (przy kazdym set_pos myPlayera).

  WARUNEK RECYKLINGU:
    og = ringGroups[(ringGroupIndex - 5) % 5]
    → najstarszy ring (ten zaladowany 5 krokow temu)

    Sprawdz: og.position.y - 128 - 18 <= myPlayer.obj.position.y ?

    WAZNE — OS Y W THREE.JS (i w tej grze):
      Y rosnace w GORE, Y malejace w DOL.
      Gracz OPADA = jego Y staje sie coraz bardziej UJEMNE.
        Start:     gracz Y =    0
        Po chwili: gracz Y =  -50
        Pozniej:   gracz Y = -200
        Itd.       gracz Y = -infinity

      Ring na Y=+16 jest WYZEJ (wyzszy numer Y = wyzej w przestrzeni 3D).
      Ring na Y=-496 jest NIZEJ (bardziej ujemny Y = nizej w przestrzeni 3D).

      Kierunek ruchu gracza: od Y=0 w strone coraz bardziej ujemnych Y.
      Ringi sa umieszczone PRZED graczem (w kierunku opadania) — maja ujemne Y.
      Ringi ktore gracz MINAL sa za nim — maja wyzsze Y (mniej ujemne lub dodatnie).

    KIEDY WARUNEK JEST PRAWDZIWY → return (NIE recykluj):

      og.position.y - 146 <= myPlayer.obj.position.y
      Czyli: (Y ringu - 146) <= Y gracza

      Przyklad: ring na Y=+16, gracz na Y=-100:
        16 - 146 = -130 <= -100 ?  TAK (-130 jest mniejsze niz -100)
        → return, brak recyklingu
        Co to znaczy: gracz (Y=-100) jest jeszcze blizej ringu (Y=+16) niz prog recyklingu.
                      Gracz minal ring dopiero chwile temu (116j za nim).
                      Ring moze byc jeszcze widoczny u gory ekranu — nie recykluj.

    KIEDY WARUNEK JEST FALSZYWY → recykluj:

      og.position.y - 146 > myPlayer.obj.position.y
      Czyli: Y ringu jest wystarczajaco wyzej niz Y gracza (gracz daleko pod ringiem).

      Przyklad: ring na Y=+16, gracz na Y=-131:
        16 - 146 = -130 <= -131 ?  NIE (-130 jest WIEKSZE niz -131)
        → recykluj
        Co to znaczy: gracz (Y=-131) jest 147j PONIZEJ ringu (Y=+16).
                      Gracz go dawno minal opadajac — ring jest daleko za nim (w gore).
                      Kamera patrzy w dol (w kierunku opadania) — ring poza widokiem.

    PODSUMOWANIE KIERUNKU:
      Gracz opada w dol (Y coraz bardziej ujemne).
      Mija ring → ring zostaje za nim, NAD nim (wyzsze Y niz gracz).
      Gdy ring jest juz 147j NAD graczem (za nim) → teleportuj go PRZED graczem (nizej).
      "Nizej" = bardziej ujemne Y = w kierunku dalszego opadania gracza.

    Margines 146j = 128j (pelna wysokosc 1 poziomu) + 18j (bufor bezpieczenstwa).

  PRZYKLAD KROK PO KROKU (gracz spada od y=0):

    --- Gracz na y=0, ringGroupIndex=5 ---
    og = ringGroups[(5-5)%5] = ringGroups[0] = ring A, y=+16
    Warunek: +16 - 146 = -130 <= 0 ? TAK
    Recykling:
      ringGroups[5%5=0] = ring A (slot 0 teraz wskazuje na poziom 5)
      loadRing(ring A, 5):
        ring A position.y = -5*128+16 = -624
        128 kolumn konfigurowanych wg levels[5]
      ringGroupIndex = 6

    Nowy stan:
    [0]    ring A    -624    levels[5]   ← wlasnie teleportowany
    [1]    ring B    -112    levels[1]
    [2]    ring C    -240    levels[2]
    [3]    ring D    -368    levels[3]
    [4]    ring E    -496    levels[4]

    --- Gracz na y=-130, ringGroupIndex=6 ---
    og = ringGroups[(6-5)%5] = ringGroups[1] = ring B, y=-112
    Warunek: -112 - 146 = -258 <= -130 ? NIE (-258 <= -130 to prawda!)
    Recykling:
      loadRing(ring B, 6) → ring B na y=-6*128+16=-752, dane z levels[6]
      ringGroupIndex = 7

    Nowy stan:
    [0]    ring A    -624    levels[5]
    [1]    ring B    -752    levels[6]   ← wlasnie teleportowany
    [2]    ring C    -240    levels[2]
    [3]    ring D    -368    levels[3]
    [4]    ring E    -496    levels[4]

    ... i tak dalej. Kazdy ring "skacze" o ~640j w dol co przejscie gracza przez 1 poziom.

  WAZNE: advCyl() wykonuje MAKSYMALNIE 1 recykling na wywolanie.
  Jesli gracz spada bardzo szybko i kilka ringow wymaga recyklingu jednoczesnie,
  kazde kolejne wywolanie (nastepny pakiet type 0) zalatwi nastepny ring.
  Przy 60 pakietach/s i opadaniu gracza ~8j/s — recykling co ~16 pakietow → jest czas.


  5. loadRing(group, ri) — KONFIGURACJA 128 KOLUMN RINGU
  ────────────────────────────────────────────────────────

  Wywolywana przez: advCyl() podczas recyklingu
                    inicjalizacje (po synchronizacji z pakietem type 4)
                    resetRings() po respawnie

  Wejscie:
    group — THREE.Group (jeden z 5 ringGroups[])
    ri    — indeks poziomu (0, 1, 2, ..., N)

  Krok 1: Ustaw pozycje Y calego ringu:
            group.position.y = -ri * 16 * 8 + 16 = -ri * 128 + 16

  Krok 2: Petla przez 128 kolumn (y = 127 downto 0):
            tile = group.children[y]        → kolumna o indeksie y
            tt   = levels[ri][127 - y]      → typ kafelka (0/1/2) z danych serwera

            DLACZEGO 127-y:
              brg() dodawal kolumny od y=127 do y=0 (petla malejaca).
              Wiec group.children[0] = klon z kątem dla y=127 (≈355°)
                   group.children[127] = klon z katem dla y=0 (0°)
              levels[ri] indeksowany normalnie od 0 (lewa strona) do 127 (prawa).
              Korekcja 127-y wyrownuje dane serwera z rzeczywistym katem kolumny.

  Krok 3: Dla kazdej kolumny ustaw wg tt:

    tt=0 (PUSTE POLE):
      tile.visible = false
      → Three.js wylacza ten obiekt z przechodzenia sceny (traversal) i renderowania.
      → Zero kosztu GPU. Gracz "przeleci" przez to miejsce kątowe bez kolizji.
      → tile.children[0] i tile.children[1] NIE sa zmieniane — zostaja jak byly.

    tt=1 (BEZPIECZNA PLATFORMA):
      tile.visible = true
      tile.children[1].visible = false     → hazard mesh (czerwona nakladka) ukryty
      tile.children[0].material = ?
        Sprawdz: (Math.sqrt(ri / 10) % 1) !== 0  → czy to zwykly poziom?
          TAK (zwykly) → fm[cylinderSegment % 2]
            fm[0] lub fm[1] — MeshStandardMaterial z tekstura aktualnego segmentu
            Tekstura = ltc(cylinderSegment) — PNG z img/lvl/N.png
          NIE (checkpoint: sqrt(ri/10) jest calkowite) → ml.m_col
            Zielony emisyjny material — caly ring jest zielony (checkpoint)
            Checkpointy: ri=0, ri=10, ri=40, ri=90, ri=160 ...

    tt=2 (NIEBEZPIECZNA PLATFORMA):
      tile.visible = true
      tile.children[1].visible = true      → hazard mesh WIDOCZNY nad kolumna
      tile.children[0].material = ml.m_bad → czerwony emisyjny
      Efekt: dwa meshe nakladaja sie → wyrazna czerwona platforma ze swiecaca nakladka.
      Intensywnosc ml.m_bad.emissiveIntensity pulsuje w animate() → platforma "bije"


  6. KIEDY SERWER DOSYLA KOLEJNE DANE POZIOMOW (TYPE 4)
  ───────────────────────────────────────────────────────

  KLIENT NIGDY NIE PROSI serwera o dane poziomow.
  Child.js wysyla je PROAKTYWNIE — sam sledzi postep gracza i dosyla z wyprzedzeniem.

  Mechanizm po stronie child.js (nie w tym pliku tylko w child.js):
    child.js trzyma: player.last_sent_level = ostatni poziom wyslany do tego klienta
    W kazdym ticku sprawdza: czy gracz zblizy sie do konca znanych danych?
      Warunek (przyblizony): current_level > last_sent_level - BUFFER_SIZE
      Jesli TAK: wysyla kolejny chunk 10 poziomow
        Pakiet type 4: [count=1][type=4][10][len, 128bajtow]×10

  FORMAT PAKIETU TYPE 4 (bajt po bajcie):

    offset  rozmiar  wartosc       opis
    ──────  ───────  ────────────  ────────────────────────────────────────────
    0       1B       count_msg=1   liczba sub-pakietow (zawsze 1 dla type 4)
    1       1B       type=4        typ pakietu
    2       1B       count=10      liczba poziomow w tym pakiecie (zawsze 10)

    Dla kazdego poziomu (10 razy):
    +0      1B       len=128       dlugosc tablicy kaflek (zawsze 128)
    +1      128B     tiles[0..127] typ kafelka dla kazdej z 128 kolumn (0/1/2)

  Lacznie 1 pakiet type 4 = 3 + 10*(1+128) = 3 + 1290 = 1293 bajtow.

  Odczyt w hgm case 4:
    for ix = p.g_length8() (=10) downto 0:
      levels[levelsReceived + ix] = p.g_int8_arr()
        → g_int8_arr(): odczytaj 1B dlugosc, potem tablice Uint8Array tej dlugosci
        → zapisz w levels[] pod indeksem levelsReceived+ix
    levelsReceived += 10

  Kiedy PIERWSZY pakiet type 4 przychodzi (levelsReceived===0):
    Sprawdz ringDataReady — czy ringi juz sa zbudowane?
    → Tak:  od razu loadRing(ringGroups[i], i) dla i=0..4
    → Nie:  ustaw flage, loadRing wywola sie gdy ringi beda gotowe

  Kiedy KOLEJNE pakiety type 4 przychodzą (levelsReceived > 0):
    Dane sa po prostu dopisywane do levels[].
    advCyl() samo po nie siega gdy ringGroupIndex sie zwieksza.


  7. PELNY PRZEBIEG NA ZYWO — PRZYKLAD Z LICZBAMI
  ─────────────────────────────────────────────────

  Zakladamy: gracz wlasnie dolaczyl, ringGroupIndex=5, levelsReceived=10, gracz na y=0.

  t=0ms:  Child.js wysyla pakiet type 0:
            [01][00][01][00][00 00 00 00][00 00 00 00][00]
             1  t=0  1  id=0  x=0.0        y=0.0       ev=0
          hgm: set_pos(0, 0)
            ang=0, pos=(0, 0, 162.8)
            camera=(0, 0, 569.8)
            cl = (|0-8|>>4)/8 = 0 → #level "0/10" (0 jest checkpointem, ts=10)
            scrollCyl():
              advCyl(): og=ringGroups[0] (ring A, y=+16)
                        +16-146=-130 <= 0 ?  TAK
                        loadRing(ring A, 5): y=-624, 128 kolumn z levels[5]
                        ringGroupIndex=6
              cyl check: py=0 >= cyl[0].y+136=136 ? NIE → sprawdz cyl scroll
              li=(cyl[0].y=0 < cyl[1].y=-512 → cyl[1] nizszy) = li=1
              py=0 < cyl[1].y+136 = -376 ? NIE → brak teleportacji cylindra

  t=16ms: Nowy pakiet type 0:
            [01][00][01][00][00 00 00 00][AB CD EF C2][00]  (y=-111.9 przyblizenie)
          hgm: set_pos(0, -111.9)

            scrollCyl():

                        -112-146=-258 <= -111.9 ? TAK (-258 <= -111.9)

              cyl check: py=-111.9 < -376? NIE → brak teleportacji

  ...gracz opada dalej...

  t≈1000ms: ringGroupIndex osiagnie ~9
            levels[9] to ostatni dostepny poziom (mamy 0..9 z pierwszego type 4)
            advCyl() probuje: levels[9] → OK
            ale gdy ringGroupIndex=10 → levels[10] = undefined!
            loadRing dostanie levels[10] = undefined → tile types beda NaN → bugi
            ALE: child.js powinien wyslac pakiet type 4 z poziomami 10-19
                 ZANIM gracz dotrze do ringGroupIndex=10.
            Bufor: child.js wysyla nowe dane gdy gracz jest na ~polowie znanych danych.

            hgm case 4:

            Teraz advCyl() przy ringGroupIndex=10 znajdzie levels[10] → OK
