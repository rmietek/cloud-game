# ─── REDIS ────────────────────────────────────────────────────────────────────
# Redis jest magistralą komunikacyjną między mother (lobby) a child (serwery gry).
# Współdzielona lista gier między instancjami mother.
# 
# Rola w architekturze:
#   HASH game:{id}   — metadane serwera gry (IP, port, liczba graczy, nazwa, region)
#                      zapisywane przez apps/child-gameserver/main.js przy starcie, odczytywane przez apps/mother-lobby/main.js
#   SET  game_ids    — lista aktywnych ID gier (apps/mother-lobby/main.js czyta by zbudować listę lobby)
#   PUB  lobby_update — apps/child-gameserver/main.js publikuje gdy zmienia się stan gry (ktoś dołączył/wyszedł)
#                       apps/mother-lobby/main.js subskrybuje i pushuje aktualizację do wszystkich klientów WS
#   PUB  join:{id}   — apps/mother-lobby/main.js publikuje token gracza chcącego dołączyć
#                       apps/child-gameserver/main.js subskrybuje i wpuszcza gracza do gry
#
#
#   Child zapisuje:  "Istnieje gra EU-Phantom, port 7001, 3/10 graczy"
#   Mother czyta:    listę gier i pokazuje graczom w lobby
#   Mother publikuje: "Gracz X chce dołączyć do gry Y"
#   Child odbiera:   wpuszcza gracza X do gry Y
#
#
# Dlaczego --save "": wyłącza zapis RDB (snapshots) na dysk.
#   Dane w Redis to stan przejściowy (aktywne gry) — po restarcie apps/child-gameserver/main.js
#
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: redis    # Nazwa Service = DNS wewnątrz klastra: redis.default.svc.cluster.local
                 # Child i Mother łączą się przez "redis://redis:6379" (sama nazwa wystarczy)
spec:
  selector:
    app: redis
  ports:
    - port: 6379 # Standardowy port Redis — ClusterIP (domyślnie), niedostępny z zewnątrz
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
        command: ["redis-server", "--save", ""] # --save "" wyłącza snapshoty RDB na dysk
        # Dlaczego bez zapisu na dysk (--save "")?
        #   Lista aktywnych gier to dane tymczasowe — gdy serwer się zrestartuje,
        #   serwery gry same się ponownie zarejestrują. Nie ma potrzeby pamiętać tych danych.
